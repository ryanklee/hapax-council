name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "lab-journal/**"
      - "research/**"
      - "axioms/**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "lab-journal/**"
      - "research/**"
      - "axioms/**/*.md"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
      # Task #155 Stage 5 — anti-personification fail-loud CI gate.
      # Scans axioms/**/*.md and prompt-surface modules; exits non-zero
      # on any deny-list finding that survives the carve-out windows.
      - name: Install system deps (cairo, gobject)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev gobject-introspection
      - run: uv sync --extra ci
      - name: Anti-personification linter
        run: uv run python scripts/lint_personification.py
      # ytb-AUTH1 — aesthetic library integrity. Verifies _manifest.yaml
      # and _NOTICES.md match on-disk bytes and every asset's SHA-256
      # still agrees with its manifest entry. Fail-loud if a regenerated
      # asset bypassed the manifest refresh.
      - name: Aesthetic library verify
        run: uv run python scripts/verify-aesthetic-library.py
      # AUDIT-22 Phase B-2 — publication-contract redaction linter.
      # Validates every contract `redactions:` entry is either a
      # registered transform (REDACTION_TRANSFORMS) or a dict-key
      # pattern (contains `.` or ends with `*`). Catches typos /
      # unregistered transforms that would silently no-op in the
      # _apply_redactions wire-in.
      - name: Publication redaction transforms verify
        run: uv run python scripts/verify-redaction-transforms.py
      # V5 weave wk1 d4 — polysemic-audit CI gate (epsilon-owned).
      # Walks docs/audience/ + docs/published-artifacts/ for any *.md
      # artifact and fails when the audit flags cross-domain readings
      # (esp. legal/governance/AI-safety polysemy). Per V5 weave § 12
      # invariant 5: every artifact passes this gate before approval-
      # queue entry.
      - name: Polysemic audit verify
        run: uv run python scripts/verify-polysemic-audit.py
      # Bayesian Phase 0 FULL — HPX003 + HPX004 claim/LR registry gates.
      # HPX003: every signal in shared/lr_registry.yaml validates against
      # LRDerivation. HPX004: every claim has a PriorProvenance entry in
      # shared/prior_provenance.yaml. Operator directive 2026-04-24T22:40Z
      # (verbatim): "Lack of priors is itself a prior; priors must be
      # derivations of invariants, not ad-hoc."
      - name: HPX003+HPX004 claim/LR registry validators
        run: uv run python scripts/check-claim-registry.py


  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (cairo, gobject)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev gobject-introspection
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # PR2 of CI/CD speedup cascade (docs/research/2026-04-26-cicd-speedup.md
      # §2 #1): pyrefly replaces pyright. Pyrefly is ~15-18x faster on
      # benchmark codebases. Cache directory + key updated to pyrefly-*;
      # pyrightconfig.json kept in the hash key so a coordinated migration
      # is still keyed off both configs (pyrefly.toml is the active one).
      - name: Cache pyrefly analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/pyrefly
          key: pyrefly-${{ runner.os }}-${{ hashFiles('pyrefly.toml', 'pyrightconfig.json', 'uv.lock', 'pyproject.toml') }}
          restore-keys: |
            pyrefly-${{ runner.os }}-
      - run: uv sync --extra ci
      - run: uv run pyrefly check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (cairo, gobject, gst, pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libgirepository-2.0-dev gobject-introspection \
            gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gir1.2-pango-1.0
      - name: Install Px437 IBM VGA 8x16 font (HARDM aesthetic dependency, audit 4.7 PR #1109)
        run: |
          # Install system-wide so fontconfig's /usr/share/fonts scan picks it up.
          sudo mkdir -p /usr/share/fonts/TTF
          sudo cp assets/aesthetic-library/fonts/Px437_IBM_VGA_8x16.ttf /usr/share/fonts/TTF/
          # Root cache (scans /usr/share/fonts, writes /var/cache/fontconfig).
          sudo fc-cache -fv /usr/share/fonts
          # User cache. Pango enumerates through the client's fontconfig
          # context; without a user cache, Pango can silently omit freshly
          # installed system fonts (PR #1109 run-24641458881 observed).
          fc-cache -fv
          # fc-list probe confirms fontconfig sees the font.
          fc-list | grep -i 'Px437.*IBM VGA 8x16' \
            || (echo "font install failed (fc-list)" >&2; exit 1)
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra ci
      - name: Verify Pango can resolve Px437 IBM VGA 8x16
        # Pango consults fontconfig but has its own per-process cache; a
        # Pango-level probe confirms the HARDM render path will see the
        # font, not just fontconfig. If this fails, HARDM tests render
        # blank cells silently, so fail loud here with diagnostic output.
        run: |
          uv run python scripts/ci_verify_pango_font.py "Px437 IBM VGA 8x16"
      - name: Run tests
        env:
          LITELLM_BASE_URL: "http://0.0.0.0:1"
          QDRANT_URL: "http://0.0.0.0:1"
          OLLAMA_HOST: "http://0.0.0.0:1"
          OTEL_SDK_DISABLED: "true"
          LANGFUSE_HOST: "http://0.0.0.0:1"
        run: |
          # pytest hangs post-session due to open sockets from module-level
          # LiteLLM/Qdrant clients. Root conftest.py has a pytest_sessionfinish
          # that force-closes cached Qdrant + LiteLLM + httpx clients, so
          # teardown exits cleanly (~0.1s) instead of hanging to the timeout.
          #
          # Parallelism: pytest-xdist -n 4 --dist loadfile runs four worker
          # processes, distributed per-file so tests within a file stay
          # serial (preserves file-scoped fixture state + /dev/shm and
          # /tmp write patterns). GitHub Actions ubuntu-latest has 4 vCPUs;
          # -n 4 fully saturates the runner. Bumped from -n 2 in CI/CD
          # speedup PR1 (research drop docs/research/2026-04-26-cicd-speedup.md
          # §2 #2). Monitor first 3 PRs for OOM or socket-conflict regressions;
          # if a flake surfaces, fall back to -n 3.
          #
          # Timeout reduced 25m → 15m after socket-hang fix + xdist (real
          # tests: ~6-8 min parallel; was 11-15 min serial).
          set +e
          timeout -s KILL 900 \
            uv run pytest tests/ -q --tb=line -n 4 --dist loadfile \
              --ignore=tests/hapax_daimonion --ignore=tests/contract \
              --ignore=tests/test_frame_gate.py \
              --ignore=tests/test_hapax_daimonion_pipecat_tts.py \
              --ignore=tests/test_hapax_daimonion_pipeline.py \
              --ignore=tests/test_perception_integration.py \
              --ignore=tests/test_sensor_tier2_tier3.py \
              --ignore=tests/fortress \
              --ignore=tests/test_demo_screenshots.py \
              --ignore=tests/test_demo_screencasts.py \
              --ignore=tests/test_demo_video.py \
              --ignore=tests/test_demo_timeline.py \
              --ignore=tests/test_event_log_trace_id.py \
              --ignore=tests/studio_compositor/test_visual_regression_homage.py \
              --ignore=tests/studio_compositor/test_follow_mode.py \
              --ignore=tests/studio_compositor/test_face_obscure_pipeline.py \
              --ignore=tests/test_camera_pipeline_phase2.py \
              --ignore=tests/studio_compositor/test_captions_in_default_layout.py \
              --deselect=tests/studio_compositor/test_assignment_nondestructive.py::test_default_layout_informational_wards_are_non_destructive \
              --deselect=tests/studio_compositor/test_compositor_wiring.py::TestStartLayoutOnly::test_reads_disk_layout_and_populates_state_and_registry \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_default_json_exists_and_is_valid_layout \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_default_json_source_backends_match_registry_dispatch \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_default_json_chat_ambient_binds_to_chat_ambient_ward \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_load_layout_or_fallback_reads_valid_file \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_fallback_layout_parses_to_same_shape_as_default_json \
              --deselect=tests/studio_compositor/test_default_layout_loading.py::test_load_layout_or_fallback_rescales_to_canvas_size \
              --deselect=tests/studio_compositor/test_overlay_zones_research_gate.py::TestZoneGate::test_default_always_on \
              -m "not llm" -k "not golden and not goldens" \
              -p no:cacheprovider 2>&1 | tee /tmp/pytest-output.txt
          PYTEST_EXIT=${PIPESTATUS[0]}
          # pytest exit codes: 0 = all passed, 1 = failures, 2 = usage error,
          # 3 = internal error, 4 = usage error, 5 = no tests collected.
          # With conftest.py pytest_sessionfinish (#1318) closing socket hangs,
          # the timeout wrapper no longer fires on success, so pytest's own exit
          # code is reliable. The prior grep-for-"failed" parse had a bug:
          # "xfailed" contains "failed" as a substring, so any PR with xfail
          # markers (e.g. #1322 chronic-xfails) flagged a false failure.
          # Trust the exit code directly.
          if [ "$PYTEST_EXIT" -eq 0 ]; then
            # Sanity: a success must have a pytest summary line.
            if grep -qE '\bpassed\b' /tmp/pytest-output.txt; then
              echo "All tests passed (pytest exit 0)"
              exit 0
            fi
            echo "No test summary found — likely crashed or timed out"
            exit 1
          fi
          if [ "$PYTEST_EXIT" -eq 124 ] || [ "$PYTEST_EXIT" -eq 137 ]; then
            # SIGTERM (124) or SIGKILL (137) from the ``timeout`` wrapper.
            echo "Test step timed out (exit $PYTEST_EXIT)"
            exit 1
          fi
          echo "Tests failed (pytest exit $PYTEST_EXIT)"
          exit 1

  homage-visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Visual-regression goldens are generated on the operator's workstation
    # with locally-installed Px437 IBM VGA + fontconfig cache. CI's Ubuntu
    # runner renders text with different hinting/AA/fallback behaviour, so
    # the pixel-exact goldens drift ~10-20% per ward. Keep the job as a
    # developer-local gate (and for CI visibility via the diff artifacts)
    # but do not block PR merges on it until we ship CI-environment
    # goldens in a follow-on. The pytest step itself runs with
    # continue-on-error so the check surfaces "success" in the PR status
    # list while diff artifacts remain available for local review.
    #
    # PR3 of CI/CD speedup cascade (docs/research/2026-04-26-cicd-speedup.md
    # §2 #5 + §6 + 2026-04-26-cicd-speedup-pr3-5-priorities.md):
    # PATH-GATED. The heavy work (apt deps + uv sync + Px437 font install +
    # pytest) only runs when the PR (or push) actually touches files that
    # could change visual-regression output:
    #   - tests/studio_compositor/test_visual_regression_homage.py
    #   - assets/aesthetic-library/**
    # On all other PRs, the job spins up, evaluates the path filter, and
    # exits in ~5s — the GitHub status check still reports "success" so
    # branch-protection rules aren't disrupted, but the parallel-job slot
    # frees up immediately and ~80s of duplicated apt+uv+font setup is
    # avoided across ~95% of PRs.
    #
    # Cadence concession: skipping homage-vr on most PRs means goldens
    # drift caused by indirect changes (new ward → new rendering path
    # touched by an unrelated module) won't surface until either (a) the
    # operator runs the suite locally during ward iteration, or (b) the
    # nightly cron in `.github/workflows/homage-vr-nightly.yml` runs it
    # on main. The nightly cron preserves the regression cadence at
    # ~24h granularity, well inside the operator's ward-iteration cycle.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      # Path filter: detect whether this PR/push touches files that
      # plausibly affect visual-regression output. Outputs `homage_inputs`
      # (string "true"|"false") consumed by every downstream step's `if:`
      # clause. `dorny/paths-filter@v3` handles both pull_request (diff
      # vs base) and push (diff vs before-SHA) automatically.
      - name: Detect homage-vr input changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            homage_inputs:
              - 'tests/studio_compositor/test_visual_regression_homage.py'
              - 'assets/aesthetic-library/**'
      - name: Install system deps (cairo, gobject, fonts)
        if: steps.filter.outputs.homage_inputs == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libgirepository-2.0-dev gobject-introspection \
            gir1.2-pango-1.0 fonts-dejavu-core
      - name: Install Px437 IBM VGA 8x16 font (HARDM aesthetic dependency)
        if: steps.filter.outputs.homage_inputs == 'true'
        run: |
          sudo mkdir -p /usr/share/fonts/TTF
          sudo cp assets/aesthetic-library/fonts/Px437_IBM_VGA_8x16.ttf /usr/share/fonts/TTF/
          sudo fc-cache -fv /usr/share/fonts
          fc-cache -fv
          fc-list | grep -i 'Px437.*IBM VGA 8x16' \
            || (echo "font install failed (fc-list)" >&2; exit 1)
      - uses: astral-sh/setup-uv@v7
        if: steps.filter.outputs.homage_inputs == 'true'
        with:
          enable-cache: true
      - name: Sync uv ci extras
        if: steps.filter.outputs.homage_inputs == 'true'
        run: uv sync --extra ci
      - name: Run HOMAGE visual-regression suite (informational; goldens are dev-env pinned)
        id: vr
        if: steps.filter.outputs.homage_inputs == 'true'
        continue-on-error: true
        env:
          LITELLM_BASE_URL: "http://0.0.0.0:1"
          QDRANT_URL: "http://0.0.0.0:1"
          OLLAMA_HOST: "http://0.0.0.0:1"
          OTEL_SDK_DISABLED: "true"
          LANGFUSE_HOST: "http://0.0.0.0:1"
        run: |
          uv run pytest tests/studio_compositor/test_visual_regression_homage.py \
            -q --tb=short
      - name: Upload diff PNGs on failure
        if: steps.filter.outputs.homage_inputs == 'true' && steps.vr.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: homage-visual-regression-diffs
          path: /tmp/homage-visual-regression-diffs/
          if-no-files-found: ignore
          retention-days: 14
      - name: Report visual-regression outcome
        env:
          # GHA-internal step outputs only (boolean-shaped strings); not
          # user-controlled. Bound to env vars per workflow-injection
          # hardening guidelines anyway, so future edits don't silently
          # regress.
          HOMAGE_INPUTS: ${{ steps.filter.outputs.homage_inputs }}
          VR_OUTCOME: ${{ steps.vr.outcome }}
        run: |
          if [ "$HOMAGE_INPUTS" != "true" ]; then
            echo "Skipped — this change does not touch homage-vr inputs."
            echo "  - tests/studio_compositor/test_visual_regression_homage.py"
            echo "  - assets/aesthetic-library/**"
            echo "Nightly cron on main covers golden drift; operator can run locally."
            exit 0
          fi
          echo "visual-regression outcome: $VR_OUTCOME"
          echo "Informational — dev-env goldens diverge from CI fonts/AA/hinting."
          echo "Diff artifacts (if any) are attached to this run for review."

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hapax-logos
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: hapax-logos/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  vscode-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vscode/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Shallow clone vs full-history. gitleaks scans current diff;
          # 50 commits is sufficient for typical PRs.
          fetch-depth: 50
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit
      - name: Run Bandit security scan
        run: bandit -r . -x ./tests,./hapax-logos,./vscode --severity-level medium -f json -o bandit-report.json || true
      - name: Check for high-severity findings
        run: |
          if command -v jq &>/dev/null; then
            HIGH=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$HIGH" -gt 0 ]; then
              echo "::error::Bandit found $HIGH high-severity security issues"
              jq '.results[] | select(.issue_severity == "HIGH") | "\(.filename):\(.line_number) \(.issue_text)"' bandit-report.json
              exit 1
            fi
          fi
          echo "No high-severity security issues found"
