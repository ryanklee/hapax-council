name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "lab-journal/**"
      - "research/**"
      - "axioms/**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "lab-journal/**"
      - "research/**"
      - "axioms/**/*.md"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra ci
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra ci
      - name: Run tests
        env:
          LITELLM_BASE_URL: "http://0.0.0.0:1"
          QDRANT_URL: "http://0.0.0.0:1"
          OLLAMA_HOST: "http://0.0.0.0:1"
        run: |
          # Module-level Agent() creation opens sockets to local services
          # that don't exist in CI, causing pytest to hang indefinitely after
          # all tests complete. Force-exit via conftest sessionfinish hook.
          printf 'import os\ndef pytest_sessionfinish(session, exitstatus):\n    os._exit(exitstatus)\n' > tests/conftest.py
          uv run pytest tests/ -q \
            --ignore=tests/hapax_voice --ignore=tests/contract \
            -m "not llm" -p no:cacheprovider
          EXIT=$?
          rm -f tests/conftest.py
          exit $EXIT

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hapax-logos
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: hapax-logos/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  vscode-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vscode/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Run Bandit security scan
        run: bandit -r . -x ./tests,./hapax-logos,./vscode --severity-level medium -f json -o bandit-report.json || true
      - name: Check for high-severity findings
        run: |
          if command -v jq &>/dev/null; then
            HIGH=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$HIGH" -gt 0 ]; then
              echo "::error::Bandit found $HIGH high-severity security issues"
              jq '.results[] | select(.issue_severity == "HIGH") | "\(.filename):\(.line_number) \(.issue_text)"' bandit-report.json
              exit 1
            fi
          fi
          echo "No high-severity security issues found"
