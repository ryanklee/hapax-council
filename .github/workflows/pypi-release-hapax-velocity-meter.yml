name: pypi-release-hapax-velocity-meter

on:
  push:
    tags:
      - "hapax-velocity-meter-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/hapax-velocity-meter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify package
        run: python -m twine check dist/*
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hapax-velocity-meter/dist
