name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  auto-fix:
    # Only run when CI failed (not success or cancelled)
    if: >-
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Resolve the PR branch — workflow_run.head_branch reports 'main'
      # for PR-triggered CI, so we must look at pull_requests array.
      - name: Resolve PR branch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try pull_requests array first (populated for same-repo PRs)
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] && [ "$PR_NUMBER" != "0" ]; then
            BRANCH=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            echo "Resolved PR #$PR_NUMBER on branch $BRANCH"
          else
            # No PR — this is a direct push to main, skip
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
            echo "No PR found — skipping auto-fix"
          fi

      - uses: actions/checkout@v6
        if: steps.resolve.outputs.is_pr == 'true'
        with:
          ref: ${{ steps.resolve.outputs.branch }}
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      # Circuit breaker: max 3 auto-fix attempts per branch
      - name: Check auto-fix attempt count
        if: steps.resolve.outputs.is_pr == 'true'
        id: guard
        run: |
          COUNT=$(git log --oneline --grep='\[auto-fix\]' origin/main..HEAD | wc -l)
          echo "auto_fix_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge 3 ]; then
            echo "::warning::Auto-fix limit reached ($COUNT attempts). Labeling for human review."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_fix=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Label PR if limit reached
        if: steps.resolve.outputs.is_pr == 'true' && steps.guard.outputs.should_fix == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.resolve.outputs.pr_number }}" --add-label "needs-human"

      # Skip if the triggering commit was itself an auto-fix (prevent loops)
      - name: Check for auto-fix loop
        if: steps.resolve.outputs.is_pr == 'true' && steps.guard.outputs.should_fix == 'true'
        id: loop
        run: |
          MSG="${{ github.event.workflow_run.head_commit.message }}"
          if echo "$MSG" | grep -q '\[auto-fix\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Last commit was auto-fix — labeling for human review"
            gh pr edit "${{ steps.resolve.outputs.pr_number }}" --add-label "needs-human"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Download CI failure logs
      - name: Download CI logs
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/ci-failure.log 2>&1 || true
          echo "=== Failure log (last 100 lines) ==="
          tail -100 /tmp/ci-failure.log

      # Classify failures
      - name: Classify failures
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false'
        id: classify
        run: |
          LOG="/tmp/ci-failure.log"
          FAILURES=""

          if grep -qE '(ruff check|ruff format)' "$LOG" 2>/dev/null; then
            FAILURES="${FAILURES}lint,"
          fi
          if grep -qE 'pyright' "$LOG" 2>/dev/null; then
            FAILURES="${FAILURES}typecheck,"
          fi
          if grep -qE '(FAILED tests/|pytest|test_)' "$LOG" 2>/dev/null; then
            FAILURES="${FAILURES}test,"
          fi
          if grep -qE '(pnpm build|npm run build|tsc.*error|TS\d+)' "$LOG" 2>/dev/null; then
            FAILURES="${FAILURES}web-build,"
          fi

          if [ -z "$FAILURES" ]; then
            echo "fixable=false" >> "$GITHUB_OUTPUT"
            echo "No recognized failure patterns"
          else
            echo "fixable=true" >> "$GITHUB_OUTPUT"
            echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"
            echo "Detected failures: $FAILURES"
          fi

      - name: Label unfixable PR
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.resolve.outputs.pr_number }}" --add-label "needs-human"

      - uses: astral-sh/setup-uv@v7
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'true'

      - name: Setup Node
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'true' &&
          contains(steps.classify.outputs.failures, 'web-build')
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'true'
        run: |
          uv sync --extra ci
          if echo "${{ steps.classify.outputs.failures }}" | grep -q 'web-build'; then
            cd council-web && npm ci
          fi

      - name: Run Claude Code auto-fix
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'true'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 10 --allowedTools Bash,Read,Edit,Write"
          prompt: |
            The CI pipeline failed on this branch. The detected failure types are: ${{ steps.classify.outputs.failures }}

            Here are the failure logs:
            ```
            $(cat /tmp/ci-failure.log | tail -200)
            ```

            Fix ALL failures. Follow these steps in order:

            1. **Lint/format** (if flagged): Run `uv run ruff check --fix .` then `uv run ruff format .`
            2. **Typecheck** (if flagged): Run `uv run pyright`, fix type errors
            3. **Tests** (if flagged): Run `uv run pytest tests/ -x -q` to reproduce, then fix the failing tests.
               - Read the test to understand what it expects
               - Read the source code it tests
               - Fix the SOURCE code if it has a bug, or fix the TEST if it has stale assertions
               - Do NOT delete tests or skip them
               - Do NOT change test assertions to match broken behavior
            4. **Web build** (if flagged): Run `cd council-web && npm run build`, fix TypeScript errors

            Protected files — do NOT modify:
            - axioms/, hooks/, systemd/
            - shared/config.py, shared/axiom_enforcement.py

            After fixing, verify:
            - `uv run ruff check . && uv run ruff format --check .`
            - `uv run pyright`
            - `uv run pytest tests/ -x -q` (if tests were failing)
            - `cd council-web && npm run build` (if web-build was failing)

      # Commit and push
      - name: Commit auto-fix
        if: >-
          steps.resolve.outputs.is_pr == 'true' &&
          steps.guard.outputs.should_fix == 'true' &&
          steps.loop.outputs.skip == 'false' &&
          steps.classify.outputs.fixable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit — Claude could not fix the issue."
            gh pr edit "${{ steps.resolve.outputs.pr_number }}" --add-label "needs-human"
          else
            git add -A
            git commit -m "[auto-fix] resolve CI failures (${{ steps.classify.outputs.failures }})

          Automated fix by Claude Code. See CI logs for details.

          Co-Authored-By: Claude Sonnet <noreply@anthropic.com>"
            git push
          fi
