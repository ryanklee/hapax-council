name: PyPI release — hapax-swarm

# Builds and publishes packages/hapax-swarm to PyPI when a
# `hapax-swarm-v*` tag is pushed. Trusted Publishing (OIDC) is the
# default; an API-token fallback is documented in the publish step.
#
# Security notes:
# - The only github-context value used in `run:` blocks is GITHUB_REF,
#   which is set by GitHub Actions itself and is not attacker-controlled
#   (workflow injection vectors are issue/PR bodies, commit messages,
#   etc.). It's still routed via env: to be defensive.

on:
  push:
    tags:
      - "hapax-swarm-v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling

      - name: Build distributions
        working-directory: packages/hapax-swarm
        run: |
          python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hapax-swarm-dist
          path: packages/hapax-swarm/dist/*
          if-no-files-found: error

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        working-directory: packages/hapax-swarm
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: packages/hapax-swarm
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run tests
        working-directory: packages/hapax-swarm
        run: |
          python -m pytest -q

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/hapax-swarm-v')
    environment:
      name: pypi
      url: https://pypi.org/p/hapax-swarm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hapax-swarm-dist
          path: dist

      - name: Verify dist matches tag version
        env:
          REF: ${{ github.ref }}
        run: |
          tag="${REF#refs/tags/hapax-swarm-v}"
          if ! ls "dist/hapax_swarm-${tag}-"*.whl >/dev/null 2>&1 \
              && ! ls "dist/hapax_swarm-${tag}.tar.gz" >/dev/null 2>&1; then
            echo "::error::Tag version ${tag} does not match any wheel/sdist in dist/"
            ls -la dist/
            exit 1
          fi

      - name: Publish via Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Trusted Publishing — no API token. Configure on PyPI:
          # https://pypi.org/manage/account/publishing/
          # If trusted publishing is not yet configured, set
          # PYPI_API_TOKEN secret and uncomment `password:` below.
          # password: ${{ secrets.PYPI_API_TOKEN }}
