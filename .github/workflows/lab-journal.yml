name: Lab Journal

on:
  push:
    branches: [main]
    paths:
      - 'lab-journal/**'
      - 'agents/hapax_daimonion/proofs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render
        run: quarto render lab-journal
      - uses: actions/upload-pages-artifact@v3
        with:
          path: lab-journal/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
