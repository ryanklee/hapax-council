name: PyPI release - hapax-refusals

# Publishes the hapax-refusals package on PyPI when a tag of the
# form `hapax-refusals-vX.Y.Z` is pushed. Tag pattern decouples this
# package from the rest of the monorepo's tag namespace so a refusals
# release does not fire workflow runs for unrelated packages.
#
# Trusted Publishing (OIDC) - no PyPI token in repo secrets. The
# package's PyPI project is configured to trust:
#   repository: ryanklee/hapax-council
#   workflow:   .github/workflows/pypi-release-hapax-refusals.yml
#   environment: pypi
#
# Ref: https://docs.pypi.org/trusted-publishers/
#
# Security note: run: blocks reference only $GITHUB_REF / inputs.ref
# (validated GitHub-controlled values), never untrusted user-supplied
# strings (issue titles, commit messages, PR descriptions). Inputs.ref
# is treated as a git ref by actions/checkout's own validation.

on:
  push:
    tags:
      - "hapax-refusals-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (defaults to current branch HEAD)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        working-directory: packages/hapax-refusals
        run: |
          python -m build --sdist --wheel --outdir dist/

      - name: List artifacts
        working-directory: packages/hapax-refusals
        run: |
          ls -la dist/
          # Verify both sdist and wheel exist.
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || (echo "ERR: missing sdist" >&2 && exit 1)
          test -n "$(ls dist/*.whl 2>/dev/null)" || (echo "ERR: missing wheel" >&2 && exit 1)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hapax-refusals-dist
          path: packages/hapax-refusals/dist/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Smoke-test the wheel
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hapax-refusals-dist
          path: dist/

      - name: Install wheel and run smoke tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install dist/*.whl
          # Smoke-test: import + minimal API surface check.
          python - <<'PY'
          from hapax_refusals import (
              ClaimSpec,
              RefusalEvent,
              RefusalGate,
              RefusalRegistry,
              RefusalResult,
              SURFACE_FLOORS,
              claim_discipline_score,
              floor_for,
              parse_emitted_propositions,
              refuse_and_reroll,
          )

          assert SURFACE_FLOORS["director"] == 0.60
          assert SURFACE_FLOORS["grounding_act"] == 0.90
          assert floor_for("director") == 0.60

          gate = RefusalGate(surface="director")
          claim = ClaimSpec(name="x", posterior=0.42, proposition="x is true.")
          result = gate.check("x is true.", available_claims=[claim], log_refusals=False)
          assert result.accepted is False, "expected reject for below-floor claim"
          assert claim_discipline_score(result) == 0.0
          print("hapax-refusals smoke OK")
          PY

  publish:
    name: Publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    needs: [build, test]
    # Only publish on actual tag pushes - workflow_dispatch is for
    # build-and-test rehearsal, not production publishes.
    if: startsWith(github.ref, 'refs/tags/hapax-refusals-v')
    environment:
      name: pypi
      url: https://pypi.org/p/hapax-refusals
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hapax-refusals-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Trusted Publishing (OIDC) - no token configured.
          # The pypi.org project must list this repo + workflow.
          skip-existing: true
