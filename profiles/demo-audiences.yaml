audiences:
  alexis:
    archetype: family
    name: Alexis
    context: |
      Wife of 11 years, known each other for 15. She knows the operator has been
      building a system for executive function support and that it turned into a
      research project. Does not know the details of what was built — EVERYTHING ELSE
      is new to her.

      Brilliant. Strong intuitions and background knowledge of cognitive behavior,
      political science, behavioral concepts, mental models — more intuitions than
      strong formal references. Not technical but intellectually curious about
      systems thinking, knowledge flow, partitioning, and agent dynamics at a
      conceptual level.

      She cares about (1) intellectual value, (2) practical value — for the operator,
      for others. She cares about how potentially important this research is. She is
      concerned with ethics, morals, equity, truth, evidence, rational arguments.
      ACTUAL rather than feigned import.

      She will connect with analogies more than specification, but analogies must be
      grounded in something real or she will find them empty (and she should).

      She will be surprised by the perception capabilities.
      She will be amused by the composition layers.
      She will care most about the ethical and philosophical implications.

      Consent must be addressed immediately but with context first, not abruptly.

      Her interests:
      - The genuine uniqueness of this system in the LLM space
      - How it helps the operator with ADHD and autism — practical daily impact
      - How it helps the operator at work and connect with people
      - The nuanced knowledge systems that underlie the architecture
      - Systems design thinking (knowledge flow, partitioning, agent dynamics)
      - How it might help the operator achieve balance and goals more effectively
      - Personal growth, family impact, freeing cognitive energy for relationships

      Setting: At home in the operator's office. Casual, personal, intimate.
      Relationship: Family — she cares about the operator, not the technology.

      Narrative requirements: Do not pitch. Do not condescend. Do not patronize.
      Do not use multi-sentence narrative techniques. No rhetoric. Informative only.
      Explain every concept to the depth it MERITS — not more, not less. Neither dry
      nor overenthusiastic or cheesy. This is a hard balance to strike. Strike it.
      Best practices for narrating complicated material to well-equipped but fresh audiences.
    calibration:
      emphasize:
        - START with the big picture — what this is as a whole, before details
        - Ethical framework and consent model (structural, not policy) — address immediately with context
        - Research significance and honest assessment — epistemic status of all concerns
        - Philosophical foundations (Heidegger, Husserl, Clark — grounded, not decorative)
        - Perception system capabilities and what they mean
        - Visual effects and compositor (engaging, tangible)
        - Governance as structural constraint, not feature
        - Practical cognitive support value — executive function accommodation
        - What is proven versus what remains to be proven — path to proof
        - Why this research is significant, what is original, what is not
        - Conceptual models and inspiration for those models
        - Life organization, domain balance, achieving goals
        - Connecting with and understanding people — management tools
        - Knowledge systems and information flow (conceptual, not technical)
        - The distinction between what LLMs already do and what was built on top
        - Every nook and cranny of Logos UI coherently explored
        - All research context — history, current status, outlook, next steps
        - Arguments for, arguments against
      skip:
        - Specific technology names (Docker, LiteLLM, Qdrant, etc.)
        - Infrastructure details (ports, containers, APIs)
        - Code and implementation specifics
        - Cost metrics, token counts, spending data
        - System health scores and uptime numbers
        - CI/CD and deployment patterns
        - Self-healing as a feature — mention once briefly at most
      forbidden_terms:
        - Docker
        - container
        - LiteLLM
        - Qdrant
        - PostgreSQL
        - pgvector
        - Langfuse
        - Ollama
        - API
        - endpoint
        - microservice
        - systemd
        - VRAM
        - GPU
        - inference
        - latency
        - cost
        - spending
        - tokens
        - uptime
      never:
        - explain ADHD or autism to her — she is deeply knowledgeable about both and would find it patronizing
        - use a teachy or didactic tone about neurodivergence
        - pitch or sell — she will see through it and find it insulting
        - use breathless enthusiasm or rhetorical techniques
        - fabricate statistics or claim reliability not established by data
        - use multi-sentence narrative setup ("Today I'm going to...")
        - fabricate specific daily routines or habits
        - claim reliability ("hasn't given me trouble") — the system is under active development
        - dwell on system health monitoring or self-healing
        - mention cost, spending, or money

  chris b:
    archetype: leadership
    name: Chris
    context: |
      Chris is a senior architect at the same company where the operator
      is AVP. Chris has extraordinarily broad and deep expertise: Azure Cloud, containerization,
      security, networking, governance, strategy — seemingly everything. He is brilliant
      and makes for a very difficult, high-bar audience. Nothing gets past him.

      This is a cold introduction — Chris knows nothing about this system. the operator looks up
      to Chris and respects him deeply. This is NOT a pitch. the operator is seeking honest,
      critical technical feedback from someone whose judgment he trusts. The goal is for
      Chris to evaluate the architecture on its merits and provide candid assessment.

      Chris will care about:
      - Architectural soundness: Is the service topology well-designed? Are boundaries clean?
      - Security posture: Secrets management, network isolation, attack surface
      - Containerization patterns: Docker Compose choices, resource management, health checks
      - Observability: Tracing, logging, metrics — how mature is the telemetry?
      - Data architecture: Vector DB design, embedding strategy, RAG pipeline patterns, Obsidian vault as bidirectional knowledge layer (vault_writer egress, RAG ingestion, GitDoc git-based sync)
      - Integration patterns: API gateway, service mesh, model routing, fallback chains
      - Operational maturity: Automated maintenance, self-healing, deployment patterns
      - Cost governance: Model selection, local vs cloud tradeoffs, spend tracking
      - Governance framework: Axiom system, constraint enforcement, drift detection
      - Scalability considerations: What scales, what doesn't, and why that's fine (single-user)

      Chris will immediately spot:
      - Any hand-waving or vague claims without architectural backing
      - Security gaps or questionable trust boundaries
      - Over-engineering or under-engineering relative to the problem space
      - Whether design decisions are principled or accidental

      Setting: Professional but collegial. the operator sharing his personal project with a
      respected peer whose feedback genuinely matters.
      Relationship: the operator (AVP) looks up to Chris (EA LVL5) — seeking peer review, not approval.
    calibration:
      emphasize:
        - service topology and container orchestration
        - security architecture and threat model
        - observability and tracing stack
        - data architecture and vector storage
        - model routing and cost governance
        - governance framework and drift detection
        - self-regulation and autonomous maintenance patterns
        - agent architecture and orchestration model
        - operational cadence and scheduling
        - honest limitations and tradeoffs
      skip:
        - personal context and neurodivergence details (mention briefly as motivation, don't dwell)
        - music production domain
        - management domain internals (people data, 1:1 prep content)
        - basic explanations of technologies Chris already knows deeply
      never:
        - explain what Docker, Kubernetes, or Azure does — Chris knows more than the system does
        - pitch or sell — Chris will see through it instantly and lose respect
        - claim enterprise-grade when it's a single-user personal system
        - hide limitations — Chris respects honesty about tradeoffs more than polished surfaces
        - use buzzwords without substance behind them
        - fabricate performance metrics, uptime stats, or cost numbers
