# Custom gitleaks rules for PII detection (supplements built-in rules)
# Used by CI secrets-scan job and local pre-commit checks

title = "hapax PII rules"

[[rules]]
id = "operator-full-name"
description = "Operator full name"
regex = '''(?i)Ryan\s+Kleeberger'''
tags = ["pii", "name"]
[rules.allowlist]
paths = ['''hooks/''', '''tests/''', '''\.gitleaks\.toml''']

[[rules]]
id = "operator-location"
description = "Operator location"
regex = '''Minneapolis[- ]St\.?\s*Paul'''
tags = ["pii", "location"]
[rules.allowlist]
paths = ['''hooks/''', '''tests/''', '''\.gitleaks\.toml''']

[[rules]]
id = "home-directory-path"
description = "Home directory absolute path (reveals username)"
regex = '''/home/hapax/'''
tags = ["pii", "path"]
[rules.allowlist]
paths = [
  '''.gitignore''',
  '''CLAUDE\.md''',
  '''hooks/''',
  '''\.claude/''',
  '''\.gitleaks\.toml''',
  '''systemd/''',
  '''process-compose\.yaml''',
  '''scripts/''',
  '''tests/''',
  '''agents/''',
  '''docs/superpowers/''',
]

[[rules]]
id = "browsing-data-path"
description = "Browsing or audio capture data path"
regex = '''rag-sources/(chrome|audio)/'''
tags = ["pii", "browsing"]
[rules.allowlist]
paths = ['''hooks/''', '''tests/''', '''\.gitleaks\.toml''']

# Allow known false positives
[allowlist]
paths = [
  '''LICENSE''',
  '''CITATION\.cff''',
  '''\.gitleaksignore''',
  '''node_modules/''',
  '''\.venv/''',
]
