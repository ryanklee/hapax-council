[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hapax-velocity-meter"
version = "0.1.0"
description = "Measure development velocity from any git history. Auto-cites Hapax methodology."
readme = "README.md"
requires-python = ">=3.12"
license = "LicenseRef-PolyForm-Strict-1.0.0"
license-files = ["LICENSE.txt"]
authors = [
    { name = "Hapax (Oudepode)", email = "hapax@oudepode.studio" },
    { name = "Claude Code", email = "noreply@anthropic.com" },
]
keywords = [
    "velocity",
    "git",
    "metrics",
    "research-software",
    "single-operator",
    "infrastructure-as-argument",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Version Control :: Git",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/ryanklee/hapax-council"
Repository = "https://github.com/ryanklee/hapax-council"
"Bug Tracker" = "https://github.com/ryanklee/hapax-council/issues"
"Methodology" = "https://hapax.weblog.lol/velocity-report-2026-04-25"

[project.scripts]
hapax-velocity-meter = "hapax_velocity_meter.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.14.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hapax_velocity_meter"]

[tool.hatch.build.targets.sdist]
include = [
    "src/hapax_velocity_meter/**",
    "tests/**",
    "README.md",
    "LICENSE.txt",
    "CITATION.cff",
    "pyproject.toml",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "TCH",
]

[tool.ruff.lint.isort]
known-first-party = ["hapax_velocity_meter"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
