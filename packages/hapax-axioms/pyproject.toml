[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hapax-axioms"
version = "0.1.0"
description = "Single-operator axiom enforcement library — pre-commit + CI primitives extracted from the Hapax constitutional substrate."
readme = "README.md"
requires-python = ">=3.12"
license = "LicenseRef-PolyForm-Strict-1.0.0"
license-files = ["LICENSE.txt"]
authors = [
    { name = "Hapax (Oudepode)", email = "hapax@oudepode.studio" },
    { name = "Claude Code", email = "noreply@anthropic.com" },
]
keywords = [
    "axioms",
    "governance",
    "single-operator",
    "pre-commit",
    "research-software",
    "infrastructure-as-argument",
    "polyform-strict",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Version Control :: Git",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/ryanklee/hapax-council"
Repository = "https://github.com/ryanklee/hapax-council"
"Bug Tracker" = "https://github.com/ryanklee/hapax-council/issues"
"Constitution" = "https://github.com/ryanklee/hapax-constitution"

[project.scripts]
hapax-axioms = "hapax_axioms.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.14.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hapax_axioms"]

[tool.hatch.build.targets.sdist]
include = [
    "src/hapax_axioms/**",
    "tests/**",
    "README.md",
    "LICENSE.txt",
    "CITATION.cff",
    "pyproject.toml",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
# TC (type-checking-block) rules are off: this project uses
# `from __future__ import annotations` everywhere, so eagerly importing
# `Pattern` / `Tier` / `Iterable` at runtime is intentional (we also use
# them as runtime instance types) and stylistically unambiguous.

[tool.ruff.lint.isort]
known-first-party = ["hapax_axioms"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
