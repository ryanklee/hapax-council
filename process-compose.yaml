# Hapax Application Layer — process-compose
#
# Manages all hapax processes on top of the Docker infrastructure layer.
# Docker Compose handles: Qdrant, LiteLLM, PostgreSQL, Langfuse, Grafana, etc.
# Process Compose handles: voice daemon, cockpit API, visual aggregator, logos app.
#
# Start:  process-compose up
# TUI:    process-compose attach
# Status: process-compose process list
# Stop:   process-compose down
#
# Secrets are loaded once at startup via `pass` and shared as environment.

version: "0.5"

environment:
  - "PATH=/home/hapax/.local/bin:/usr/local/bin:/usr/bin:/bin"
  - "HOME=/home/hapax"
  - "XDG_RUNTIME_DIR=/run/user/1000"
  - "LITELLM_BASE_URL=http://127.0.0.1:4000"
  - "LANGFUSE_HOST=http://127.0.0.1:3000"
  - "OMP_NUM_THREADS=2"
  - "MKL_NUM_THREADS=2"
  - "OPENBLAS_NUM_THREADS=2"
  - "ONNXRUNTIME_INTRA_OP_NUM_THREADS=2"

processes:
  # ── Secrets loader (runs once, populates env file) ──────────────
  secrets:
    command: |
      bash -c '
        echo "export LITELLM_API_KEY=$(pass show litellm/master-key)" > /run/user/1000/hapax-voice.env
        echo "export LANGFUSE_PUBLIC_KEY=$(pass show langfuse/public-key)" >> /run/user/1000/hapax-voice.env
        echo "export LANGFUSE_SECRET_KEY=$(pass show langfuse/secret-key)" >> /run/user/1000/hapax-voice.env
        echo "export HF_TOKEN=$(pass show api/huggingface)" >> /run/user/1000/hapax-voice.env
        chmod 600 /run/user/1000/hapax-voice.env
        echo "Secrets loaded"
      '
    working_dir: /home/hapax/projects/hapax-council
    environment:
      - "GNUPGHOME=/home/hapax/.gnupg"
      - "PASSWORD_STORE_DIR=/home/hapax/.password-store"
    availability:
      restart: "no"  # run once

  # ── Cockpit API (FastAPI on :8051) ──────────────────────────────
  cockpit-api:
    command: bash -c 'source /run/user/1000/hapax-voice.env && exec /home/hapax/projects/hapax-council/.venv/bin/python -m cockpit.api --host 0.0.0.0'
    working_dir: /home/hapax/projects/hapax-council
    disabled: true  # Managed by systemd cockpit-api.service to avoid port conflicts
    depends_on:
      secrets:
        condition: process_completed_successfully
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 10
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 8051
        path: /api/health
      initial_delay_seconds: 3
      period_seconds: 10

  # ── Voice Daemon ────────────────────────────────────────────────
  voice:
    command: bash -c 'source /run/user/1000/hapax-voice.env && exec /home/hapax/projects/hapax-council/.venv/bin/python -m agents.hapax_voice'
    working_dir: /home/hapax/projects/hapax-council
    depends_on:
      secrets:
        condition: process_completed_successfully
      cockpit-api:
        condition: process_healthy
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 10
    readiness_probe:
      exec:
        command: "test -f /home/hapax/.cache/hapax-voice/perception-state.json"
      initial_delay_seconds: 15
      period_seconds: 10

  # ── Visual Layer Aggregator ─────────────────────────────────────
  visual:
    command: bash -c 'source /run/user/1000/hapax-voice.env && exec /home/hapax/projects/hapax-council/.venv/bin/python -m agents.visual_layer_aggregator'
    working_dir: /home/hapax/projects/hapax-council
    depends_on:
      cockpit-api:
        condition: process_healthy
      voice:
        condition: process_started
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 10

  # ── Watch Sensor Receiver ───────────────────────────────────────
  watch-receiver:
    disabled: true
    command: /home/hapax/projects/hapax-council/.venv/bin/python -m agents.watch_receiver
    working_dir: /home/hapax/projects/hapax-council
    availability:
      restart: on_failure
      backoff_seconds: 10
      max_restarts: 5

  # ── Health Monitor (periodic) ───────────────────────────────────
  health-monitor:
    command: bash /home/hapax/.local/bin/health-watchdog
    working_dir: /home/hapax/projects/hapax-council
    environment:
      - "GNUPGHOME=/home/hapax/.gnupg"
      - "PASSWORD_STORE_DIR=/home/hapax/.password-store"
    availability:
      restart: "no"
    # Runs via systemd timer, not continuously — this is for manual runs
    disabled: true

  # ── VRAM Watchdog (30s loop) ──────────────────────────────────
  vram-watchdog:
    command: |
      bash -c 'while true; do
        /home/hapax/projects/hapax-council/scripts/vram-watchdog.sh
        sleep 30
      done'
    working_dir: /home/hapax/projects/hapax-council
    availability:
      restart: on_failure
      backoff_seconds: 10
      max_restarts: 100
