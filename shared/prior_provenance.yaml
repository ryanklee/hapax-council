# Prior-provenance registry — Phase 0 FULL
#
# Operator directive 2026-04-24T22:40Z (verbatim):
#   "Lack of priors is itself a prior and we must somehow ensure that
#    priors are not generated adhoc but derivations of invariants that
#    won't keep us guessing."
#
# Per-claim record of how the prior was derived. Schema is
# shared.claim.PriorProvenance. CI rule HPX004 enforces that every
# Claim's `prior_provenance_ref` resolves to a key in this file.
#
# Reference: docs/research/2026-04-24-universal-bayesian-claim-confidence.md
# §4 (Prior Derivation from Invariants).

operator_present:
  claim_name: operator_present
  structural_commitments:
    - "single_user axiom (one operator; no multi-operator concurrency)"
    - "physical: presence requires body in the room"
    - "hardware: 6-camera fleet + 5-Pi NoIR + contact mic on Studio 24c Input 2"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability"
  constraint_narrowing: "single_user reduces hypothesis space to {present, absent}; physical-presence requires at least one positive sensor"
  symmetry: "time-translation invariant during a single session window"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"

speaker_is_operator:
  claim_name: speaker_is_operator
  structural_commitments:
    - "single_user axiom (the only enrolled identity is the operator; non-operator persons require active consent contracts per interpersonal_transparency)"
    - "session-level self-report: daimonion's session manager carries a ``speaker`` attribute set during conversation enrollment"
    - "voice modality only: this claim is about audio-conversation participants, not chat-author identity (that is chat_author_is_operator, Phase 6c-ii)"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability — narrowed by single_user toward operator-default once a session window opens"
  constraint_narrowing: "single_user collapses the hypothesis space to {operator, non-operator}; default-operator semantics under no-session reduces ambiguity (see wire-in: ``not session.is_active`` → operator by convention)"
  symmetry: "time-translation invariant during a single session window; resets at session boundaries"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"

system_degraded:
  claim_name: system_degraded
  structural_commitments:
    - "executive_function axiom: zero-config agents + automated routine work — degradation must be detectable from internal state without operator intervention"
    - "single-process invariant: degradation belief is process-local (no cross-host fusion); the watcher, drift detector, GPU monitor, and director are all in one host"
    - "operationally observable: each contributing signal is bounded (queue depth has a finite watermark; drift is a normalized float; GPU pressure has a hardware ceiling; cadence is tick-discrete)"
  reference_prior: "Beta(1,9); 0.10 starting probability — the system is healthy by default. Empirical operator-away window observation: ~10% of ticks see at least one degradation signal asserted (3499-004 incident excluded as pre-fix outlier)."
  constraint_narrowing: "Bias toward HEALTHY because (a) most ticks do not breach watermarks; (b) the cost of false-DEGRADED (recruitment slowdown, narration quieting) is higher than false-HEALTHY in the hot path. The asymmetric TemporalProfile (k_enter=2, k_exit=12) further narrows toward conservative behavior under doubt."
  symmetry: "time-translation invariant within a single boot window; resets at process restart (no persistence across boots — degradation belief is recomputed from current observations)"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 + §6 (asymmetric profiles)"

mood_valence_negative:
  claim_name: mood_valence_negative
  structural_commitments:
    - "single_user axiom: valence is a property of the (sole) operator; no cross-operator fusion needed"
    - "physical: negative-valence manifests through bounded biometric + behavioral channels (HRV depression, skin-temp drop, sleep debt, voice pitch elevation)"
    - "stimmung-adjacent: this claim is the Bayesian-posterior counterpart to the existing stimmung biometric dimension operator_stress; Phase 6b-ii.B may wire stimmung as a posterior consumer"
    - "quantize-tier discipline: the underlying continuous-valence-magnitude signal is quantized into a negative-tier boolean for ClaimEngine[bool]; continuous-posterior path lands later if option 1 proves insufficient"
  reference_prior: "Beta(2,8); 0.20 starting probability — operator is in neutral or positive-valence state during most working windows. Negative-valence is meaningful but not the default; 0.20 reflects empirical observation that ~20% of working windows carry at least one negative-affect signal under nominal operating conditions (refined empirically in Phase 6b-ii.B from baseline observation)."
  constraint_narrowing: "Bias toward POSITIVE/UNCERTAIN because (a) the cost of false-NEGATIVE (recruitment caution, narration softening, content steering away from operator's intent) is higher than false-POSITIVE in the hot path; (b) negative-valence claims affect downstream consumer behavior in ways that should require sustained evidence. The slow-enter / slow-exit TemporalProfile (k_enter=4, k_exit=6) further narrows toward conservative behavior under doubt — neither catastrophizing on a single low-HRV reading nor flipping to POSITIVE on a brief recovery."
  symmetry: "time-translation invariant within a working window; baseline (used by hrv_below_baseline + voice_pitch_elevated + sleep history) recalibrates at session boundaries — claim semantics are conditioned on the current session's baseline, not absolute physiological values"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + §6 (Phase 6b mood claims)"

mood_arousal_high:
  claim_name: mood_arousal_high
  structural_commitments:
    - "single_user axiom: arousal is a property of the (sole) operator; no cross-operator fusion needed"
    - "physical: arousal manifests through bounded sensor channels (contact mic onsets, room ambient RMS, MIDI clock rate, heart-rate-above-baseline)"
    - "stimmung-adjacent: this claim is the Bayesian-posterior counterpart to the existing stimmung biometric/cognitive dimensions (operator_energy, operator_stress, physiological_coherence) — Phase 6b-i.B may wire stimmung as a posterior consumer"
    - "quantize-tier discipline: the underlying continuous-arousal-magnitude signal is quantized into a high-tier boolean for ClaimEngine[bool]; continuous-posterior path lands in Phase 6b-i.B if option 1 proves insufficient"
  reference_prior: "Beta(2,5); 0.30 starting probability — operator is below the high-arousal threshold during most working windows but high-arousal is not rare. Refined empirically in Phase 6b-i.B from baseline observation; 0.30 chosen to leave room for evidence in either direction without forcing the default to either tier extreme."
  constraint_narrowing: "Mid prior reflects that the high-arousal claim is a tier-cut boolean (~30% of ticks fall in the upper tier under nominal operating distribution). The roughly-symmetric TemporalProfile (k_enter=3, k_exit=4) reflects that mood shifts move more readily in both directions than presence or system-degradation, but arousal-asserting events get a slight head start over recovery to avoid flicker on isolated calm bursts."
  symmetry: "time-translation invariant within a working window; baseline (used by hr_bpm_above_baseline + ambient quantiles) recalibrates at session boundaries — claim semantics are conditioned on the current session's baseline, not absolute physiological values"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + §6 (Phase 6b mood claims)"
