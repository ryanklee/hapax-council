# Prior-provenance registry — Phase 0 FULL
#
# Operator directive 2026-04-24T22:40Z (verbatim):
#   "Lack of priors is itself a prior and we must somehow ensure that
#    priors are not generated adhoc but derivations of invariants that
#    won't keep us guessing."
#
# Per-claim record of how the prior was derived. Schema is
# shared.claim.PriorProvenance. CI rule HPX004 enforces that every
# Claim's `prior_provenance_ref` resolves to a key in this file.
#
# Reference: docs/research/2026-04-24-universal-bayesian-claim-confidence.md
# §4 (Prior Derivation from Invariants).

operator_present:
  claim_name: operator_present
  structural_commitments:
    - "single_user axiom (one operator; no multi-operator concurrency)"
    - "physical: presence requires body in the room"
    - "hardware: 6-camera fleet + 5-Pi NoIR + contact mic on Studio 24c Input 2"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability"
  constraint_narrowing: "single_user reduces hypothesis space to {present, absent}; physical-presence requires at least one positive sensor"
  symmetry: "time-translation invariant during a single session window"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"

speaker_is_operator:
  claim_name: speaker_is_operator
  structural_commitments:
    - "single_user axiom (the only enrolled identity is the operator; non-operator persons require active consent contracts per interpersonal_transparency)"
    - "session-level self-report: daimonion's session manager carries a ``speaker`` attribute set during conversation enrollment"
    - "voice modality only: this claim is about audio-conversation participants, not chat-author identity (that is chat_author_is_operator, Phase 6c-ii)"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability — narrowed by single_user toward operator-default once a session window opens"
  constraint_narrowing: "single_user collapses the hypothesis space to {operator, non-operator}; default-operator semantics under no-session reduces ambiguity (see wire-in: ``not session.is_active`` → operator by convention)"
  symmetry: "time-translation invariant during a single session window; resets at session boundaries"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"
