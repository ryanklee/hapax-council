# Prior-provenance registry — Phase 0 FULL
#
# Operator directive 2026-04-24T22:40Z (verbatim):
#   "Lack of priors is itself a prior and we must somehow ensure that
#    priors are not generated adhoc but derivations of invariants that
#    won't keep us guessing."
#
# Per-claim record of how the prior was derived. Schema is
# shared.claim.PriorProvenance. CI rule HPX004 enforces that every
# Claim's `prior_provenance_ref` resolves to a key in this file.
#
# Reference: docs/research/2026-04-24-universal-bayesian-claim-confidence.md
# §4 (Prior Derivation from Invariants).

operator_present:
  claim_name: operator_present
  structural_commitments:
    - "single_user axiom (one operator; no multi-operator concurrency)"
    - "physical: presence requires body in the room"
    - "hardware: 6-camera fleet + 5-Pi NoIR + contact mic on Studio 24c Input 2"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability"
  constraint_narrowing: "single_user reduces hypothesis space to {present, absent}; physical-presence requires at least one positive sensor"
  symmetry: "time-translation invariant during a single session window"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"

speaker_is_operator:
  claim_name: speaker_is_operator
  structural_commitments:
    - "single_user axiom (the only enrolled identity is the operator; non-operator persons require active consent contracts per interpersonal_transparency)"
    - "session-level self-report: daimonion's session manager carries a ``speaker`` attribute set during conversation enrollment"
    - "voice modality only: this claim is about audio-conversation participants, not chat-author identity (that is chat_author_is_operator, Phase 6c-ii)"
  reference_prior: "Beta(1,1) uniform; 0.5 starting probability — narrowed by single_user toward operator-default once a session window opens"
  constraint_narrowing: "single_user collapses the hypothesis space to {operator, non-operator}; default-operator semantics under no-session reduces ambiguity (see wire-in: ``not session.is_active`` → operator by convention)"
  symmetry: "time-translation invariant during a single session window; resets at session boundaries"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4"

chat_author_is_operator:
  claim_name: chat_author_is_operator
  structural_commitments:
    - "single_user axiom (the only enrolled identity is the operator; non-operator chat-authors require active consent contracts per interpersonal_transparency)"
    - "broadcast cardinality: chat surfaces are designed for audience > 1 (Discord/Bluesky/Mastodon/IRC interactive flows + livestream chat); the dominant author cardinality is non-operator"
    - "authenticated handle space: cryptographic identifiers (Discord user_id, Bluesky DID, Mastodon acct, IRC nick+cert) are not spoofable by chance — handle match is structural evidence, not perceptual"
    - "no per-author engine state: the engine tracks a single sustained author at a time; per-author caching is the consumer's responsibility, surfacing the persistent-state-about-non-operator-persons concern at the consumer layer for governance review"
  reference_prior: "Beta(1,19); 0.05 starting probability — broadcast chat is dominated by non-operator authors. interpersonal_transparency requires defaulting to non-operator absent positive evidence; the cost of false-positive (mis-attributing audience message to operator) is governance-significant, the cost of false-negative (missing an operator interjection) is recoverable via re-attribution on subsequent messages"
  constraint_narrowing: "interpersonal_transparency narrows the prior toward non-operator (vs. speaker_is_operator's 0.5 default-operator-under-no-session); the high narration_floor (0.85) further narrows toward 'unclear → unknown' rather than 'unclear → operator' to keep mis-attribution out of broadcast surfaces and qdrant persistence"
  symmetry: "time-translation invariant within a single sustained chat-author lifecycle (conversation thread, Q&A turn); resets at author boundaries — engine carries no cross-author state by design"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 + §6 (asymmetric profiles); positive-only multi-source fusion is the noisy-OR semantic shape (ClaimComposition operator='noisy_or')"

system_degraded:
  claim_name: system_degraded
  structural_commitments:
    - "executive_function axiom: zero-config agents + automated routine work — degradation must be detectable from internal state without operator intervention"
    - "single-process invariant: degradation belief is process-local (no cross-host fusion); the watcher, drift detector, GPU monitor, and director are all in one host"
    - "operationally observable: each contributing signal is bounded (queue depth has a finite watermark; drift is a normalized float; GPU pressure has a hardware ceiling; cadence is tick-discrete)"
  reference_prior: "Beta(1,9); 0.10 starting probability — the system is healthy by default. Empirical operator-away window observation: ~10% of ticks see at least one degradation signal asserted (3499-004 incident excluded as pre-fix outlier)."
  constraint_narrowing: "Bias toward HEALTHY because (a) most ticks do not breach watermarks; (b) the cost of false-DEGRADED (recruitment slowdown, narration quieting) is higher than false-HEALTHY in the hot path. The asymmetric TemporalProfile (k_enter=2, k_exit=12) further narrows toward conservative behavior under doubt."
  symmetry: "time-translation invariant within a single boot window; resets at process restart (no persistence across boots — degradation belief is recomputed from current observations)"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 + §6 (asymmetric profiles)"

mood_coherence_low:
  claim_name: mood_coherence_low
  structural_commitments:
    - "single_user axiom: coherence is a property of the (sole) operator's autonomic state; no cross-operator fusion needed"
    - "physical: low coherence manifests through bounded biometric channels (HRV beat-to-beat variability, respiration rhythm, accelerometer micro-movement, skin temp thermoregulation) — all derivable from existing Pixel Watch sensor surface"
    - "stimmung-adjacent: this claim is the Bayesian-posterior counterpart to the existing stimmung biometric dimension physiological_coherence; Phase 6b-iii.B may wire stimmung as a posterior consumer"
    - "quantize-tier discipline: the underlying continuous-coherence-magnitude signal is quantized into a low-tier boolean for ClaimEngine[bool]; continuous-posterior path lands later if option 1 proves insufficient"
    - "negative-tier framing: the claim is `coherence_is_low` so the asserted-state corresponds to dysregulated autonomic state — mirrors SystemDegradedEngine's HEALTHY/DEGRADED orientation rather than positive-tier semantics"
  reference_prior: "Beta(2,11); 0.15 starting probability — operator's autonomic coherence is at or above baseline during most working windows. Low-coherence is rare under nominal conditions; 0.15 reflects empirical observation that coherence rarely drops in a healthy adult during focused work (refined empirically in Phase 6b-iii.B from baseline observation). The lower-than-arousal-or-valence prior reflects coherence's relative stability under most operating conditions."
  constraint_narrowing: "Bias toward COHERENT/UNCERTAIN because (a) low-coherence claims affect downstream consumer behavior (recruitment caution, narration softening, cadence stretch) in ways that should require sustained evidence; (b) a single high-variability reading can have benign causes (movement artifact, sensor placement). The slow-enter / slower-exit TemporalProfile (k_enter=4, k_exit=8) further narrows toward conservative behavior under doubt — neither catastrophizing on a single high-CV reading nor flipping to COHERENT on a brief recovery, since autonomic regulation re-establishes slowly after dysregulation."
  symmetry: "time-translation invariant within a working window; baseline (used by all four signals' threshold derivation) recalibrates at session boundaries — claim semantics are conditioned on the current session's baseline, not absolute physiological values"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + §6 (Phase 6b mood claims)"

mood_valence_negative:
  claim_name: mood_valence_negative
  structural_commitments:
    - "single_user axiom: valence is a property of the (sole) operator; no cross-operator fusion needed"
    - "physical: negative-valence manifests through bounded biometric + behavioral channels (HRV depression, skin-temp drop, sleep debt, voice pitch elevation)"
    - "stimmung-adjacent: this claim is the Bayesian-posterior counterpart to the existing stimmung biometric dimension operator_stress; Phase 6b-ii.B may wire stimmung as a posterior consumer"
    - "quantize-tier discipline: the underlying continuous-valence-magnitude signal is quantized into a negative-tier boolean for ClaimEngine[bool]; continuous-posterior path lands later if option 1 proves insufficient"
  reference_prior: "Beta(2,8); 0.20 starting probability — operator is in neutral or positive-valence state during most working windows. Negative-valence is meaningful but not the default; 0.20 reflects empirical observation that ~20% of working windows carry at least one negative-affect signal under nominal operating conditions (refined empirically in Phase 6b-ii.B from baseline observation)."
  constraint_narrowing: "Bias toward POSITIVE/UNCERTAIN because (a) the cost of false-NEGATIVE (recruitment caution, narration softening, content steering away from operator's intent) is higher than false-POSITIVE in the hot path; (b) negative-valence claims affect downstream consumer behavior in ways that should require sustained evidence. The slow-enter / slow-exit TemporalProfile (k_enter=4, k_exit=6) further narrows toward conservative behavior under doubt — neither catastrophizing on a single low-HRV reading nor flipping to POSITIVE on a brief recovery."
  symmetry: "time-translation invariant within a working window; baseline (used by hrv_below_baseline + voice_pitch_elevated + sleep history) recalibrates at session boundaries — claim semantics are conditioned on the current session's baseline, not absolute physiological values"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + §6 (Phase 6b mood claims)"

mood_arousal_high:
  claim_name: mood_arousal_high
  structural_commitments:
    - "single_user axiom: arousal is a property of the (sole) operator; no cross-operator fusion needed"
    - "physical: arousal manifests through bounded sensor channels (contact mic onsets, room ambient RMS, MIDI clock rate, heart-rate-above-baseline)"
    - "stimmung-adjacent: this claim is the Bayesian-posterior counterpart to the existing stimmung biometric/cognitive dimensions (operator_energy, operator_stress, physiological_coherence) — Phase 6b-i.B may wire stimmung as a posterior consumer"
    - "quantize-tier discipline: the underlying continuous-arousal-magnitude signal is quantized into a high-tier boolean for ClaimEngine[bool]; continuous-posterior path lands in Phase 6b-i.B if option 1 proves insufficient"
  reference_prior: "Beta(2,5); 0.30 starting probability — operator is below the high-arousal threshold during most working windows but high-arousal is not rare. Refined empirically in Phase 6b-i.B from baseline observation; 0.30 chosen to leave room for evidence in either direction without forcing the default to either tier extreme."
  constraint_narrowing: "Mid prior reflects that the high-arousal claim is a tier-cut boolean (~30% of ticks fall in the upper tier under nominal operating distribution). The roughly-symmetric TemporalProfile (k_enter=3, k_exit=4) reflects that mood shifts move more readily in both directions than presence or system-degradation, but arousal-asserting events get a slight head start over recovery to avoid flicker on isolated calm bursts."
  symmetry: "time-translation invariant within a working window; baseline (used by hr_bpm_above_baseline + ambient quantiles) recalibrates at session boundaries — claim semantics are conditioned on the current session's baseline, not absolute physiological values"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + §6 (Phase 6b mood claims)"

operator_activity:
  claim_name: operator_activity
  structural_commitments:
    - "single_user axiom: activity is a property of the (sole) operator — no cross-operator fusion needed"
    - "engagement vs. occupation distinction: this claim measures *active engaged work*, not *body in the room*. Heart-rate / face / BLE proximity belong to PresenceEngine; OperatorActivityEngine reads keyboard / MIDI clock / desk taps / window focus / watch motion. The signal sets are deliberately disjoint to keep the two posteriors independently meaningful."
    - "physical: activity manifests through bounded sensor channels (evdev keystroke rate, OXI MIDI clock pulse, Cortado contact mic taps, Hyprland focus events, Pixel Watch accelerometer delta)"
    - "tick-discrete: each signal is observed at the daimonion perception cadence (~5s); engine state is derived from sustained patterns over multiple ticks via the asymmetric TemporalProfile"
  reference_prior: "Beta(3,7); 0.30 starting probability — operator is in a focused-work state during ~30% of waking hours by rough self-report. Bias toward IDLE because (a) most ticks are at-rest / reading / waiting; (b) the cost of false-ACTIVE (overzealous narration cadence, recruitment churn) is moderate, while the cost of false-IDLE is low (the system simply quiets briefly until the next signal). Refined empirically in 6a-i.B from live signal stream observation."
  constraint_narrowing: "Bias toward IDLE because activity is the assertion-requires-positive-evidence claim; absence of all five signals is genuine evidence of IDLE, not unknown. The asymmetric TemporalProfile (k_enter=1, k_exit=8) reflects that engagement bursts onto the stage immediately on a single strong cue (keyboard / MIDI clock) but recovery to IDLE requires sustained signal absence — brief reading pauses must not flip state."
  symmetry: "time-translation invariant within a single waking window; resets at process restart (no persistence across boots — activity belief is recomputed from current observations)"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 + §6 (asymmetric profiles); beta scope direction 2026-04-25T02:18Z (Phase 6a delta-canonical)"

vinyl_spinning:
  claim_name: vinyl_spinning
  structural_commitments:
    - "single_user axiom: vinyl-spinning is a property of the (sole) operator's deck — no multi-deck fusion"
    - "physical: vinyl-spinning manifests through bounded sensor channels (Pi-6 NoIR overhead camera + ALBUM_STATE_FILE freshness + contact_mic_ir scratch detection + future YAMNet on L-12). Most observations across a waking window are silence or non-vinyl audio."
    - "tick-discrete: each signal is observed at the studio_compositor director cadence; engine state is derived from sustained conjunctive evidence via the slow-enter / fast-exit asymmetric TemporalProfile"
    - "operator-perceptible cost asymmetry: false-positive vinyl claims break the livestream's grounding contract (operator's reported pain — Task #185, hallucination class fixed tactically in #1208/#1210/#1211/#1220 then structurally in #1431); false-negative vinyl claims silently degrade narration quality. Profile is biased to slow-enter / fast-exit accordingly (k_enter=6, k_exit=2, decay_rate=0.08)."
  reference_prior: "Beta(1,9); 0.10 starting probability — vinyl-spinning is rare across a livestream window. Most ticks the platter is idle (operator working / curated playlist / dead air / recording / off-air). Refined empirically from live signal stream once Phase 2b YAMNet ships and the engine has audio-evidence ground truth to calibrate against."
  constraint_narrowing: "Bias toward NOT_SPINNING because spinning is the assertion-requires-positive-evidence claim; absence of cover_and_hand AND operator_override is genuine evidence of NOT_SPINNING, not unknown. The conjunctive cover_and_hand signal (cover_fresh AND hand_on_turntable) is upstream of LR fusion to preserve the load-bearing AND from the legacy Boolean predicate — cover-alone-while-platter-idle (the operator's reported hallucination) contributes ZERO log-odds, not slowly-accumulating-weak-positive."
  symmetry: "time-translation invariant within a single livestream window; resets at process restart (no persistence across boots)"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + docs/operations/2026-04-25-workstream-realignment-v4-audit-incorporated.md AUDIT-07; Task #185 retrospective"

music_playing:
  claim_name: music_playing
  structural_commitments:
    - "single_user axiom: music-playing is a property of the (single) broadcast L-12 bus — no multi-bus fusion"
    - "physical: music manifests through bounded perceptible channels (the broadcast audio itself, classified via PANNs/YAMNet on AudioSet 527-class ontology)"
    - "tick-discrete: each tick captures a 3-second audio window from the broadcast L-12 monitor (hapax-livestream-tap.monitor) and runs PANNs classification on it"
    - "audio-evidence layer: the PANNs music-class posterior on broadcast audio is structurally decoupled from upstream perception (album-identifier, IR camera, contact-mic). This is the third hallucination axis closer — audio-silent + cover-fresh + hand-recent → still claimed music in the legacy pipeline; PANNs on broadcast bus answers ground-truthfully."
    - "structurally orthogonal to vinyl_spinning: music_playing answers 'is sound audible to the audience right now'; vinyl_spinning answers 'is the platter the source.' Both posteriors composed at the consumer (director_loop._curated_music_framing)."
  reference_prior: "Beta(5,5); 0.50 starting probability — music is more common than vinyl-spinning across a livestream window (much of the stream has SOME music: vinyl, curated YouTube playlist, MPC pads, occasional SFX-only segments). The prior is symmetric because over a typical week of livestream the music-on / music-off distribution lands near 50/50."
  constraint_narrowing: "Symmetric prior because music_playing is bidirectional: high audio-energy in music-class is direct evidence ON; low audio-energy across music classes is direct evidence OFF. This is unlike vinyl_spinning where cover/hand absence is ambiguous (hardware idle vs perception failure)."
  symmetry: "time-translation invariant within a single livestream window; resets at process restart"
  derivation_document_ref: "docs/research/2026-04-24-universal-bayesian-claim-confidence.md §4 (priors) + docs/operations/2026-04-25-workstream-realignment-v4-audit-incorporated.md AUDIT-07 layer 2; agents/hapax_daimonion/ambient_classifier.py PANNs + AudioSet basis"
