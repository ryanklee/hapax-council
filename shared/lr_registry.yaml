# Likelihood-ratio registry — backfill of PresenceEngine's 14 signals
#
# Phase 0 STUB deliverable per docs/operations/2026-04-24-workstream-realignment-v3.md §3.2.
# CI rule HPX003 (Phase 0 FULL) will require every ClaimEngine signal to have an
# LRDerivation entry here with a documented source_category + estimation_reference.
#
# Every signal below is retroactively documented from PresenceEngine's
# DEFAULT_SIGNAL_WEIGHTS (agents/hapax_daimonion/presence_engine.py L27-48),
# which was hand-calibrated from the 2026-03-17 first live run. Backfill preserves
# the shipped values while declaring the ad-hoc provenance honestly — Phase 2+
# onwards every new signal must ship with a proper source_category (calibration_study,
# calibrated_classifier, physical_model, expert_elicitation_shelf, or
# online_recalibration) per research synthesis §5.
#
# Schema is shared.claim.LRDerivation; see shared/claim.py.

presence_signals:
  operator_face:
    claim_name: operator_present
    source_category: expert_elicitation_shelf
    p_true_given_h1: 0.90
    p_true_given_h0: 0.10
    positive_only: true
    estimation_reference: "DEFAULT_SIGNAL_WEIGHTS 2026-03-17 first-live-run calibration; InsightFace SCRFD face detection"
    calibration_window_s: null

  keyboard_active:
    claim_name: operator_present
    source_category: physical_model
    p_true_given_h1: 0.85
    p_true_given_h0: 0.05
