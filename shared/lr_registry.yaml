# Phase 6b-i.A — mood_arousal_high (alpha, this PR)
# Mood-claim posterior over operator's high-arousal state. Wired-in
# signal sources land in Phase 6b-i.B follow-up. Signal LR weights
# calibrated 2026-04-25 against PresenceEngine signal precedents
# (Cortado contact mic, OXI MIDI clock, Pixel Watch HR, Blue Yeti room
# mic). Quantize-into-tiers approach (option 1 from beta dispatch
# 02:18Z); continuous-posterior ClaimEngine[float] deferred to 6b-i.B
# if option 1 proves insufficient.
mood_arousal_high_signals:
  ambient_audio_rms_high:
    claim_name: mood_arousal_high
    source_category: expert_elicitation_shelf
    p_true_given_h1: 0.78
    p_true_given_h0: 0.18
    positive_only: false  # bidirectional — quiet rooms genuinely downvote arousal
    estimation_reference: "Blue Yeti room mic RMS energy above operator's recent quantile; threshold-source TBD in 6b-i.B"
    calibration_window_s: null

  contact_mic_onset_rate_high:
    claim_name: mood_arousal_high
    source_category: physical_model
    p_true_given_h1: 0.80
    p_true_given_h0: 0.10
    positive_only: true  # absence ambiguous (focused-quiet flow vs. low arousal)
    estimation_reference: "Cortado MKIII contact mic onset density above operator's recent quantile; physical-impact proxy"
    calibration_window_s: null

  midi_clock_bpm_high:
    claim_name: mood_arousal_high
    source_category: physical_model
    p_true_given_h1: 0.85
    p_true_given_h0: 0.08
    positive_only: false  # bidirectional — slow MIDI clock evidences low arousal
    estimation_reference: "OXI One MIDI clock pulse rate above tempo threshold; direct artefact of operator action"
    calibration_window_s: null

  hr_bpm_above_baseline:
    claim_name: mood_arousal_high
    source_category: physical_model
    p_true_given_h1: 0.75
    p_true_given_h0: 0.20
    positive_only: false  # bidirectional — HR below baseline genuine CALM evidence
    estimation_reference: "Pixel Watch heart rate vs. operator's session baseline; matches PresenceEngine watch_hr 120s BLE staleness cutoff"
    calibration_window_s: 120.0

# Phase 6b-ii.A — mood_valence_negative (alpha, this PR)
# Mood-claim posterior over operator's negative-valence state. Wired-in
# signal sources land in Phase 6b-ii.B follow-up. Signal LR weights
# calibrated 2026-04-25 against Pixel Watch biometric channels (HRV,
# skin temp, sleep) and voice-pipeline pitch tracking. Quantize-into-
# tiers approach (option 1 from beta dispatch 02:18Z); continuous-
# posterior ClaimEngine[float] deferred if option 1 proves insufficient.
mood_valence_negative_signals:
  hrv_below_baseline:
    claim_name: mood_valence_negative
    source_category: physical_model
    p_true_given_h1: 0.78
    p_true_given_h0: 0.20
    positive_only: false  # bidirectional — high HRV evidences positive parasympathetic state
    estimation_reference: "Pixel Watch HRV vs operator's recent baseline; matches PresenceEngine watch_hr 120s BLE staleness cutoff"
    calibration_window_s: 120.0

  skin_temp_drop:
    claim_name: mood_valence_negative
    source_category: physical_model
    p_true_given_h1: 0.70
    p_true_given_h0: 0.15
    positive_only: true  # absence ambiguous (neutral OR positive valence)
    estimation_reference: "Pixel Watch skin temperature drop from baseline; vasoconstriction stress correlate"
    calibration_window_s: null

  sleep_debt_high:
    claim_name: mood_valence_negative
    source_category: physical_model
    p_true_given_h1: 0.65
    p_true_given_h0: 0.18
    positive_only: true  # adequate sleep doesn't actively evidence positive valence
    estimation_reference: "Accumulated sleep deficit > tolerance threshold (e.g. <6.5h average over recent nights)"
    calibration_window_s: null

  voice_pitch_elevated:
    claim_name: mood_valence_negative
    source_category: expert_elicitation_shelf
    p_true_given_h1: 0.72
    p_true_given_h0: 0.20
    positive_only: true  # baseline pitch ambiguous (calm OR engaged-but-not-stressed)
    estimation_reference: "Voice pitch elevated above operator's session baseline; stress correlate in speech"
    calibration_window_s: null

