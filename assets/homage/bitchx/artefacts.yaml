# BitchX homage signature artefact corpus.
#
# Agent-authored content only (spec §4.7 generated_content_only=True).
# No captured chat, no named persons other than the operator (Hapax),
# no feedback language about individuals (management_governance axiom).
#
# Forms:
# - quit-quip:   short Hapax-authored epigram in BitchX.quit register
# - join-banner: CP437 block-art banner with inline attribution
# - motd-block:  longer framed MOTD panel, structural-cadence rotation
# - kick-reason: bracketed [TAG] aphorism used as transition chrome
#
# Each entry declares form + content + author_tag (e.g. "by Hapax").
# Weight defaults 1.0; lower for less-frequent rotations.
#
# Corpus is curated. Expansion goes through the same axiom review as
# any agent-generated content. No live-generation into this file without
# a DEVIATION or a new research condition.

