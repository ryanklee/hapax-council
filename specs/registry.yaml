# Hapax Corpora Operational Specifications
#
# These are positive invariants the system must maintain for the Corpora
# experience to function. Unlike axioms (which prohibit), specs define
# what each circulatory system IS — its essential properties, cadences,
# and guarantees. Deviation from spec is operational degradation.
#
# Organized by circulatory system, not by module. A spec failure means
# the system can't perceive, regulate, learn, or respond properly.
#
# Tiers:
#   V0 (vital): Failure renders the Corpora experience non-functional.
#               The system cannot operate without this.
#   V1 (essential): Degraded experience. The system works but poorly.
#                   Operator will notice within minutes.
#   V2 (quality): Reduced quality. The system works but is less responsive,
#                 less intelligent, or less smooth. Operator may not notice
#                 immediately but experience degrades over days.
#
# Verification methods:
#   runtime: Checked during operation (periodic heartbeat)
#   integration: Checked by integration test
#   structural: Checked by static analysis / grep

version: 1
schema_version: "1-0-0"

systems:

  # ═══════════════════════════════════════════════════════════════════
  # PERCEPTION CIRCULATION
  # The system's sensory surface. Without this, nothing downstream works.
  # ═══════════════════════════════════════════════════════════════════

  - id: perception
    name: Perception Circulation
    heartbeat: "2.5s (perception tick)"
    description: >
      Fuses audio, visual, and workspace signals into a unified
      EnvironmentState every fast tick. Feeds all downstream circulations.

    specs:
      - id: pc-heartbeat-001
        tier: V0
        text: >
          The perception ring buffer must receive a push at least every
          5 seconds during daemon operation. A gap >10s means the system
          has lost sensory contact with the environment.
        properties:
          - 'ring buffer depth >= 2 snapshots'
          - newest snapshot age < 5s
          - each snapshot contains timestamp, flow_score, production_activity
        verification: runtime
        measured_by: perception_age_s in TemporalContext

      - id: pc-backend-coverage-001
        tier: V1
        text: >
          At least 3 perception backends must be registered and available.
          Fewer than 3 means the system is partially blind.
        properties:
          - 'registered_backends count >= 3'
          - each backend.available() returns True
          - 'aggregate_confidence >= 0.5'
        verification: runtime
        measured_by: aggregate_confidence in perception-state.json

      - id: pc-ring-depth-001
        tier: V2
        text: >
          The perception ring buffer should maintain at least 10 snapshots
          (~25s of history) for meaningful trend computation. Below 5
          snapshots, temporal bands and protention degrade.
        properties:
          - 'ring.__len__() >= 10 during steady state'
          - 'trend computation requires >= 2 data points'
        verification: integration

      - id: pc-snapshot-completeness-001
        tier: V1
        text: >
          Each perception snapshot must contain all core fields: timestamp,
          flow_score, production_activity, audio_energy_rms, heart_rate_bpm,
          consent_phase. Missing fields cause downstream NoneType errors
          and incorrect state classification.
        properties:
          - 'timestamp key present and > 0'
          - 'flow_score key present (float 0.0-1.0)'
          - 'production_activity key present (string)'
          - 'audio_energy_rms key present (float >= 0)'
          - 'consent_phase key present (string)'
        verification: runtime

  # ═══════════════════════════════════════════════════════════════════
  # STIMMUNG CIRCULATION
  # The system's self-awareness. Without this, it can't regulate itself.
  # ═══════════════════════════════════════════════════════════════════

  - id: stimmung
    name: Stimmung Circulation
    heartbeat: "15s nominal, 5s when stressed"
    description: >
      Aggregates health, GPU, engine, perception, and LLM cost into a
      6-dimension self-state vector. Colors all downstream processing.

    specs:
      - id: st-heartbeat-001
        tier: V0
        text: >
          The stimmung state file must be written at least every 20s
          during aggregator operation. Stale stimmung (>120s) causes
          all dimensions to be excluded from stance computation,
          collapsing to a false-nominal that masks real problems.
        properties:
          - /dev/shm/hapax-stimmung/state.json exists
          - file modified within last 20s
          - JSON parses successfully
          - overall_stance field present
        verification: runtime
        measured_by: file mtime

      - id: st-dimension-coverage-001
        tier: V1
        text: >
          All 6 stimmung dimensions must have non-stale readings
          (freshness_s < 120) during normal operation. A stale dimension
          is invisible to stance computation — the system can't feel
          that part of itself.
        properties:
          - health.freshness_s < 120
          - resource_pressure.freshness_s < 120
          - error_rate.freshness_s < 120
          - processing_throughput.freshness_s < 120
          - perception_confidence.freshness_s < 120
          - llm_cost_pressure.freshness_s < 120
        verification: runtime

      - id: st-trend-quality-001
        tier: V2
        text: >
          Each dimension should have at least 3 readings in its rolling
          window for trend detection to work. Below 3, trend is always
          "stable" regardless of actual trajectory.
        properties:
          - 'rolling window deque length >= 3 per dimension'
          - trend computation produces rising/falling/stable (not just stable)
        verification: integration

      - id: st-consumer-coverage-001
        tier: V1
        text: >
          Every pydantic-ai agent invocation must have access to current
          stimmung stance via get_system_prompt_fragment(). An agent
          without stimmung context will behave the same under stress
          as under nominal — it can't adapt.
        properties:
          - all Agent() constructors use get_system_prompt_fragment()
          - get_system_prompt_fragment() calls _read_stimmung_block()
          - _read_stimmung_block() reads /dev/shm/hapax-stimmung/state.json
        verification: structural

      - id: st-modulation-001
        tier: V1
        text: >
          Stimmung stance must modulate at least: reactive engine phase
          gating, visual ambient params, content scheduler density, and
          active correction suppression. Without modulation, stimmung is
          measured but not felt — data without function.
        properties:
          - engine._handle_change checks stance and gates phases
          - DisplayStateMachine._compute_ambient_params accepts stimmung_stance
          - ContentScheduler._compute_density checks stimmung_stance
          - CorrectionSeeker.evaluate checks stimmung_stance
        verification: structural

      - id: st-adaptive-poll-001
        tier: V2
        text: >
          When stimmung stance is degraded or critical, the health poll
          interval should decrease to 5s (from 15s) to track recovery
          faster. The system should be more attentive to itself when sick.
        properties:
          - health_interval = 5.0 when stance in (degraded, critical)
          - health_interval = HEALTH_POLL_S (15.0) otherwise
        verification: integration

  # ═══════════════════════════════════════════════════════════════════
  # TEMPORAL CIRCULATION
  # The system's sense of time. Without this, every moment is flat.
  # ═══════════════════════════════════════════════════════════════════

  - id: temporal
    name: Temporal Circulation
    heartbeat: "2.5s (tick), 60s (minute), session-bounded"
    description: >
      Provides temporal thickness: retention (past), impression (present),
      protention (future), surprise (deviation from expectation).

    specs:
      - id: tp-protention-learning-001
        tier: V1
        text: >
          The protention engine must persist learned state at least every
          5 minutes and on clean shutdown. Lost observations must not
          exceed 5 minutes of data. Without persistence, the system
          forgets what usually happens next every time it restarts.
        properties:
          - protention state saved every 300s in _api_poll_loop
          - protention state saved in close()
          - state file at ~/.cache/hapax-voice/protention-state.json
          - load() called in __init__
        verification: integration

      - id: tp-protention-observation-001
        tier: V1
        text: >
          The protention engine must observe every perception tick's
          activity and flow_score. Gaps in observation degrade Markov
          chain accuracy and circadian model coverage.
        properties:
          - protention.observe() called in poll_perception()
          - 'activity comes from best available source (workspace > LLM > empty)'
          - flow_score passed as float
          - hour passed as int
        verification: structural

      - id: tp-surprise-continuity-001
        tier: V2
        text: >
          Surprise detection must compare the current tick's state against
          the previous tick's protention predictions. If _last_protention
          is lost (e.g., formatter re-instantiated), surprise scoring
          resets to zero — the system temporarily can't detect deviations.
        properties:
          - TemporalBandFormatter retains _last_protention across ticks
          - _compute_surprise called before _build_protention (order matters)
          - surprises stored in TemporalBands.surprises field
        verification: integration

      - id: tp-multiscale-minute-001
        tier: V2
        text: >
          MinuteBuffer must produce a MinuteSummary every 60s ± 5s.
          Missed minutes leave gaps in the session and day summaries,
          reducing the system's awareness of longer-term patterns.
        properties:
          - MinuteBuffer.tick() called every perception tick
          - 'summary produced when elapsed >= 60s'
          - maxlen = 30 (30 minutes of history)
        verification: integration

      - id: tp-predictive-cache-001
        tier: V2
        text: >
          The predictive cache must precompute after every visual tick
          and match before every visual tick. Cache hit rate should be
          logged periodically. Without the cache, visual transitions
          lag by one full tick interval.
        properties:
          - precompute() called after state computation in compute_and_write()
          - match() called before state computation in compute_and_write()
          - 'only predictions with p >= 0.4 cached'
          - cached scenarios have TTL (expected_in_s * 1.5, max 60s)
        verification: structural

  # ═══════════════════════════════════════════════════════════════════
  # VISUAL CIRCULATION
  # The system's expressive surface. Without this, the operator can't
  # see what the system is feeling/thinking/doing.
  # ═══════════════════════════════════════════════════════════════════

  - id: visual
    name: Visual Circulation
    heartbeat: "0.5-5s adaptive"
    description: >
      Computes display state, ambient params, and signal opacities.
      Writes atomically for the compositor to render.

    specs:
      - id: vs-heartbeat-001
        tier: V0
        text: >
          The visual layer state file must be written at least every 6s
          during aggregator operation. The compositor reads this file
          to render — stale state means a frozen visual field.
        properties:
          - /dev/shm/hapax-compositor/visual-layer-state.json exists
          - file modified within last 6s
          - JSON parses to valid VisualLayerState
        verification: runtime

      - id: vs-adaptive-cadence-001
        tier: V1
        text: >
          The visual tick interval must adapt to system volatility.
          State transitions → 0.5s. Voice active → 1.0s. Ambient quiet
          → 5.0s. Without adaptation, the system either wastes compute
          or responds sluggishly.
        properties:
          - _adaptive_tick_interval returns 0.5s on state transition
          - returns 1.0s when voice active
          - returns 5.0s in sustained ambient
          - bounded to [0.5, 5.0]
        verification: integration

      - id: vs-stimmung-warmth-001
        tier: V1
        text: >
          Ambient field color_warmth must increase with stimmung stance.
          Cautious: +0.15. Degraded: +0.35. Critical: +0.60. This is
          how the operator subconsciously perceives system stress —
          the field literally warms when the system is struggling.
        properties:
          - _compute_ambient_params accepts stimmung_stance parameter
          - nominal → no warmth added
          - cautious → +0.15 warmth, +0.05 speed
          - degraded → +0.35 warmth, +0.1 speed, +0.1 turbulence
          - critical → +0.60 warmth, +0.2 speed, +0.2 turbulence
        verification: integration

  # ═══════════════════════════════════════════════════════════════════
  # EXPERIENTIAL CIRCULATION
  # The system's capacity to learn. Without this, it never gets better.
  # ═══════════════════════════════════════════════════════════════════

  - id: experiential
    name: Experiential Circulation
    heartbeat: "episode-bounded (variable), daily consolidation"
    description: >
      Records corrections, accumulates episodes, consolidates patterns,
      and proactively seeks operator feedback when uncertain.

    specs:
      - id: ex-episode-boundary-001
        tier: V1
        text: >
          EpisodeBuilder must detect and record episodes on every
          activity transition, flow state shift, consent change, and
          time gap >60s. Missed boundaries mean lost episodes — the
          system can't learn from experiences it didn't record.
        properties:
          - observe() called every perception tick in _tick_experiential
          - boundary detected on activity change (production_activity)
          - boundary detected on flow state change (idle/warming/active)
          - boundary detected on consent_phase change
          - 'boundary detected on time gap > 60s'
          - completed episodes recorded to Qdrant operator-episodes
        verification: integration

      - id: ex-episode-flush-001
        tier: V2
        text: >
          Partial episodes must be flushed on clean shutdown. Without
          this, the last activity session before every restart is lost.
        properties:
          - EpisodeBuilder.flush() called in aggregator.close()
          - flushed episode recorded to Qdrant if episode_store available
        verification: structural

      - id: ex-correction-intake-001
        tier: V1
        text: >
          Operator corrections submitted via the activity-correction.json
          file must be detected and recorded to Qdrant within one
          perception tick (~2.5s). Late or missed corrections break
          the feedback loop.
        properties:
          - check_for_corrections() called in _tick_experiential
          - reads /dev/shm/hapax-compositor/activity-correction.json
          - records to operator-corrections Qdrant collection
          - ignores corrections older than 5 minutes
        verification: integration

      - id: ex-consolidation-trigger-001
        tier: V2
        text: >
          Pattern consolidation must run at least once per day when
          episodes exist. Without consolidation, accumulated episodes
          never become actionable patterns.
        properties:
          - pattern-consolidation reactive rule registered (Phase 2)
          - cooldown_s = 86400 (daily)
          - quiet window = 300s (fires after 5 min of perception stability)
          - run_consolidation fetches episodes, corrections, existing patterns
          - new patterns stored in operator-patterns Qdrant collection
        verification: structural

      - id: ex-correction-seeking-001
        tier: V2
        text: >
          The correction seeker must evaluate uncertainty every perception
          tick and ask questions when confidence is below threshold.
          Constraints: max 5/day, 10 min cooldown, suppressed when
          stimmung is degraded/critical, never re-asks same combo.
        properties:
          - evaluate() called in _tick_experiential
          - daily_budget = 5
          - cooldown_s = 600
          - confidence_threshold = 0.4
          - suppressed when stance in (degraded, critical)
          - writes to /dev/shm/hapax-compositor/correction-question.json
        verification: integration

      - id: ex-pattern-decay-001
        tier: V2
        text: >
          Pattern confidence must decay when not confirmed. After 30 days
          unconfirmed, confidence drops 5% per consolidation run. After
          60 days at <0.1 confidence, the pattern is deactivated. Without
          decay, obsolete patterns persist forever.
        properties:
          - decay() called on each active pattern during consolidation
          - confidence *= 0.95 after 30 days
          - 'active = False when confidence < 0.1 and days > 60'
          - decayed patterns re-saved to Qdrant (was a bug, now fixed)
        verification: integration

  # ═══════════════════════════════════════════════════════════════════
  # TELEMETRY CIRCULATION
  # The system's legibility. Without this, we can't see the circulations.
  # ═══════════════════════════════════════════════════════════════════

  - id: telemetry
    name: Telemetry Circulation
    heartbeat: "per-tick (piggybacks on other circulations)"
    description: >
      Langfuse instrumentation that makes all circulatory systems
      visible. Each system emits spans, events, and scores.

    specs:
      - id: tl-system-coverage-001
        tier: V2
        text: >
          Each circulatory system must emit at least one Langfuse span
          or event per heartbeat cycle. Systems without telemetry are
          operationally invisible.
        properties:
          - stimmung.update span emitted every stimmung update
          - visual.tick span emitted every visual tick
          - prediction.tick span emitted every visual tick
          - experiential.episode_closed event on each episode boundary
          - stimmung.stance_change event on stance transitions
        verification: runtime
        measured_by: Langfuse trace count per system tag

      - id: tl-interaction-visibility-001
        tier: V2
        text: >
          Cross-system interactions must be logged as Langfuse events
          with source and target tags. Without interaction traces,
          the circulatory topology is invisible.
        properties:
          - stimmung→engine.phase_gating logged when actions skipped
          - stimmung→visual.ambient_modulation logged when non-nominal
          - 'events tagged with both system:source and system:target'
        verification: structural

      - id: tl-graceful-absence-001
        tier: V0
        text: >
          All telemetry calls must be no-ops when Langfuse is unavailable.
          Telemetry must never block, crash, or slow any circulatory
          system. The system must run perfectly without Langfuse.
        properties:
          - _get_langfuse() returns None when client unavailable
          - all hapax_span/hapax_event/hapax_score handle None gracefully
          - no telemetry function raises exceptions
          - all telemetry wrapped in try/except with silent fallback
        verification: integration

  # ═══════════════════════════════════════════════════════════════════
  # SERVICE INFRASTRUCTURE
  # The system's substrate. These services must be running for any
  # circulation to function. Failure here is total system failure.
  # ═══════════════════════════════════════════════════════════════════

  - id: infrastructure
    name: Service Infrastructure
    heartbeat: "continuous (Docker restart policies)"
    description: >
      External services the system depends on. Each has a health endpoint,
      a default port, and an env var override. Degradation must be graceful
      — a missing service should reduce capability, not crash the system.

    specs:
      - id: inf-qdrant-001
        tier: V0
        text: >
          Qdrant must be reachable at QDRANT_URL (default localhost:6333).
          Without Qdrant, the system cannot store or retrieve corrections,
          episodes, patterns, profile facts, or axiom precedents.
          All 7 collections must exist.
        properties:
          - GET /healthz returns 200
          - 'collections exist: documents, profile-facts, axiom-precedents, studio-moments, operator-corrections, operator-episodes, operator-patterns'
          - all text collections use 768-dim cosine vectors
          - studio-moments uses 512-dim cosine vectors
        verification: runtime

      - id: inf-ollama-001
        tier: V0
        text: >
          Ollama must be reachable at localhost:11434 with the embedding
          model loaded. Without Ollama, the system cannot embed text for
          any Qdrant operation — all semantic search, correction recording,
          episode storage, and profile indexing stops.
        properties:
          - GET /api/tags returns model list
          - nomic-embed-text-v2-moe available (768-dim embeddings)
          - embed() call returns exactly 768 floats
        verification: runtime

      - id: inf-litellm-001
        tier: V1
        text: >
          LiteLLM must be reachable at LITELLM_BASE_URL (default
          localhost:4000). Without LiteLLM, all LLM agent calls fail —
          briefing, digest, research, pattern consolidation, code review.
          The system loses its cognitive layer.
        properties:
          - GET /health/liveliness returns 200
          - 'model aliases resolve: fast (gemini-flash), balanced (claude-sonnet)'
          - /v1/models returns available models
        verification: runtime

      - id: inf-logos-api-001
        tier: V1
        text: >
          Logos API must be reachable at localhost:8051. Without it,
          the visual layer aggregator cannot poll health, GPU, nudges,
          briefing, drift, goals, or copilot data. The Corpora visual
          field loses all signal categories except perception.
        properties:
          - GET /api/health returns 200
          - 'endpoints available: /health, /gpu, /nudges, /briefing, /drift, /goals, /copilot, /engine/status'
        verification: runtime

      - id: inf-graceful-degradation-001
        tier: V1
        text: >
          When any service is unavailable, the system must degrade
          gracefully — not crash. Each service client must catch
          connection errors and return defaults. No exception from a
          failed HTTP call may propagate to crash a circulation loop.
        properties:
          - all _fetch_json() calls catch Exception and return None
          - all Qdrant operations wrapped in try/except
          - all Ollama calls wrapped in try/except
          - embed() failure raises RuntimeError (caller decides policy)
        verification: structural

  # ═══════════════════════════════════════════════════════════════════
  # EMBEDDING & VECTOR CONTRACTS
  # The system's semantic substrate. If dimensions mismatch, everything
  # silently returns wrong results — the most dangerous failure mode.
  # ═══════════════════════════════════════════════════════════════════

  - id: embedding
    name: Embedding & Vector Contracts
    heartbeat: "per-operation (no independent cadence)"
    description: >
      All semantic search depends on embedding consistency. A dimension
      mismatch between indexing and querying silently returns garbage.
      These contracts must be invariant across the entire codebase.

    specs:
      - id: emb-dimension-001
        tier: V0
        text: >
          All text embedding operations must produce exactly 768
          dimensions using nomic-embed-text-v2-moe via Ollama. A
          dimension mismatch between index and query silently returns
          wrong results — the most dangerous failure mode in the system.
        properties:
          - EXPECTED_EMBED_DIMENSIONS = 768 in shared/config.py
          - embed() validates len(vec) == 768, raises RuntimeError otherwise
          - VECTOR_DIM = 768 in correction_memory, episodic_memory,
            pattern_consolidation, profile_store, axiom_precedents
        verification: structural

      - id: emb-prefix-001
        tier: V1
        text: >
          Text embeddings must use the correct nomic prefix. "search_document"
          for indexing, "search_query" for retrieval. Mismatched prefixes
          degrade similarity scores by ~15-20%.
        properties:
          - embed(text, prefix="search_document") for all upsert calls
          - embed(text, prefix="search_query") for all search calls
          - no embed() calls without explicit prefix
        verification: structural

      - id: emb-model-singleton-001
        tier: V1
        text: >
          The embedding model name must be defined in exactly one place
          (shared/config.py EMBEDDING_MODEL). No module may hardcode a
          different model name. Divergent models produce incompatible
          vectors in the same collection.
        properties:
          - EMBEDDING_MODEL defined once in shared/config.py
          - all embed() calls use EMBEDDING_MODEL (not hardcoded strings)
          - CLAP embeddings (512-dim) are separate and clearly marked
        verification: structural

  # ═══════════════════════════════════════════════════════════════════
  # DATA FORMAT CONTRACTS
  # The system's lingua franca. Every file read assumes a schema.
  # Violations cause silent data loss or KeyError crashes.
  # ═══════════════════════════════════════════════════════════════════

  - id: data_formats
    name: Data Format Contracts
    heartbeat: "per-read (no independent cadence)"
    description: >
      Files are the bus. Every reader assumes a schema. When a writer
      changes format without updating readers, data is silently lost
      or misinterpreted.

    specs:
      - id: df-perception-state-001
        tier: V0
        text: >
          perception-state.json must contain all fields consumed by the
          visual layer aggregator, stimmung collector, episode builder,
          and correction seeker. Missing fields cause silent degradation
          (defaults used) or crashes (KeyError).
        properties:
          - 'required fields: timestamp, flow_score, production_activity, audio_energy_rms, heart_rate_bpm, consent_phase, voice_session, aggregate_confidence'
          - 'flow_score: float 0.0-1.0'
          - 'production_activity: string (may be empty)'
          - 'voice_session: dict with active, state, turn_count'
          - written atomically (tmp + rename) by _perception_state_writer
        verification: runtime

      - id: df-health-history-001
        tier: V1
        text: >
          health-history.jsonl must contain one JSON object per line with
          healthy, total, and failed_checks fields. The stimmung collector
          reads the last line. Malformed lines cause stimmung health
          dimension to go stale.
        properties:
          - 'each line: {"healthy": int, "total": int, "failed_checks": [...]}'
          - file at profiles/health-history.jsonl
          - read by StimmungCollector._update_stimmung() (last line only)
        verification: structural

      - id: df-infra-snapshot-001
        tier: V1
        text: >
          infra-snapshot.json must contain gpu.used_mb and gpu.total_mb.
          The stimmung collector reads these for resource_pressure.
          Missing or renamed fields cause the dimension to go stale.
        properties:
          - structure: {"gpu": {"used_mb": float, "total_mb": float}}
          - file at profiles/infra-snapshot.json
          - read by StimmungCollector._update_stimmung()
        verification: structural

      - id: df-frontmatter-001
        tier: V1
        text: >
          All markdown files in the vault and RAG sources must use the
          canonical frontmatter parser (shared/frontmatter.py). No module
          may implement its own YAML frontmatter parsing. Divergent
          parsers cause inconsistent metadata extraction.
        properties:
          - parse_frontmatter() is the single canonical parser
          - no other module calls yaml.safe_load on frontmatter
          - 'frontmatter schema: type, updated, source, tags (minimum)'
        verification: structural

  # ═══════════════════════════════════════════════════════════════════
  # TIMING & CADENCE CONTRACTS
  # The system's rhythms. Each cadence is load-bearing — too fast wastes
  # resources, too slow causes stale data and missed events.
  # ═══════════════════════════════════════════════════════════════════

  - id: timing
    name: Timing & Cadence Contracts
    heartbeat: "meta (defines all other heartbeats)"
    description: >
      Every interval, timeout, and cadence in the system is a contract
      between producer and consumer. The producer promises to update at
      a certain rate. The consumer assumes data is no older than that rate.

    specs:
      - id: tm-health-monitor-001
        tier: V1
        text: >
          The health monitor must run at least every 15 minutes. Health
          data feeds stimmung (health dimension), the visual layer
          (HEALTH_INFRA signals), and the logos dashboard. Stale
          health data causes stimmung to lose its health dimension.
        properties:
          - 'systemd timer: 15min interval with ±1min randomization'
          - writes profiles/health-history.jsonl (append)
          - writes profiles/infra-snapshot.json (overwrite)
        verification: runtime

      - id: tm-profile-update-001
        tier: V2
        text: >
          The profile update agent must run at least every 12 hours
          (prod) or 45 minutes (dev). The operator profile feeds
          system prompt fragments, ambient content, and profile facts
          in Qdrant.
        properties:
          - 'systemd timer: 12h (prod), 45min (dev)'
          - writes profiles/operator-profile.json
          - indexes to Qdrant profile-facts collection
        verification: runtime

      - id: tm-maintenance-window-001
        tier: V2
        text: >
          The Sunday 02:00-04:30 maintenance window must complete all
          weekly tasks: LLM backup (02:00), manifest snapshot (02:30),
          knowledge maintenance (04:30). Tasks must execute in order
          and complete before the next starts.
        properties:
          - 'llm-backup.timer: Sun 02:00 ±30min'
          - 'manifest-snapshot.timer: Sun 02:30 ±5min'
          - 'knowledge-maint.timer: Sun 04:30 ±10min'
          - 'drift-detector.timer: Sun 03:00 ±10min (also runs)'
        verification: runtime

      - id: tm-cycle-mode-001
        tier: V1
        text: >
          Cycle mode (dev/prod) must be readable from
          ~/.cache/hapax/cycle-mode. The mode affects timer intervals,
          debounce settings, and LLM call frequency. An unreadable
          cycle mode file must default to prod (conservative).
        properties:
          - file at ~/.cache/hapax/cycle-mode contains "dev" or "prod"
          - get_cycle_mode() returns CycleMode enum
          - 'default on missing/error: prod'
          - 'dev mode: shorter intervals, faster debounce'
          - 'prod mode: longer intervals, conservative thresholds'
        verification: runtime

  # ═══════════════════════════════════════════════════════════════════
  # REACTIVE ENGINE CONTRACTS
  # The system's reflexes. Rules must fire in the right order, with
  # the right cooldowns, gated by the right conditions.
  # ═══════════════════════════════════════════════════════════════════

  - id: reactive_engine
    name: Reactive Engine Contracts
    heartbeat: "event-driven (inotify)"
    description: >
      The reactive engine watches filesystem changes and dispatches
      actions in phases. Phase ordering, cooldowns, and quiet windows
      are all load-bearing contracts.

    specs:
      - id: re-phase-ordering-001
        tier: V1
        text: >
          Actions must execute in phase order: Phase 0 (deterministic)
          completes before Phase 1 (local GPU) starts, which completes
          before Phase 2 (cloud LLM) starts. Out-of-order execution
          causes race conditions between fast and slow actions.
        properties:
          - PhasedExecutor groups actions by phase
          - Phase 0 actions all complete before Phase 1 begins
          - Phase 1 bounded by gpu_concurrency semaphore (default 1)
          - Phase 2 bounded by cloud_concurrency semaphore (default 2)
        verification: structural

      - id: re-rule-count-001
        tier: V2
        text: >
          ALL_RULES must contain exactly 14 rules. A missing rule means
          a filesystem event goes unhandled. An extra rule means
          unexpected actions fire.
        properties:
          - len(ALL_RULES) == 14
          - 'rule names: collector-refresh, config-changed, sdlc-event-logged, rag-source-landed, audio-archive-sidecar, audio-clap-indexed, carrier-intake, knowledge-maintenance, pattern-consolidation, correction-synthesis, presence-transition, consent-transition, biometric-state-change, phone-health-summary'
        verification: integration

      - id: re-stimmung-gating-001
        tier: V1
        text: >
          When stimmung stance is degraded or critical, the engine must
          skip Phase 1 and Phase 2 actions. Only Phase 0 (deterministic)
          runs. This prevents expensive GPU/LLM operations when the
          system is already stressed.
        properties:
          - _handle_change reads stimmung stance
          - 'if stance in (DEGRADED, CRITICAL): filter to phase == 0'
          - skipped actions logged with count
          - interaction event emitted to Langfuse
        verification: structural

      - id: re-distribution-shift-001
        tier: V2
        text: >
          The engine tracks event pattern frequency via a 1-hour sliding
          window (FrequencyWindow). When the windowed distribution diverges
          from the long-term baseline (shift_score > 0.5), a WARNING event
          is emitted. Engine status exposes novelty_score and shift_score.
        properties:
          - FrequencyWindow records each event pattern key
          - shift_score compared against baseline every 10 events
          - 'shift > 0.5 logged as WARNING + telemetry event'
          - status dict includes shift_score and window_events
        verification: integration

  # ═══════════════════════════════════════════════════════════════════
  # CONSENT CIRCULATION
  # The system's ethical boundary. Without this, it models people
  # without their knowledge — a constitutional violation.
  # ═══════════════════════════════════════════════════════════════════

  - id: consent
    name: Consent Circulation
    heartbeat: "event-driven (face detection, voice session)"
    description: >
      Detects non-operator persons, transitions through consent phases,
      gates data persistence, and provides visual feedback. Enforces the
      interpersonal_transparency axiom at runtime.

    specs:
      - id: cn-state-machine-001
        tier: V0
        text: >
          ConsentStateTracker must transition through phases correctly:
          NO_GUEST → GUEST_DETECTED (face_count > 1 or non-operator
          speaker) → CONSENT_PENDING (after debounce_s) → CONSENT_GRANTED
          or CONSENT_REFUSED. persistence_allowed must be False during
          GUEST_DETECTED, CONSENT_PENDING, and CONSENT_REFUSED.
        properties:
          - tick() called every perception tick in daemon
          - debounce_s default 5.0 (configurable)
          - persistence_allowed = True only in NO_GUEST or CONSENT_GRANTED
          - needs_notification fires once per CONSENT_PENDING transition
        verification: integration

      - id: cn-governor-veto-001
        tier: V0
        text: >
          PipelineGovernor must veto autonomous pipeline processing during
          consent_pending and consent_refused phases. Only wake word
          override (operator-initiated) bypasses the veto. Axiom:
          interpersonal_transparency.
        properties:
          - consent_pending Veto in VetoChain
          - predicate checks consent_phase not in (consent_pending, consent_refused)
          - wake word override still works during consent phases
          - state transitions (0.5s) override consent veto
        verification: integration

      - id: cn-visual-feedback-001
        tier: V1
        text: >
          The visual layer must produce escalating severity signals for
          each consent phase: guest_detected → LOW, consent_pending → HIGH,
          consent_refused → CRITICAL, consent_granted → LOW. No signal
          for no_guest.
        properties:
          - signal source_id = "consent-phase"
          - severity escalation matches phase risk level
          - descriptive titles ("identifying", "curtailed", "purged", "consented")
        verification: integration

      - id: cn-gate-writer-001
        tier: V0
        text: >
          ConsentGatedWriter must be the single structural chokepoint for
          all person-adjacent persistent writes. Three validation layers:
          provenance check, consent label check, person-specific contract
          check. Audit log is append-only JSONL.
        properties:
          - check() validates before allowing write
          - all contracts in provenance must be active
          - GateDecision returned with allowed/reason/audit
          - no code path persists person data bypassing this gate
        verification: structural

      - id: cn-voice-session-001
        tier: V1
        text: >
          The consent voice session must launch when needs_notification
          fires, the main voice session is inactive, and no consent
          session is already running. It must use LLM tool calls for
          grant/refuse decisions, not free-form text.
        properties:
          - guard conditions checked before launch
          - record_consent_decision tool with decision enum
          - max 3 clarification rounds
          - 'on grant: create ConsentContract'
          - 'on refuse: purge FLAC segments'
        verification: structural

  # ═══════════════════════════════════════════════════════════════════
  # LATENCY CONTRACTS (WS5)
  # The system's responsiveness. Local inference gates cloud calls
  # for perception classification.
  # ═══════════════════════════════════════════════════════════════════

  - id: latency
    name: Latency Contracts
    heartbeat: "per-classification (10-12s slow tick)"
    description: >
      Local LLM (qwen3:4b) classifies activity/flow from perception
      signals. When confident, skips the 2-5s Gemini Flash cloud call.
      Self-tunes confidence threshold from disagreement history.

    specs:
      - id: lt-local-gate-001
        tier: V1
        text: >
          The workspace monitor must check local LLM confidence before
          calling Gemini. When confidence >= threshold (adaptive, default
          0.7), the cloud call is skipped. Cloud is forced every 5th
          cycle for drift prevention.
        properties:
          - _should_skip_cloud() called before _capture_and_analyze()
          - reads llm_confidence from perception-state.json
          - threshold starts at 0.7, adapts based on agreement rate
          - force_cloud_every_n = 5
        verification: integration

      - id: lt-adaptive-threshold-001
        tier: V2
        text: >
          The local confidence threshold self-tunes every 10 cloud calls.
          High agreement (>80%) lowers threshold (more skips, min 0.5).
          High disagreement (<60%) raises threshold (fewer skips, max 0.9).
          Otherwise drifts toward 0.7.
        properties:
          - _maybe_adjust_threshold() called after each cloud comparison
          - counters reset after each adjustment
          - bounded to [0.5, 0.9]
          - threshold change logged with agreement rate
        verification: integration

      - id: lt-model-disagreement-001
        tier: V2
        text: >
          When the workspace monitor performs a cloud call, it compares
          the result against local LLM classification. Disagreements are
          logged and written to /dev/shm for the correction synthesis
          pipeline. This closes the WS4↔WS5 feedback loop.
        properties:
          - _check_model_disagreement() called after each cloud analysis
          - compares local_activity vs cloud_activity (inferred from app/context)
          - disagreement written to /dev/shm/hapax-logos/model-disagreement.json
          - agreement/disagreement counts tracked for threshold adaptation
        verification: integration

      - id: lt-stimmung-model-selection-001
        tier: V1
        text: >
          get_model_adaptive() reads live stimmung and downgrades model
          tier when system is stressed. Critical → local-fast. Resource
          pressure > 0.7 → downgrade tier. LLM cost > 0.6 → downgrade
          tier. Falls through to requested model when nominal.
        properties:
          - reads /dev/shm/hapax-stimmung/state.json
          - critical stance → always local-fast
          - 'resource_pressure > 0.7 → balanced→fast, fast→local-fast'
          - 'llm_cost_pressure > 0.6 → balanced→fast'
          - stimmung unavailable → use requested model
        verification: integration
