id: stimmung_sync
name: Stimmung Sync
category: observability
purpose: Aggregate environmental and operator signals into a unified stance state.
schedule:
  type: timer
  interval: 15m

pipeline_role: processor
pipeline_layer: perception
pipeline_state:
  path: "/dev/shm/hapax-stimmung/state.json"
  metrics: [overall_stance, health, resource_pressure, error_rate, processing_throughput,
            perception_confidence, llm_cost_pressure, grounding_quality,
            operator_stress, operator_energy, physiological_coherence]
  stale_threshold: 120
