id: drift_detector
name: Drift Detector
version: 1.0.0
category: observability
reports_to: operator
peers:
- health_monitor
- introspect
depends_on:
- introspect
purpose: Detect and report documentation drift — where docs no longer match actual
  system state.
inputs:
- profiles/manifest.json (infrastructure manifest)
- documentation files
- system state queries
outputs:
- profiles/drift-report.json
- profiles/drift-remediation.jsonl
- profiles/drift-metrics.json
- drift correction suggestions
capabilities:
- drift_detection
- doc_system_comparison
- correction_suggestion
- tiered_remediation
schedule:
  type: timer
  systemd_unit: drift-detector.timer
  interval: 12h
model: fast
autonomy: tiered
decision_scope: Auto-fixes high-confidence documentation drift (auto_fix + confidence >= threshold).
  Escalates axiom violations and goal gaps to operator. Defers review-required items.
escalation_target: operator
axiom_bindings:
- axiom_id: executive_function
  implications:
  - ex-routine-001
  role: subject
raci:
- task: documentation_drift
  role: responsible
- task: daily_briefing
  role: consulted
health_group: drift
service_tier: 2
metrics_source: profiles/drift-report.json
narrative: 'The Drift Detector compares documentation against actual system state,
  finding places where the two have diverged. It runs twice daily, consuming the
  infrastructure manifest from introspect and checking it against docs, configs,
  and README files. In reconcile mode, it auto-fixes high-confidence documentation
  drift (stale docs, missing sections), escalates axiom violations and goal gaps
  to the operator, and defers review-required items. An adaptive feedback loop
  tracks whether fixes persist, adjusting the confidence threshold accordingly.
  '
short_description: Docs vs reality comparison
cli:
  command: uv run python -m agents.drift_detector
  module: agents.drift_detector
  flags:
  - flag: --json
    description: Machine-readable JSON output
  - flag: --fix
    description: Generate corrected documentation fragments
  - flag: --apply
    description: Apply fixes directly to files (requires --fix)
  - flag: --reconcile
    description: Tiered autonomous remediation (auto-fix + escalate + audit trail)
  - flag: --reconcile-reactive
    description: Reactive reconciliation from existing drift-report.json
timer_display:
  schedule_label: Twice daily 03:00 & 15:00
  purpose: Documentation drift reconciliation
manual_section:
  title: Maintaining Documentation
  order: 4
  content:
  - The drift detector compares documentation against actual system state.
  - It identifies places where docs have fallen behind reality.
  - ''
  - '```'
  - uv run python -m agents.drift_detector
  - 'uv run python -m agents.drift_detector --reconcile  # auto-fix + escalate'
  - 'uv run python -m agents.drift_detector --fix  # generate corrected fragments'
  - '```'
  - ''
  - The drift detector timer runs twice daily (03:00 and 15:00).
