module: av_correlator
purpose: Cross-modal audio/video correlation agent.
version: 1
interface:
  inputs:
  - name: filename
    type: str
  - name: path
    type: Path
  - name: value_score
    type: float
  - name: dominant_classification
    type: str
  - name: speech_seconds
    type: float
  - name: music_seconds
    type: float
  - name: silence_seconds
    type: float
  - name: segment_count
    type: int
  - name: speaker_count
    type: int
  - name: sample_sessions
    type: int
  - name: vocal_notes
    type: int
  - name: conversations
    type: int
  - name: listening_logs
    type: int
  - name: timestamp
    type: datetime
  - name: filename
    type: str
  - name: path
    type: Path
  - name: role
    type: str
  - name: category
    type: str
  - name: value_score
    type: float
  - name: people_count
    type: int
  - name: max_people
    type: int
  - name: motion_score
    type: float
  - name: scene_change
    type: bool
  - name: ssim
    type: float
  - name: disposition
    type: str
  - name: timestamp
    type: datetime
  - name: window_id
    type: str
  - name: window_start
    type: datetime
  - name: window_end
    type: datetime
  - name: audio_file
    type: str
  - name: audio_sidecar_path
    type: str
  - name: video_files
    type: dict[str, str]
  - name: audio_classification
    type: str
  - name: audio_score
    type: float
  - name: video_classifications
    type: dict[str, str]
  - name: video_scores
    type: dict[str, float]
