    type: dict[str, float]
  - name: joint_category
    type: str
  - name: joint_score
    type: float
  - name: boosted_audio_score
    type: float
  - name: boosted_video_scores
    type: dict[str, float]
  - name: speech_seconds
    type: float
  - name: music_seconds
    type: float
  - name: transcript_snippet
    type: str
  - name: speaker_count
    type: int
  - name: max_people
    type: dict[str, int]
  - name: scene_changes
    type: dict[str, bool]
  - name: correlated_at
    type: float
  - name: processed_windows
    type: dict[str, CorrelationWindow]
  - name: last_run
    type: float
  - name: stats
    type: dict[str, int]
dependencies:
  runtime:
  - opentelemetry
  - pydantic
  - qdrant_client
  - yaml
  internal:
  - shared
execution:
  entry: uv run python -m agents.av_correlator
  flags:
  - name: --correlate
  - name: --stats
  - name: --search
  - name: -v
  - name: --verbose
token_budget:
  self: 7980
  note: Estimated from 1 source file(s) at 10 tokens/line
