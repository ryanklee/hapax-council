module: health_monitor
purpose: Deterministic stack health check suite.
version: 1
interface:
  outputs:
  - name: name
    type: str
  - name: group
    type: str
  - name: status
    type: Status
  - name: message
    type: str
  - name: detail
    type: str | None
  - name: remediation
    type: str | None
  - name: duration_ms
    type: int
  - name: tier
    type: int
  - name: group
    type: str
  - name: status
    type: Status
  - name: checks
    type: list[CheckResult]
  - name: healthy_count
    type: int
  - name: degraded_count
    type: int
  - name: failed_count
    type: int
  - name: timestamp
    type: str
  - name: hostname
    type: str
  - name: overall_status
    type: Status
  - name: groups
    type: list[GroupResult]
  - name: total_checks
    type: int
  - name: healthy_count
    type: int
  - name: degraded_count
    type: int
  - name: failed_count
    type: int
  - name: duration_ms
    type: int
  - name: summary
    type: str
dependencies:
  runtime:
  - base64
  - httpx
  - opentelemetry
  - pydantic
  - shlex
  internal:
  - shared
execution:
  entry: uv run python -m agents.health_monitor
  flags:
  - name: --json
  - name: --check
  - name: --fix
  - name: --yes
  - name: -y
  - name: --apply
  - name: --dry-run
  - name: --verbose
  - name: -v
  - name: --history
token_budget:
  self: 32950
  note: Estimated from 1 source file(s) at 10 tokens/line
