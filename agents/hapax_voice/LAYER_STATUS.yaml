        - tests/hapax_voice/test_hypothesis_L6.py  # 7 hypothesis property tests
      count: 59
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "ResourceArbiter: highest priority wins, FIFO tiebreak, release removes"
      - "ScheduleQueue: drain ready items, preserve future, monotonic drain order, no item loss"
    dog_star:
