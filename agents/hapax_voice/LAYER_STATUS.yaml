        - tests/hapax_voice/test_consent_threading_L4L6.py  # 6 tests
      count: 41
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "frozen invariant, MappingProxyType params, allowed↔denials consistency, tolerance boundary, governance round-trip, composition to L6"
    dog_star:
      - "D1.1: governance denial blocks dispatch (TestD1_1, 2 tests)"
    consent_threading:
      state: proven
      dd: "DD-22 L4-L6"
      notes: "Command gains optional consent_label (passthrough from FusedContext). Schedule inherits via Command. L5 types (domain config) have no consent semantics. L6 (ScheduleQueue) inherits via Schedule.command."

  L5:
    name: "SuppressionField, TimelineMapping, MusicalPosition"
    modules: [suppression.SuppressionField, timeline.TimelineMapping, musical_position.MusicalPosition]
    state: proven
    tests:
      files:
