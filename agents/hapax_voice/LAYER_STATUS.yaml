        - tests/hapax_voice/test_type_system_matrix_8.py  # reconfiguration invariants
        - tests/test_musical_position.py  # 20 tests (from tests/ root)
        - tests/hapax_voice/test_hypothesis_L5.py  # 9 hypothesis property tests
      count: 74
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "TimelineMapping: invertibility (bijection), stopped freezes beat, stopped freezes time, invalid tempo rejected"
      - "SuppressionField: value bounded [0,1], rate bounded, convergence"
      - "effective_threshold: monotonic in suppression"
      - "MusicalPosition: hierarchical decomposition consistency"
    dog_star:
      - "D3/D5: invalid config rejection + stopped transport freeze (TestL5, 6 tests)"

  L6:
    name: "ResourceArbiter, ExecutorRegistry, ScheduleQueue"
    modules: [arbiter.ResourceArbiter, executor.ExecutorRegistry, executor.ScheduleQueue]
    state: proven
    tests:
      files:
