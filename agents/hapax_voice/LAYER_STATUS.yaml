        - tests/test_composition_integration.py  # 12 tests (C, E, G)
        - tests/hapax_voice/test_type_system_matrix_7.py  # convergent pipelines
        - tests/hapax_voice/test_type_system_matrix_10.py  # feedback/re-entry
        - tests/hapax_voice/test_hypothesis_L7.py  # 5 hypothesis property tests
      count: 88
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "MC veto chain closure, deny-wins monotonicity, fallback determinism, custom config validity, action domain coverage"
    dog_star:
      - "D6.3: composition-time validation rejects missing behaviors (TestD6_3, 5 tests)"
    consent_threading:
      state: proven
      dd: "DD-22 L7"
      notes: "compose_mc/obs_governance propagate FusedContext.consent_label → Command.consent_label. Consent veto composable via VetoChain | operator — callers add consent_veto as needed."

  L8:
