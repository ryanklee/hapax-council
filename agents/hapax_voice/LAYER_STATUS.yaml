# Composition Ladder Status — hapax_voice type system
#
# Tracks matrix-completion state for each layer.
# Gate rule: no NEW composition on layer N unless N-1 is matrix-complete.
#
# Dimensions:
#   A — Construction (creation, defaults, from-factory)
#   B — Invariants (frozen, monotonic, immutability)
#   C — Operations (update, sample, emit, subscribe, fuse)
#   D — Boundaries (empty, zero, max, None, NaN)
#   E — Error paths (regression, missing key, exception isolation)
#   F — Dog Star proofs (forbidden type sequences blocked)
#   G — Composition contracts (output of N is valid input to N+1)
#
# States: untested → partial → matrix-complete → proven
#   matrix-complete: all 7 dimensions have ≥1 test
#   proven: matrix-complete + property-based tests (hypothesis)
#
# Updated: 2026-03-13

layers:
  L0:
    name: "Stamped[T]"
    modules: [primitives.Stamped]
    state: proven
    tests:
      files:
        - tests/hapax_voice/test_primitives.py::TestStamped  # 9 tests
        - tests/hapax_voice/test_hypothesis_L0.py  # 5 hypothesis property tests
      count: 14
      dimensions: [A, B, C, D, G]
    hypothesis:
      - "equality reflexivity, frozen immutability, type closure, hash consistency, composition to L1"
    gaps:
      - "E: No error paths (frozen dataclass, no validation)."
      - "F: No Dog Star proof (L0 — no lower layer to violate)."

  L1:
    name: "Behavior[T], Event[T]"
    modules: [primitives.Behavior, primitives.Event]
    state: proven
    tests:
      files:
        - tests/hapax_voice/test_primitives.py::TestBehavior  # 9 tests
        - tests/hapax_voice/test_primitives.py::TestEvent  # 7 tests
        - tests/hapax_voice/test_type_system_matrix_2.py::TestEventLifecycleAndFanOut  # 12 tests
        - tests/hapax_voice/test_type_system_matrix_6.py::TestBehaviorPerturbation  # 12 tests
        - tests/hapax_voice/test_hypothesis_L1.py  # 8 hypothesis property tests
        - tests/hapax_voice/test_consent_threading_L1.py  # 22 tests (18 example + 4 hypothesis)
      count: 70
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "watermark monotonicity, regression rejection, sample post-condition, subscriber conservation, emit totality, exception isolation, composition to L2"
      - "consent: join commutativity, join idempotence, label monotonicity, None-update identity"
    dog_star:
      - "D3: watermark regression rejected (TestL1_D3, 3 tests)"
      - "D-consent: label cannot be lowered via update (TestConsentL1DogStar, 1 test)"
    consent_threading:
      state: proven
      dd: "DD-22"
      dimensions: [A, B, C, D, E, F, G]
      notes: "Optional consent_label on Behavior. None=untracked (DD-16), bottom=public. Labels float upward only via join (DD-4)."

  L2:
    name: "FusedContext, VetoChain, FallbackChain, FreshnessGuard"
    modules: [governance.FusedContext, governance.VetoChain, governance.FallbackChain, governance.FreshnessGuard, governance.consent_veto]
    state: proven
    tests:
      files:
        - tests/hapax_voice/test_governance.py  # 6 hypothesis + 41 example
        - tests/hapax_voice/test_type_system_matrix.py::TestImmutabilityBarriers
        - tests/hapax_voice/test_type_system_matrix.py::TestFreshnessComposition
        - tests/hapax_voice/test_type_system_matrix_3.py  # error boundaries
        - tests/hapax_voice/test_type_system_matrix_4.py  # algebraic properties
        - tests/hapax_voice/test_hypothesis_L2.py  # 7 hypothesis property tests
        - tests/hapax_voice/test_consent_threading_L2L3.py::TestFusedContextConsent  # 4 tests
        - tests/hapax_voice/test_consent_threading_L2L3.py::TestConsentVeto  # 7 tests
      count: 85+
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "VetoChain: associativity, identity, monotonicity, closure, idempotence (test_governance.py)"
      - "FallbackChain: priority preservation (test_governance.py)"
      - "FusedContext: min_watermark ordering, frozen invariant, samples immutability"
      - "FreshnessGuard: stale detection, fresh acceptance, missing behavior always stale"
      - "VetoChain: deny-wins monotonicity under composition"
      - "consent_veto: self-flow allowed, flow transitivity via join"
    consent_threading:
      state: proven
      dd: "DD-5, DD-6"
      dimensions: [A, B, C, D, E, F, G]
      notes: "FusedContext gains optional consent_label (DD-5). consent_veto factory checks labels at enforcement boundaries (DD-6). None=untracked denied at enforcement per DD-3."

  L3:
    name: "with_latest_from combinator"
    modules: [combinator.with_latest_from]
    state: proven
    tests:
      files:
        - tests/hapax_voice/test_combinator.py::TestWithLatestFrom  # 13 tests
        - tests/hapax_voice/test_type_system_matrix_5.py  # forward pipeline flow
        - tests/hapax_voice/test_hypothesis_L3.py  # 5 hypothesis property tests
        - tests/hapax_voice/test_consent_threading_L2L3.py::TestWithLatestFromConsent  # 6 tests
        - tests/hapax_voice/test_consent_threading_L2L3.py::TestConsentL2L3Hypothesis  # 3 hypothesis
      count: 39
      dimensions: [A, B, C, D, E, F, G]
    hypothesis:
      - "trigger fidelity, snapshot correctness, min_watermark computation, rate independence, composition to L4"
      - "consent: label join is LUB, flow transitivity via join"
    dog_star:
      - "D2: combinator watermark fidelity (TestL3_D2, 4 tests)"
    consent_threading:
      state: proven
      dd: "DD-22 L3"
      notes: "with_latest_from computes label join from all Behavior consent_labels. None Behaviors treated as bottom if any sibling is tracked. All-None → None (untracked)."

  L4:
    name: "Command, Schedule, VetoResult"
    modules: [commands.Command, commands.Schedule, governance.VetoResult]
    state: proven
    tests:
      files:
        - tests/hapax_voice/test_commands.py  # 17 tests
        - tests/hapax_voice/test_type_system_matrix_9.py  # provenance tracing
