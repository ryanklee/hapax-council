module: youtube_sync
purpose: YouTube RAG sync — subscriptions, likes, and playlists.
version: 1
interface:
  inputs:
  - name: video_id
    type: str
  - name: title
    type: str
  - name: channel
    type: str
  - name: published_at
    type: str
  - name: liked_at
    type: str
  - name: category
    type: str
  - name: description
    type: str
  - name: tags
    type: list[str]
  - name: duration
    type: str
  - name: view_count
    type: int
  - name: channel_id
    type: str
  - name: channel_name
    type: str
  - name: description
    type: str
  - name: subscribed_at
    type: str
  - name: video_count
    type: int
  - name: playlist_id
    type: str
  - name: title
    type: str
  - name: video_count
    type: int
  - name: description
    type: str
  - name: liked_videos
    type: dict[str, LikedVideo]
  - name: subscriptions
    type: dict[str, Subscription]
  - name: playlists
    type: dict[str, PlaylistInfo]
  - name: last_full_sync
    type: float
  - name: last_sync
    type: float
  - name: stats
    type: dict[str, int]
dependencies:
  runtime:
  - opentelemetry
  - pydantic
  internal:
  - shared
execution:
  entry: uv run python -m agents.youtube_sync
  flags:
  - name: --auth
  - name: --full-sync
  - name: --auto
  - name: --stats
  - name: -v
  - name: --verbose
token_budget:
  self: 4830
  note: Estimated from 1 source file(s) at 10 tokens/line
