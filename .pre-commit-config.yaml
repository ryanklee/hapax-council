repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: conflict-markers
        name: Check for conflict markers
        entry: scripts/check-conflict-markers
        language: script
        always_run: true
        pass_filenames: false
      - id: experiment-freeze
        name: Experiment path freeze check
        entry: scripts/experiment-freeze-check
        language: script
        always_run: true
        pass_filenames: false
      - id: claude-md-rot
        name: CLAUDE.md rotation policy check
        entry: scripts/check-claude-md-rot.sh
        language: script
        files: CLAUDE\.md$
        pass_filenames: true
      - id: lrr-frozen-files
        name: LRR research-condition frozen-files enforcement
        entry: scripts/check-frozen-files.py
        language: system
        always_run: true
        pass_filenames: false
      - id: claim-registry
        name: HPX003+HPX004 claim/LR registry validators
        entry: scripts/check-claim-registry.py
        language: system
        files: ^shared/(claim\.py|lr_registry\.yaml|prior_provenance\.yaml)$
        pass_filenames: false
