repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: conflict-markers
        name: Check for conflict markers
        entry: scripts/check-conflict-markers
        language: script
        always_run: true
        pass_filenames: false
      - id: experiment-freeze
        name: Experiment path freeze check
        entry: scripts/experiment-freeze-check
        language: script
        always_run: true
        pass_filenames: false
      - id: llm-patterns
        name: LLM-optimized code patterns
        entry: scripts/check-llm-patterns
        language: script
        always_run: true
        pass_filenames: false
