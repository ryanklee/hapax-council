# Phase A3 WirePlumber rule — retarget notification-role streams to the
# dedicated hapax-notification-private sink (operator monitor only).
#
# Without this rule, notifications would fall back to the default sink,
# which historically routed through hapax-private → Ryzen → L-12 CH11/12
# and thence into hapax-l12-evilpet-capture. Now that the AUX10/11 raw
# bypass is removed (Phase A1), notifications would be silent on broadcast
# but would still pollute the operator's in-room Evil Pet send. This rule
# makes the governance positive: notifications go to the L-12 master
# monitor, never the broadcast sum.

monitor.alsa.rules = []

stream.properties = {
}

# Rule scope: any stream declaring media.role = "notification".
# WirePlumber evaluates matches and updates target.object.

node.properties = {
}

# NOTE: the actual retargeting is done via a wireplumber Lua rule in
# a different config location on newer WP versions. If this declarative
# form does not take effect on load, use ``~/.config/wireplumber/wireplumber.conf.d/
# 92-hapax-notification-private.conf`` with the equivalent Lua snippet.
#
# For WirePlumber 0.5+ the canonical pattern is:
#
#   wireplumber.settings = {
#       node.routing.notification.role = "hapax-notification-private"
#   }
#
# Pragmatic deployment: combine with explicit ``PULSE_PROP="media.role=notification"``
# environment variable on any notifier invocation (notify-send, chat-app)
# so Pulse compatibility layer tags the stream correctly. Additionally,
# the native notifiers can target the sink directly via
# ``pactl set-default-sink hapax-notification-private`` for a persistent
# session (done via ``scripts/hapax-notification-private-activate``).

wireplumber.settings = {
    node.routing.notification.role = "hapax-notification-private"
}
