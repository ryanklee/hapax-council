# Keep Ryzen HD Audio codec's analog-stereo profile active even when
# jack-sense says "no jack" — we deliberately drive the rear line-out
# to feed L6 ch 4 (dry TTS to Evil Pet). Without this, PipeWire resets
# the profile to off on boot/restart.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.pci-0000_73_00.6" }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = true
        device.profile = "output:analog-stereo"
      }
    }
  }
]
