# Hapax Daimonion TTS ducking configuration
#
# When the voice daemon produces TTS audio (media.role = "Assistant"),
# all other audio streams are ducked to 30% volume.
#
# The daemon must set media.role = "Assistant" on its PipeWire stream
# for ducking to activate. See tts.py playback code.
#
# Based on WirePlumber's media-role-nodes.conf example.
# Ref: https://github.com/PipeWire/wireplumber/blob/master/src/config/wireplumber.conf.d.examples/media-role-nodes.conf

wireplumber.profiles = {
  main = {
    policy.linking.role-based.loopbacks = required
  }
}

wireplumber.settings = {
  # All streams without an explicit media.role get routed through the
  # Multimedia loopback — this is what gets ducked.
  node.stream.default-media-role = "Multimedia"

  # Duck level: 0.3 = 30% of original volume when a higher-priority stream
  # is active. WirePlumber applies this as a volume multiplier.
  linking.role-based.duck-level = 0.3
}

# Common arguments inherited by all loopback sinks below
wireplumber.components.rules = [
  {
    matches = [
      {
        provides = "~loopback.sink.*"
      }
    ]
    actions = {
      merge = {
        arguments = {
          capture.props = {
            policy.role-based.target = true
            audio.position = [ FL, FR ]
            media.class = Audio/Sink
          }
          playback.props = {
            node.passive = true
            media.role = "Loopback"
            # Prophylactic (2026-04-19): disable stream-state persistence
            # for role-loopback outputs. Without this, if any role-loopback
            # output is ever moved by pavucontrol/pactl (or by a prior
            # buggy config), the move gets saved under the overly-broad
            # ``media.role=Loopback`` key in
            # ~/.local/state/wireplumber/stream-properties and then
            # cascades to every future role loopback on startup —
            # bypassing the per-role policy.role-based.preferred-target.
            state.restore = false
          }
        }
        requires = [ support.export-core, pw.node-factory.adapter ]
      }
    }
  }
]

wireplumber.components = [
  {
    type = virtual, provides = policy.linking.role-based.loopbacks
    requires = [ loopback.sink.role.multimedia
                 loopback.sink.role.notification
                 loopback.sink.role.assistant ]
  }

  # Multimedia: default bucket for music, videos, games, browsers, etc.
  # Priority 10 (lowest). Gets ducked when Assistant is active.
  {
    name = libpipewire-module-loopback, type = pw-module
    arguments = {
      node.name = "loopback.sink.role.multimedia"
      node.description = "Multimedia"
      capture.props = {
        device.intended-roles = [ "Music", "Movie", "Game", "Multimedia" ]
        policy.role-based.priority = 10
        policy.role-based.action.same-priority = "mix"
        policy.role-based.action.lower-priority = "mix"
      }
    }
    provides = loopback.sink.role.multimedia
  }

  # Notifications: system sounds, desktop notifications.
  # Priority 20. Also gets ducked when Assistant is active.
  #
  # 2026-04-19 LEAK FIX (task #187): route notification role to the
  # operator-private sink (24c RIGHT) instead of the default sink. This
  # is consumed by WP's built-in hook
  # /usr/share/wireplumber/scripts/linking/find-media-role-sink-target.lua
  # — the canonical WP 0.5+ pattern documented in the upstream Alert-role
  # example. Research:
  # /tmp/wireplumber-notification-retarget.md.
  {
    name = libpipewire-module-loopback, type = pw-module
    arguments = {
      node.name = "loopback.sink.role.notification"
      node.description = "System Notifications"
      capture.props = {
        device.intended-roles = [ "Notification" ]
        policy.role-based.priority = 20
        policy.role-based.action.same-priority = "mix"
        policy.role-based.action.lower-priority = "mix"
        policy.role-based.preferred-target = "hapax-private"
      }
    }
    provides = loopback.sink.role.notification
  }

  # Assistant: Hapax Daimonion TTS output.
  # Priority 40. Ducks all lower-priority streams when active.
  # Using "duck" instead of "cork" so music continues at reduced volume
  # rather than pausing entirely.
  {
    name = libpipewire-module-loopback, type = pw-module
    arguments = {
      node.name = "loopback.sink.role.assistant"
      node.description = "Hapax Daimonion Assistant"
      capture.props = {
        device.intended-roles = [ "Assistant" ]
        policy.role-based.priority = 40
        policy.role-based.action.same-priority = "mix"
        policy.role-based.action.lower-priority = "duck"
      }
    }
    provides = loopback.sink.role.assistant
  }
]
