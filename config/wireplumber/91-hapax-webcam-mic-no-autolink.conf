# Prevent Logitech BRIO and C920 webcam microphones from being
# auto-linked into arbitrary capture filter-chains.
#
# Root-caused 2026-04-21 after 3 hours of livestream room-audio-bleed
# investigation: WirePlumber's default-source policy picks the BRIO
# analog-stereo capture as the stereo input for any filter-chain /
# capture node that declares stereo input ports and doesn't pin an
# explicit `target.object`. The BRIO has a built-in array mic that
# picks up room ambient strongly. Observed victims:
#   - hapax-vinyl-capture:input_FL/FR
#   - noise-suppress-capture:input_FL/FR
#   - mixer_master:capture_MONO
#   - echo_cancel_capture:input_FL/FR
# Each of those can reach the livestream-tap through the broadcast
# signal chain, so the webcam mic ends up in the livestream audio.
#
# Setting node.passive = true keeps the mic enumerable (for deliberate
# consumers like OBS that name-match the source explicitly) but
# removes it from the auto-link default pool. `node.dont-reconnect`
# prevents any released link from being re-established on the next
# policy sweep.
#
# Reference: reference_brio_mic_autolink_bleed memory.

monitor.alsa.rules = [
    {
        matches = [
            { node.name = "~alsa_input.usb-046d_Logitech_BRIO_.*" }
            { node.name = "~alsa_input.usb-046d_HD_Pro_Webcam_C920_.*" }
        ]
        actions = {
            update-props = {
                node.passive = true
                node.dont-reconnect = true
            }
        }
    }
]
