# Retarget role.assistant loopback output → hapax-voice-fx-capture
#
# Persistent fix for the HAPAX_TTS_TARGET bypass identified in the
# 2026-04-21 livestream surface inventory audit §3.K.
#
# WHY
#
# daimonion TTS spawns `pw-cat --playback --media-role Assistant
# --target hapax-voice-fx-capture` per agents/hapax_daimonion/
# pw_audio_output.py:83-87. The `--media-role Assistant` tag is
# REQUIRED for ducking (see 50-hapax-voice-duck.conf — the duck triggers
# on Assistant-role streams). But the role tag ALSO steers the stream
# into `input.loopback.sink.role.assistant` (sink 517) via WirePlumber's
# role-based policy, overriding the explicit `--target` argument. The
# `output.loopback.sink.role.assistant` counterpart then forwards to
# the DEFAULT sink (Ryzen analog) at unity gain — bypassing the entire
# designed voice chain: biquad EQ (voice-fx-chain) + SC4 compressor +
# hard limiter (voice-fx-loudnorm).
#
# Net effect pre-fix: voice hits L-12 CH 11/12 ~15-20 dB hotter than
# designed. Operator 2026-04-21: "hapax voice still coming into l12
# from pc super hot ends up loud af in the stream."
#
# FIX
#
# Make the role.assistant loopback OUTPUT side target hapax-voice-fx-
# capture instead of the default sink. This preserves the role tag
# (duck still fires) while routing voice through its designed chain.
#
# Resulting voice signal path:
#
#   daimonion pw-cat (role=Assistant, target=hapax-voice-fx-capture)
#     → WirePlumber steers to input.loopback.sink.role.assistant
#     → output.loopback.sink.role.assistant  (this rule's target)
#     → hapax-voice-fx-capture  (biquad EQ + presence + air)
#     → hapax-voice-fx-playback
#     → hapax-loudnorm-capture  (SC4 + hard limiter)
#     → hapax-loudnorm-playback → Ryzen analog → L-12 CH 11/12
#
# Ducking is unaffected — voice-duck hooks the role tag, not the
# loopback destination.
#
# REFERENCES
#
# - Audit: docs/research/2026-04-21-livestream-surface-inventory-audit.md §3.K
# - Plan: docs/superpowers/plans/2026-04-21-livestream-surface-shepherd-plan.md item K
# - cc-task: lssh-012
# - Memory: reference_default_sink_elevation_breaks_roles.md (sibling failure class)
# - Voice FX chain: config/pipewire/voice-fx-chain.conf
# - Voice loudnorm: config/pipewire/voice-fx-loudnorm.conf
# - Voice duck: config/wireplumber/50-hapax-voice-duck.conf

node.rules = [
    {
        matches = [
            { node.name = "output.loopback.sink.role.assistant" }
        ]
        actions = {
            update-props = {
                target.object = "hapax-voice-fx-capture"
                node.target   = "hapax-voice-fx-capture"
            }
        }
    }
]
