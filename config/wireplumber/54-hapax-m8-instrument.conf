# Hapax M8 instrument routing — Phase 3 of cc-task re-splay-homage-ward-m8.
#
# Matches the M8 USB device (Dirtywave M2 hardware, vendor 0x16c0
# product 0x048a) and:
#   - Hides M8 source from default-source policy so it never auto-binds
#     to operator-mic-shaped consumers (Daimonion STT, Cortado backend,
#     etc.). M8 is performative-instrument, NOT a microphone.
#   - Routes M8 UAC source into the hapax-m8-loudnorm filter chain at
#     config/pipewire/hapax-m8-loudnorm.conf via target.object.
#
# Constitutional binders:
#   - feedback_l12_equals_livestream_invariant (vacuous; M8 audio never
#     touches L-12 hardware)
#   - never drop operator speech (M8 audio doesn't contend with voice
#     duck because it's not a media.role=Multimedia stream)
#   - feedback_full_automation_or_no_engagement (no operator-physical
#     pavucontrol routing required; everything is config-declared)

monitor.alsa.rules = [
  {
    matches = [
      {
        # Match the M8's USB device by vendor:product. Works regardless
        # of serial number, so swapping M8 hardware doesn't break.
        device.vendor.id = "0x16c0"
        device.product.id = "0x048a"
      }
    ]
    actions = {
      update-props = {
        # Don't auto-target this device as a default source — operator
        # mic consumers (Daimonion STT, contact-mic backend) must never
        # bind to the M8.
        node.dont-reconnect = true
        # Drop priority so any heuristic that prefers "highest priority
        # source" picks the L-12 / Yeti / Rode rather than the M8.
        priority.driver = 100
        priority.session = 100
      }
    }
  }
]
