# Keep all audio device nodes active — never suspend.
# WirePlumber's default idle-suspend can interact badly with UAC2
# devices that don't cleanly re-enumerate their altsets on wake.
# Explicitly disabling suspend avoids the "stream was open but gave
# no data" re-activation corner case.

monitor.alsa.rules = [
    {
        matches = [
            { device.name = "~alsa_card.usb-*" }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
            }
        }
    }
    {
        matches = [
            { node.name = "~alsa_input.usb-*" }
            { node.name = "~alsa_output.usb-*" }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
