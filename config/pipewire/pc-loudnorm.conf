# Hapax PC-wide output loudness normalisation — 2026-04-21
#
# Catch-all normaliser for any PC audio that hits the L-12 via Ryzen
# analog output (CH 11/12 per ratified AUX B topology). Lives between
# app-layer audio (browsers, media players, games, notifications) and
# the Ryzen analog sink. Produces a consistent -14 LUFS / -1.0 dBTP
# signal so the operator can set L-12 CH 11/12 trim+fader ONCE and
# never touch them again.
#
# SIGNAL FLOW
#
#   apps → hapax-pc-loudnorm (this conf, filter-chain sink)
#       → Ryzen analog-stereo (hardware out)
#       → L-12 CH 11/12 (physical input, fader at calibrated unity)
#       → AUX B → Evil Pet → CH 6 return → broadcast
#
# WHY
#
#   Operator directive 2026-04-21: "I can't keep messing with faders.
#   It's impossible to manage." Root cause: PC sources arrive at the
#   L-12 at wildly different levels (browser video at -6, notification
#   chimes at 0, music at -18, game audio clipping). The hardware fader
#   is the only place to balance them, which is a full-time manual job.
#
#   Fix: normalise ALL PC audio to a single LUFS target BEFORE it hits
#   the hardware. Operator calibrates CH 11/12 once against this known
#   level, then walks away.
#
# INSTALL
#
#   cp config/pipewire/pc-loudnorm.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# ROUTING
#
# Option A (recommended): make this the default sink via
#   pavucontrol → Configuration tab → set Hapax PC Loudnorm as fallback
# OR via wireplumber rule (future work in config/wireplumber/).
#
# Option B (conservative): per-app routing via pavucontrol Playback tab
# — right-click an app, Move to → Hapax PC Loudnorm. Good for testing
# before making it the system default.
#
# LEVELS (re-tuned 2026-04-21 for −18 LUFS target per PC→L-12
# level-matching design: docs/research/2026-04-21-pc-l12-level-matching-design.md)
#
# - Threshold (-16 dB): tighter compression floor than the prior -14 dB
#   so the −18 LUFS integrated target is hit on wide-dynamic content
#   (video audio, game transients, notification stings).
# - Ratio (3:1): between voice (3:1) and YT (4:1). Medium control.
# - Attack (5 ms): fast enough to catch game transients.
# - Release (250 ms): medium; prevents pumping on podcast/music swings.
# - Makeup gain (-1 dB): output target is −18 LUFS (pro audio digital
#   line-level convention, 0 VU = −18 dBFS reference). Prior +3 dB
#   hit −14 LUFS which is broadcast-target, not mixer-input-target —
#   the L-12 CH 11/12 trim was compensating in the opposite direction.
# - dB limit (-1.0): shared budget across stack. Peak ceiling -1 dBTP
#   prevents inter-sample peak clipping at Ryzen ADC / encoder. Master-
#   bus limiter is the absolute downstream ceiling.
#
# NOTIFICATION EXCLUSION
#
# Notification chimes should NOT go through here — they go via
# hapax-notification-private (existing conf). Verify app routing in
# pavucontrol after deploy; if any notification-role stream points at
# hapax-pc-loudnorm, add a wireplumber rule to re-route.
#
# CALIBRATION (operator, one-time)
#
# 1. Play known content (music, YT, or pink-noise) through this sink.
# 2. Watch L-12 CH 11/12 meter. Set the TRIM and FADER so average
#    level reads around -12 dBFS on the L-12 meter (green / just below
#    yellow). Because the sink outputs a consistent LUFS target, this
#    calibration stays valid forever.
# 3. Mark the trim/fader positions with tape so if you bump them you
#    can restore the reference.
# 4. Walk away.
#
# REFERENCES
#
# - Sister loudnorms: config/pipewire/yt-loudnorm.conf,
#   config/pipewire/voice-fx-loudnorm.conf
# - L-12 AUX B topology: memory reference_l12_evilpet_aux_b_routing
# - Master-bus safety net: config/pipewire/hapax-broadcast-master.conf

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-pc-loudnorm"
            node.description = "Hapax PC Loudnorm (-14 LUFS / -1.0 dBTP — route apps here; catches ALL PC audio)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "pc_comp_l"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "pc_comp_r"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "pc_limit_l"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "pc_limit_r"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                ]
                inputs  = [ "pc_comp_l:Input"  "pc_comp_r:Input"  ]
                outputs = [ "pc_limit_l:Output" "pc_limit_r:Output" ]
                links = [
                    { output = "pc_comp_l:Output" input = "pc_limit_l:Input" }
                    { output = "pc_comp_r:Output" input = "pc_limit_r:Input" }
                ]
            }

            capture.props = {
                node.name = "hapax-pc-loudnorm"
                node.description = "Hapax PC Loudnorm (route apps here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-pc-loudnorm-playback"
                node.description = "Hapax PC Loudnorm → Ryzen analog"
                # Chain output to the Ryzen analog sink which feeds
                # L-12 CH 11/12 (the "PC in" channels in the AUX B
                # topology). node.passive keeps this invisible to OBS.
                target.object = "alsa_output.pci-0000_73_00.6.analog-stereo"
                node.passive = true
            }
        }
    }
]
