# Hapax notification-private sink (Phase A3 of evilpet-s4-dynamic-dual-processor-plan)
#
# Creates a private notification sink ``hapax-notification-private``
# that routes chat / desktop / system chimes to the **L-12 MASTER OUT**
# (operator analog monitor) only. Explicitly NOT captured by
# ``hapax-l12-evilpet-capture`` — notifications must NEVER reach
# the livestream broadcast.
#
# The companion WirePlumber rule at
# ``config/wireplumber/92-hapax-notification-private.conf`` retargets
# streams carrying ``media.role = "notification"`` to this sink
# instead of the default route (which previously went through
# ``hapax-private`` and thereby into Ryzen → L-12 CH11/12 → capture).
#
# Governance: notifications on broadcast are forbidden per
# the existing audit § S6 (source inventory). This sink is
# the positive-path enforcement of that constraint.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Notification Private (L-12 MASTER monitor only)"
            capture.props = {
                node.name       = "hapax-notification-private"
                node.nick       = "Notify-Private"
                media.class     = "Audio/Sink"
                node.passive    = true
            }
            playback.props = {
                node.name       = "hapax-notification-private-playback"
                target.object   = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                audio.channels  = 2
                audio.position  = [ FL FR ]
            }
        }
    }
]
