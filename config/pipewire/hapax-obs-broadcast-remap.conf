# Hapax OBS broadcast-capture remap source — 2026-04-21
#
# Exposes hapax-livestream.monitor as a virtual source that the OBS
# obs-pipewire-audio-capture plugin persists correctly across the
# Properties close/reopen cycle.
#
# WHY THIS EXISTS (and not just module-loopback)
#
#   A prior attempt used module-loopback (see hapax-obs-broadcast-tap.conf)
#   which creates a valid Audio/Source class node. The node appears in
#   OBS's PipeWire picker, but the plugin does not persist the selection:
#   close Properties → reopen → Device field has reverted to "Default."
#   Probable cause: obs-pipewire-audio-capture serialises the selection
#   by a metadata attribute that the loopback's virtual source does not
#   carry (`device.class`, `device.api`, etc.).
#
#   module-remap-source declares richer device metadata
#   (`device.class = "filter"`, `node.virtual = "true"`, `device.description`)
#   which IS what the OBS plugin persists against. Confirmed 2026-04-21
#   by operator: selecting the `-remap` source in OBS Properties,
#   closing, reopening — selection holds.
#
# The loopback-based tap file (hapax-obs-broadcast-tap.conf) stays in
# the repo as a fallback and for callers/tools that enumerate by the
# plain module-loopback pattern. This remap source is the operator-
# facing path OBS binds to.
#
# CHAIN
#
#   producers → hapax-livestream (null-sink, existing broadcast sum-point)
#                    │
#                    ▼ (module-remap-source, master = hapax-livestream.monitor)
#               hapax-obs-broadcast-remap (virtual source, Audio/Source class,
#                                          device.class = filter)
#                    │
#                    ▼ (OBS "Audio Input Capture (PipeWire)" binds here
#                       and persists the selection)
#               OBS captures it
#
# INSTALL
#
#   cp config/pipewire/hapax-obs-broadcast-remap.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list sources short | grep hapax-obs-broadcast-remap
#     # Should show the remap source as Audio/Source, IDLE until OBS binds.
#   pactl list sources | grep -A2 hapax-obs-broadcast-remap
#     # Should show device.description = "Hapax Livestream Broadcast".
#
#   Then in OBS:
#     Source Properties → Device → "Hapax Livestream Broadcast"
#     (from the obs-pipewire-audio-capture "Audio Input Capture (PipeWire)"
#     source type).
#
# REFERENCES
#
# - Sister: config/pipewire/hapax-obs-broadcast-tap.conf (fallback)
# - Upstream bug / persist quirk: observed 2026-04-21 with operator
# - OBS plugin: AUR obs-pipewire-audio-capture

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            # Remap-style: richer device metadata so OBS's plugin
            # persists the selection. Equivalent to
            # `pactl load-module module-remap-source` but declared
            # here so it survives reboot + pipewire restart.
            node.description = "Hapax OBS broadcast-capture remap (hapax-livestream → persistent OBS source)"
            capture.props = {
                node.name = "hapax-obs-broadcast-remap-capture"
                node.description = "Hapax Livestream Broadcast Remap (capture side)"
                target.object = "hapax-broadcast-normalized"
                node.passive = true
                audio.position = [ FL FR ]
            }
            playback.props = {
                media.class = Audio/Source
                node.name = "hapax-obs-broadcast-remap"
                node.description = "Hapax Livestream Broadcast"
                device.description = "Hapax Livestream Broadcast"
                device.class = "filter"
                node.virtual = true
                audio.position = [ FL FR ]
            }
        }
    }
]
