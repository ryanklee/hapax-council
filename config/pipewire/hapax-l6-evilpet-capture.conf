# L6 channel 1 (Evil Pet → Torso S-4 modulated Hapax voice return) → livestream
#
# 2026-04-19 voice-mod Phase 1 (Option A external mixer):
#
#   Kokoro TTS → hapax-voice-fx-capture (biquad chain)
#     → hapax-private (24c Output 2, RIGHT)
#     → 24c analog Out 2 → Evil Pet IN
#     → Evil Pet OUT → Torso S-4 IN
#     → Torso OUT → L6 channel 1 INPUT
#     → L6 USB (multitrack, Altset 2) → alsa_input.usb-ZOOM_Corporation_L6
#     → this filter-chain pulls channel 1 only
#     → hapax-livestream-tap → OBS captures → livestream broadcast
#
# L6 channel 1 fader is set to zero on the mixer so the Evil-Pet-modulated
# signal does NOT contribute to the L6 master bus (which still feeds
# L12 → 24c-in). In Multitrack USB mode (Altset 2) the channel signal
# still lands on USB regardless of fader position.

# Force the L6's ALSA capture device into Altset 2 (12-channel multitrack)
# so channel 1 is addressable independently of the L6's stereo master mix.
context.properties = {
    # No global rule; per-device alsa.resample etc. goes via WirePlumber.
}

context.objects = [
    # Open L6 capture in multitrack mode (12 channels).
    {   factory = adapter
        args = {
            factory.name = api.alsa.pcm.source
            node.name    = "alsa_input.usb-ZOOM_Corporation_L6-00.multitrack"
            node.description = "ZOOM L6 — multitrack capture (12ch)"
            media.class  = Audio/Source
            audio.format = S32LE
            audio.channels = 12
            audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 AUX8 AUX9 AUX10 AUX11 ]
            api.alsa.path = "hw:L6,0"
            api.alsa.pcm.card = "L6"
            api.alsa.pcm.device = "0"
            api.alsa.use-acp = false
            api.alsa.disable-batch = true
        }
    }
]

context.modules = [
    # 2026-04-20 rewrite v3: capture L6 Main Mix on AUX10+AUX11.
    # L6 multitrack Altset 2 exposes Main Mix L/R on the LAST pair
    # per standard Zoom layout (same pattern as L-12, L-20). The
    # earlier "silent" test (v1 also using AUX10/11) was actually
    # the Ryzen HDA codec pin-routing stale state triggered by the
    # S-4 USB plug-in (see memory `reference_ryzen_codec_pin_glitch`).
    # Once we toggled the Ryzen profile off/on, audio flowed; the
    # v2 stereo-sum was clipping because every L6 channel was being
    # added at 0.5 gain, summing 4-6 active channels over unity.
    #
    # v3 = AUX10+11 pair, unity gain, no sum. Matches L6's own
    # Main Mix master — post-fader, post-master, single stereo pair.
    # Every channel operator opens reaches this pair at its fader
    # level; ch 6 sampler chain + vinyl + Evil Pet return + TTS
    # all flow through naturally without software mixing math.
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "L6 Main Mix (AUX10+11) → livestream-tap"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # +12 dB makeup gain (~4×) to bring L6 multitrack
                    # AUX pair up to -18 dBFS broadcast target. L6 Main
                    # Mix exposes on multitrack at a conservative level
                    # (reads weak in OBS without makeup). Operator tunes
                    # the gain knob here if more/less headroom is
                    # wanted; 4.0 ≈ +12 dB, 2.0 ≈ +6 dB, 5.62 ≈ +15 dB.
                    { type = builtin label = mixer name = gain_l
                      control = { "Gain 1" = 4.0 } }
                    { type = builtin label = mixer name = gain_r
                      control = { "Gain 1" = 4.0 } }
                ]
                inputs  = [ null null null null null null null null null null "gain_l:In 1" "gain_r:In 1" ]
                outputs = [ "gain_l:Out" "gain_r:Out" ]
            }
            capture.props = {
                node.name    = "hapax-l6-evilpet-capture"
                node.description = "Hapax L6 Main Mix capture"
                target.object = "alsa_input.usb-ZOOM_Corporation_L6-00.multitrack"
                audio.channels = 12
                audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 AUX8 AUX9 AUX10 AUX11 ]
            }
            playback.props = {
                node.name    = "hapax-l6-evilpet-playback"
                target.object = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
