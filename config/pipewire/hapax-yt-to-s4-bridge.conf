# Phase A5 — hapax-yt-loudnorm → hapax-s4-content bridge
#
# Creates a PipeWire loopback from the YT loudness-normalized output
# (``hapax-yt-loudnorm-playback``) into the S-4 USB content sink
# (``hapax-s4-content``). When the S-4 is physically USB-connected,
# music / YouTube / SoundCloud sources default-route through the
# S-4 FX chain (via S-4 Track 2 MUSIC-BED scene per plan Phase B4).
#
# Until the S-4 is plugged in, ``hapax-s4-content`` has no downstream
# producer on USB; this loopback is a no-op consumer. Plugging S-4
# makes the bridge immediately active — no further software work.
#
# Design reference:
#   docs/superpowers/specs/2026-04-21-evilpet-s4-dynamic-dual-processor-design.md §3.1
#     (Source → Engine contract; music primary = S-4)
#   docs/superpowers/plans/2026-04-21-evilpet-s4-dynamic-dual-processor-plan.md Task A5

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "YT loudnorm → S-4 content bridge"
            capture.props = {
                target.object  = "hapax-yt-loudnorm-playback"
                node.name      = "hapax-yt-to-s4-bridge-in"
                node.passive   = true
            }
            playback.props = {
                target.object  = "hapax-s4-content"
                node.name      = "hapax-yt-to-s4-bridge-out"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
