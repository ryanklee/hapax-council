# Hapax PC → broadcast direct SW route (2026-04-25)
#
# Operator directive: "All of this was supposed to be controled via the SW
# side. I should not have to push or pull any faders." Earlier architecture
# routed PC audio via L-12 hardware: hapax-pc-loudnorm → L-12 USB IN
# (CH 11/12, RL/RR position) → CH 11/12 USB-button ON → fader UP → AUX-B
# UP → Evil Pet input → Evil Pet output → CH 6 wet return → broadcast.
# This required the L-12 BROADCAST scene to recall fader/aux state +
# the USB button to stay ON.
#
# When beta instructed the operator to turn USB CH 11/12 button OFF as
# a workaround for a digital-feedback-loop bug (loop fixed structurally
# in hapax-l12-evilpet-capture.conf, narrowed 14→4 channels), the PC
# audio path through L-12 hardware was severed. PC audio could no
# longer reach broadcast via any path.
#
# This config adds a direct PipeWire loopback:
#
#     hapax-pc-loudnorm.monitor → hapax-livestream-tap.playback
#
# PC audio is normalised by hapax-pc-loudnorm (-18 LUFS / -1 dBTP) and
# fed straight into the broadcast tap, bypassing the L-12 entirely.
# No hardware fader / button manipulation required.
#
# TRADE-OFF
#
#   PC audio loses the Evil Pet hardware character (it goes to broadcast
#   "dry" relative to the wet hardware return path). Vinyl + mics still
#   route through the L-12 capture chain (hapax-l12-evilpet-capture)
#   and retain Evil Pet processing on AUX5/CH6.
#
# DOUBLE-COUNT WARNING
#
#   This route assumes the L-12 hardware path for PC is INACTIVE
#   (USB CH 11/12 button OFF, or fader DOWN, or AUX-B SEND DOWN). With
#   the hardware path also active, PC audio reaches broadcast TWICE —
#   once dry via this loopback, once wet via Evil Pet. The hapax-l12-
#   evilpet-capture binding does NOT capture AUX10/AUX11 (the "raw PC"
#   positions) so even with USB button ON the loopback double-count is
#   the only concern, not the original digital feedback loop.
#
# REVERT
#
#   Delete this file + restart pipewire to remove the direct route. PC
#   audio reverts to L-12-hardware-dependent routing.

context.modules = [
    # Catch-all PC audio normaliser (hapax-pc-loudnorm) → broadcast tap.
    # This is the system default sink; any app that respects default
    # routing flows through here.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "PC loudnorm → broadcast tap (direct, bypass L-12)"
            capture.props = {
                node.name      = "hapax-pc-direct-broadcast-src"
                stream.capture.sink = true
                target.object  = "hapax-pc-loudnorm"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = "hapax-pc-direct-broadcast-dst"
                target.object  = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive   = false
            }
        }
    }
    # Music-specific normaliser (hapax-music-loudnorm) → broadcast tap.
    # Operator routes media-player apps to this sink for music-tuned
    # compression. Without a tap here, music audio reaches L-12 hardware
    # but never reaches the broadcast tap directly. Diagnosed live
    # 2026-04-25: hapax-music-loudnorm.monitor peaks at -6.8 dBFS while
    # hapax-pc-loudnorm.monitor is silent — operator's actual playing
    # audio routes through music-loudnorm.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Music loudnorm → broadcast tap (direct, bypass L-12)"
            capture.props = {
                node.name      = "hapax-music-direct-broadcast-src"
                stream.capture.sink = true
                target.object  = "hapax-music-loudnorm"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = "hapax-music-direct-broadcast-dst"
                target.object  = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive   = false
            }
        }
    }
]
