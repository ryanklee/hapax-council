# Hapax LRR Phase 9 §3.8 — operator-voice-over-YouTube ducker
#
# Creates a virtual sink ``hapax-ytube-ducked`` that YouTube / OBS media
# players target for their music-bed audio. A sidechain compressor
# listens on the operator mic (``hapax-operator-mic``); when voice
# activity crosses the threshold, the compressor attenuates the media
# bed so the operator's voice sits forward in the mix. Release is slow
# enough that brief pauses don't jitter the ducking.
#
# SIGNAL FLOW
#
#   YouTube / OBS media player   ───▶  hapax-ytube-ducked (sink)
#                                           │
#                                           ▼
#                                 filter-chain (sidechain compressor)
#                                           ▲
#                                           │
#                   Operator mic  ──capture▶ hapax-operator-mic-tap
#                                           │
#                                           ▼
#                                 default stereo output
#
# INSTALL
#
#   cp config/pipewire/voice-over-ytube-duck.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-ytube-ducked
#
# ROUTE MEDIA THROUGH THE DUCKER
#
# In OBS / the browser (Chromium --use-alsa=false / --pw-sink), select
# ``Hapax YouTube Ducker`` as the audio output. OBS users can set the
# per-source "Monitor and Output" audio device to ``hapax-ytube-ducked``.
#
# TUNE THRESHOLD / RATIO
#
# - threshold: ``-30`` dBFS — voice louder than this triggers ducking
# - ratio: ``8:1`` — aggressive duck (~12 dB reduction at -20 dBFS)
# - attack: ``5`` ms — fast enough not to chop the first consonant
# - release: ``300`` ms — slow enough to hold through short pauses
#
# PRINCIPLE: only ONE ducker preset may be installed at a time — the
# sink name ``hapax-ytube-ducked`` is the routing fixed point that OBS
# binds to. Swap presets by deleting the file in
# ``~/.config/pipewire/pipewire.conf.d/`` before copying a replacement.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-ytube-ducker"
            node.description = "Hapax YouTube Ducker (sidechain)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # Sidechain compressor — attenuates media when mic is loud.
                    # sc4m is the Steve Harris LADSPA sc4 (mono sidechain).
                    # ``main`` inputs carry the media; ``sc`` input is the
                    # mic envelope. Control parameters match the tuning
                    # guide in the file header.
                    {
                        type = ladspa
                        name = duck_l
                        plugin = sc4m_1916
                        label = sc4m
                        control = {
                            "RMS/peak" = 0.5
                            "Attack time (ms)" = 5.0
                            "Release time (ms)" = 300.0
                            "Threshold level (dB)" = -30.0
                            "Ratio (1:n)" = 8.0
                            "Knee radius (dB)" = 3.0
                            "Makeup gain (dB)" = 0.0
                        }
                    }
                    {
                        type = ladspa
                        name = duck_r
                        plugin = sc4m_1916
                        label = sc4m
                        control = {
                            "RMS/peak" = 0.5
                            "Attack time (ms)" = 5.0
                            "Release time (ms)" = 300.0
                            "Threshold level (dB)" = -30.0
                            "Ratio (1:n)" = 8.0
                            "Knee radius (dB)" = 3.0
                            "Makeup gain (dB)" = 0.0
                        }
                    }
                ]
                links = [ ]
                inputs  = [ "duck_l:Left input" "duck_r:Left input" ]
                outputs = [ "duck_l:Left output" "duck_r:Left output" ]
            }

            capture.props = {
                node.name = "hapax-ytube-ducked"
                node.description = "Hapax YouTube Ducker (input — point OBS/browsers here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-ytube-ducker-playback"
                node.description = "Hapax YouTube Ducker (output — routes to default stereo)"
                node.passive = true
            }
        }
    }
]
