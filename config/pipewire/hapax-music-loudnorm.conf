# Hapax music-source loudness sink — 2026-04-23
#
# Music-mastering-style filter chain for the local-music-player
# (oudepode SC, Epidemic, Streambeats, etc.). Differs from
# pc-loudnorm's heavy-handed comp because mastered music IS already
# dynamics-controlled — re-compressing it pumps drum transients
# (operator observation 2026-04-23 on UNKNOWNTRON: "big pumping").
#
# DESIGN
#
# - Very gentle compression (high threshold, low ratio, slow release)
#   so the signature dynamics of the source are preserved.
# - Hard-limiter ceiling at -1.0 dBTP catches inter-sample peaks.
# - Output target: same L-12 USB return as pc-loudnorm so music lands
#   on CH 11/12 → AUX-B → Evil Pet → broadcast (per Evil Pet broadcast
#   source policy, music is TIER 0/1 — safe to feed Evil Pet).
#
# WHY NOT BYPASS COMPRESSION ENTIRELY
#
# Operator directive 2026-04-23: "make sure these sources are all
# entering a normalization path HOOOOT". A peak ceiling alone (no
# compression) doesn't actually normalize — quiet tracks stay quiet
# and loud tracks hit the limiter. The gentle compression here brings
# the dynamic floor up enough that quiet+loud tracks live in roughly
# the same RMS region without audibly pumping.
#
# WHY NOT REUSE pc-loudnorm
#
# pc-loudnorm is tuned for diverse PC audio (browser, games,
# notifications) where transient management matters more than
# preserving musical groove. Threshold -16 / ratio 3:1 / release 250ms
# is the right tool for a YouTube video punch-cut OR a notification
# sting; it's wrong for a hip-hop drum loop. Two sinks, two tunings.
#
# LEVELS (mastering-style; conservative)
#
# - Threshold (-6 dB): only catches actual peaks; preserves the
#   verse/chorus dynamic envelope a producer authored.
# - Ratio (1.5:1): touch-of-glue compression, not "control".
# - Attack (30 ms): well past kick/snare transients; lets them
#   through unsquished.
# - Release (800 ms): slow enough that the comp doesn't pump
#   between drum hits; tracks the song's overall envelope.
# - Makeup gain (+1 dB): mild post-comp lift.
# - dB limit (-1.0): same -1 dBTP ceiling as pc/voice loudnorm.
#
# INSTALL
#
#   cp config/pipewire/hapax-music-loudnorm.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#   systemctl --user restart hapax-music-player.service  # picks up new sink
#
# ROUTING
#
# The local music player defaults to ``hapax-music-loudnorm`` per
# DEFAULT_SINK in agents/local_music_player/player.py — operator does
# not need to change anything. Override via HAPAX_MUSIC_PLAYER_SINK
# for off-broadcast monitoring.
#
# REFERENCES
# - Sister loudnorms: pc-loudnorm.conf, voice-fx-loudnorm.conf
# - L-12 AUX B topology: docs/governance/evil-pet-broadcast-source-policy.md
# - Master-bus safety net: hapax-broadcast-master.conf

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-loudnorm"
            node.description = "Hapax Music Loudnorm (music-mastering style; gentle, transient-preserving)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "music_comp_l"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 30.0
                          "Release time (ms)" = 800
                          "Threshold level (dB)" = -6
                          "Ratio (1:n)" = 1.5
                          "Knee radius (dB)" = 6.0
                          "Makeup gain (dB)" = 1
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "music_comp_r"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 30.0
                          "Release time (ms)" = 800
                          "Threshold level (dB)" = -6
                          "Ratio (1:n)" = 1.5
                          "Knee radius (dB)" = 6.0
                          "Makeup gain (dB)" = 1
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "music_limit_l"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "music_limit_r"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                ]
                inputs  = [ "music_comp_l:Input"  "music_comp_r:Input"  ]
                outputs = [ "music_limit_l:Output" "music_limit_r:Output" ]
                links = [
                    { output = "music_comp_l:Output" input = "music_limit_l:Input" }
                    { output = "music_comp_r:Output" input = "music_limit_r:Input" }
                ]
            }

            capture.props = {
                node.name = "hapax-music-loudnorm"
                node.description = "Hapax Music Loudnorm (input — local-music-player target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-loudnorm-playback"
                node.description = "Hapax Music Loudnorm → L-12 USB"
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
]
