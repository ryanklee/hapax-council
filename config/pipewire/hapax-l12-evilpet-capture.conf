# L-12 multitrack → livestream capture (v2 — narrowed 14→4 channels)
#
# 2026-04-25 — channel-narrow per task feedback-prevention-evilpet-capture-narrow:
# capture.props.audio.channels reduced from 14 → 4, audio.position
# narrowed to [ AUX1 AUX3 AUX4 AUX5 ] = the exact AUX positions wired
# in the filter graph (contact, sampler, rode, evilpet). Earlier
# 14-channel binding allowed AUX10/AUX11 (PC USB-IN CH11/12 return)
# to enter the broadcast capture chain, which created a digital
# feedback loop: workstation default sink → CH 11/12 → AUX B →
# Evil Pet → wet return CH 6 → broadcast → workstation. Source:
# researcher report a09d834c, 2026-04-25 L-12 broadcast feedback
# diagnosis. Constitutional invariant
# `feedback_l12_equals_livestream_invariant` (inverse direction):
# broadcast must NEVER loop back into L-12 capture.
#
# Replaces hapax-l6-evilpet-capture.conf after the L-6 firmware-wedge
# incident of 2026-04-20 (URBs delivered, payload zero, unrecoverable
# by mode-lock / power-cycle / re-enum). L-12 is UAC2 class-compliant
# (mode fixed via rear-panel slide switch, not firmware boot-combo),
# enumerates at 48 kHz / 14 channels, and has public Linux track
# record under PipeWire.
#
# Channel map (per operator + L-12 manual, "BROADCAST" scene on SD):
# Evil Pet moved OFF phantom bank (Evil Pet output may not tolerate +48V;
# safety first — operator can revisit if Evil Pet is confirmed p48-safe).
#   AUX0  (CH1 XLR, phantom-bank 1-4)  reserve
#   AUX1  (CH2, phantom-bank 1-4)      Cortado contact mic — needs +48V
#   AUX2  (CH3, phantom-bank 1-4)      reserve
#   AUX3  (CH4, phantom-bank 1-4)      Sampler chain (line-level, p48-safe)
#   AUX4  (CH5 XLR, phantom-bank 5-8)  Rode Wireless Pro RX — phantom OFF
#   AUX5  (CH6 XLR, phantom-bank 5-8)  Evil Pet return — phantom OFF (SAFE)
#   AUX6..AUX7                         unused reserve (CH7–8, phantom OFF)
#   AUX8..AUX9 (CH9/10 stereo)   Korg Handytraxx (vinyl)
#   AUX10..AUX11 (CH11/12 stereo) PC line-out (Ryzen HDA analog)
#   AUX12..AUX13                 MASTER L/R (post-master-fader) —
#                                DROPPED from capture so physical
#                                MASTER fader doesn't drive broadcast
#
# Evil Pet send path (operator-configured via L-12 front panel):
#   PC stereo on CH11/12 routed to MONITOR OUT A bus
#   MONITOR A (custom mix, NOT master mirror) → Evil Pet input
#   Evil Pet output → CH1 XLR (phantom OFF)
#   CH1 level on MONITOR A = 0.0 (mandatory anti-feedback)
#   See docs: BROADCAST scene on SD card recalls levels on session start.
#
# Monitoring: operator's physical MASTER fader drives room monitors
# (analog). Pre-fader post-compressor USB capture means OBS gets
# clean stems regardless of fader moves. Same invariant as v5 L-6.

context.properties = {
}

# Intentionally empty — no explicit adapter factory; WirePlumber
# auto-binds the L-12 ALSA source via `target.object` below. Mirrors
# the L-6 v5 hotplug-tolerance fix (commit TBD on B4 PR, adapted
# target-object name for L-12).
context.objects = []

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "L-12 multitrack → livestream-tap (per-ch pre-fader/post-comp sum)"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # Per-channel software gain stages. Operator tunes
                    # here; L-12 physical faders drive MASTER/MONITOR
                    # only, NOT broadcast capture. Linear 1.0 = unity;
                    # 2.0 ≈ +6 dB; 4.0 ≈ +12 dB (spec §9 ceiling).
                    # 2026-04-22: unity across the board. Operator runs
                    # everything at unity on the hardware side; the filter
                    # must be transparent by default. Loudness shaping
                    # belongs to pc-loudnorm / voice-fx-loudnorm on the
                    # send side, not this capture tap.
                    { type = builtin label = mixer name = gain_evilpet
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_contact
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_rode
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_samp
                      control = { "Gain 1" = 1.0 } }

                    # NOTE (2026-04-21, Phase A1 drift fix): removed
                    # gain_pc_l / gain_pc_r stages (AUX10/AUX11 raw PC
                    # from CH11/12). PC audio must reach broadcast ONLY
                    # via the Evil Pet hardware return (gain_evilpet on
                    # AUX5 / CH6).
                    #
                    # NOTE (2026-04-21, Phase A2 vinyl-through-Evil-Pet):
                    # removed gain_handy_l / gain_handy_r stages
                    # (AUX8/AUX9 raw vinyl from CH9/CH10). Same
                    # architectural rule as A1: vinyl must reach
                    # broadcast ONLY via Evil Pet. Operator raises
                    # CH9/CH10 AUX B sends → Evil Pet input → Evil Pet
                    # output → L-12 CH1/CH6 (Evil Pet return) → AUX5
                    # → gain_evilpet → broadcast. The prior dual-path
                    # (AUX8/9 dry + AUX5 wet, summed) meant dry vinyl
                    # always pre-empted wet regardless of operator
                    # intent. The sum below now has 4 inputs
                    # (evilpet + contact + rode + samp).

                    # L/R summing busses. 4 mono sources fan to both
                    # sides (Evil Pet / Contact / Rode / Sampler).
                    #
                    # 2026-04-22 (revised): the prior revision set these
                    # gains to 4.0 based on a wrong hypothesis that
                    # ``builtin label = mixer`` averages inputs. It does
                    # not — it sums with per-input gain (no normalization).
                    # The pre-reboot silence that motivated the 4.0 boost
                    # was a separate issue (stale WirePlumber stream-
                    # properties + Ryzen codec pin-glitch from repeated
                    # PipeWire restarts). Post-reboot with everything at
                    # unity on the hardware side, 4.0 produced OBS peaks
                    # deep in the red. Unity here = transparent sum.
                    { type = builtin label = mixer name = sum_l
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0
                      } }
                    { type = builtin label = mixer name = sum_r
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0
                      } }
                ]
                # 4 capture ports — narrowed from 14 (2026-04-25, task
                # feedback-prevention-evilpet-capture-narrow). The prior
                # 14-channel binding declared all AUX0..AUX13 in
                # capture.props.audio.position even though only 4 inputs
                # were actually wired; the WirePlumber adapter still
                # bound 14 source channels, which made AUX10/11 (PC L/R
                # USB-IN return) capturable. Workstation default sink
                # → CH 11/12 → AUX B → Evil Pet → wet return CH 6
                # → broadcast → workstation default sink = digital loop.
                # Narrowing audio.channels to 4 + audio.position to the
                # exact AUX positions read here makes the wrong polarity
                # structurally impossible at the WirePlumber layer.
                # Source: researcher report a09d834c.
                inputs = [
                    "gain_contact:In 1"  # AUX1  CH2 Cortado contact mic (phantom ON)
                    "gain_samp:In 1"     # AUX3  CH4 Sampler chain (phantom safe)
                    "gain_rode:In 1"     # AUX4  CH5 Rode Wireless Pro (phantom OFF)
                    "gain_evilpet:In 1"  # AUX5  CH6 Evil Pet return (phantom OFF)
                ]
                # Internal routing: mono sources fan-out to L + R.
                # All stems now flow through the Evil Pet hardware loop.
                links = [
                    { output = "gain_evilpet:Out"  input = "sum_l:In 1" }
                    { output = "gain_evilpet:Out"  input = "sum_r:In 1" }
                    { output = "gain_contact:Out"  input = "sum_l:In 2" }
                    { output = "gain_contact:Out"  input = "sum_r:In 2" }
                    { output = "gain_rode:Out"     input = "sum_l:In 3" }
                    { output = "gain_rode:Out"     input = "sum_r:In 3" }
                    { output = "gain_samp:Out"     input = "sum_l:In 4" }
                    { output = "gain_samp:Out"     input = "sum_r:In 4" }
                    # Phase A1 (2026-04-21): removed gain_pc_l/r links.
                    # Phase A2 (2026-04-21): removed gain_handy_l/r links.
                    # All non-mic content reaches broadcast via Evil Pet return.
                ]
                outputs = [ "sum_l:Out" "sum_r:Out" ]
            }
            capture.props = {
                node.name = "hapax-l12-evilpet-capture"
                node.description = "Hapax L-12 → livestream (per-channel pre-fader/post-comp)"
                target.object = "alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input"
                # Narrowed from 14 to 4 (2026-04-25): bind only the AUX
                # positions actually wired into the filter graph above.
                # The WirePlumber adapter respects audio.channels +
                # audio.position as the capture-side binding contract,
                # so AUX0/AUX2/AUX6..AUX13 are now physically unreachable
                # by this capture node — including AUX10/AUX11 (CH11/CH12
                # PC USB-IN return) which was the digital-loop entry
                # point. The 4 channels declared here line up positionally
                # with the 4-entry inputs[] list below.
                audio.channels = 4
                audio.position = [ AUX1 AUX3 AUX4 AUX5 ]
            }
            playback.props = {
                node.name = "hapax-l12-evilpet-playback"
                target.object = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
                # 2026-04-26: explicitly active (not passive) so the
                # filter-chain ALWAYS pulls from the L-12 USB capture,
                # regardless of whether anything downstream is reading
                # from hapax-livestream-tap. Without this, a wireplumber
                # restart can leave the chain orphaned (capture flowing
                # at the source, but the playback side waiting for a
                # consumer-claim that doesn't return until something
                # like studio-compositor's pw-cat --record activates).
                # That orphan state was the 2026-04-26 silent-livestream-
                # tap incident (post-double-wireplumber-restart at
                # 11:04 + 11:09 CDT).
                #
                # Constitutional binders:
                # - feedback_l12_equals_livestream_invariant: L-12 input
                #   MUST reach broadcast; if the chain stalls, it doesn't
                # - feedback_never_drop_speech: silent broadcast during
                #   the orphan window drops in-flight speech
                #
                # The downstream loopback (hapax-livestream-tap →
                # hapax-broadcast-master) keeps node.passive = true
                # via the wireplumber.components.rules in
                # 50-hapax-voice-duck.conf line 45 — that's correct;
                # only the upstream filter-chain producer needs to be
                # active, not the routing loopbacks below it.
                node.passive = false
            }
        }
    }
]
