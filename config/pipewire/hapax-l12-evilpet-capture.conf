# L-12 multitrack → livestream capture (v1 — per-channel pre-fader/post-comp)
#
# Replaces hapax-l6-evilpet-capture.conf after the L-6 firmware-wedge
# incident of 2026-04-20 (URBs delivered, payload zero, unrecoverable
# by mode-lock / power-cycle / re-enum). L-12 is UAC2 class-compliant
# (mode fixed via rear-panel slide switch, not firmware boot-combo),
# enumerates at 48 kHz / 14 channels, and has public Linux track
# record under PipeWire.
#
# Channel map (per operator + L-12 manual, "BROADCAST" scene on SD):
# Evil Pet moved OFF phantom bank (Evil Pet output may not tolerate +48V;
# safety first — operator can revisit if Evil Pet is confirmed p48-safe).
#   AUX0  (CH1 XLR, phantom-bank 1-4)  reserve
#   AUX1  (CH2, phantom-bank 1-4)      Cortado contact mic — needs +48V
#   AUX2  (CH3, phantom-bank 1-4)      reserve
#   AUX3  (CH4, phantom-bank 1-4)      Sampler chain (line-level, p48-safe)
#   AUX4  (CH5 XLR, phantom-bank 5-8)  Rode Wireless Pro RX — phantom OFF
#   AUX5  (CH6 XLR, phantom-bank 5-8)  Evil Pet return — phantom OFF (SAFE)
#   AUX6..AUX7                         unused reserve (CH7–8, phantom OFF)
#   AUX8..AUX9 (CH9/10 stereo)   Korg Handytraxx (vinyl)
#   AUX10..AUX11 (CH11/12 stereo) PC line-out (Ryzen HDA analog)
#   AUX12..AUX13                 MASTER L/R (post-master-fader) —
#                                DROPPED from capture so physical
#                                MASTER fader doesn't drive broadcast
#
# Evil Pet send path (operator-configured via L-12 front panel):
#   PC stereo on CH11/12 routed to MONITOR OUT A bus
#   MONITOR A (custom mix, NOT master mirror) → Evil Pet input
#   Evil Pet output → CH1 XLR (phantom OFF)
#   CH1 level on MONITOR A = 0.0 (mandatory anti-feedback)
#   See docs: BROADCAST scene on SD card recalls levels on session start.
#
# Monitoring: operator's physical MASTER fader drives room monitors
# (analog). Pre-fader post-compressor USB capture means OBS gets
# clean stems regardless of fader moves. Same invariant as v5 L-6.

context.properties = {
}

# Intentionally empty — no explicit adapter factory; WirePlumber
# auto-binds the L-12 ALSA source via `target.object` below. Mirrors
# the L-6 v5 hotplug-tolerance fix (commit TBD on B4 PR, adapted
# target-object name for L-12).
context.objects = []

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "L-12 multitrack → livestream-tap (per-ch pre-fader/post-comp sum)"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # Per-channel software gain stages. Operator tunes
                    # here; L-12 physical faders drive MASTER/MONITOR
                    # only, NOT broadcast capture. Linear 1.0 = unity;
                    # 2.0 ≈ +6 dB; 4.0 ≈ +12 dB (spec §9 ceiling).
                    { type = builtin label = mixer name = gain_evilpet
                      control = { "Gain 1" = 2.0 } }
                    { type = builtin label = mixer name = gain_contact
                      control = { "Gain 1" = 1.5 } }
                    { type = builtin label = mixer name = gain_rode
                      control = { "Gain 1" = 2.0 } }
                    { type = builtin label = mixer name = gain_samp
                      control = { "Gain 1" = 2.0 } }
                    { type = builtin label = mixer name = gain_handy_l
                      control = { "Gain 1" = 4.0 } }
                    { type = builtin label = mixer name = gain_handy_r
                      control = { "Gain 1" = 4.0 } }

                    # NOTE (2026-04-21, Phase A1 drift fix): removed
                    # gain_pc_l / gain_pc_r stages (AUX10/AUX11 raw PC
                    # from CH11/12). PC audio must reach broadcast ONLY
                    # via the Evil Pet hardware return (gain_evilpet on
                    # AUX5 / CH6), per the R1 design contract in
                    # docs/superpowers/specs/2026-04-21-evilpet-s4-dynamic-dual-processor-design.md §4.
                    # The prior dual-path (AUX10/11 raw + AUX5 wet) was
                    # a bypass mechanism: if the Evil Pet hardware loop
                    # was silent, broadcast carried dry PC with zero FX
                    # discipline. The sum below now has 5 inputs
                    # (evilpet + contact + rode + samp + handy-stereo).

                    # L/R summing busses. 5 inputs each: 4 mono sources
                    # (Evil Pet / Contact / Rode / Sampler) fan to both
                    # sides + 1 stereo source (Handytrax) on its native side.
                    { type = builtin label = mixer name = sum_l
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0  "Gain 5" = 1.0
                      } }
                    { type = builtin label = mixer name = sum_r
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0  "Gain 5" = 1.0
                      } }
                ]
                # 14 capture ports → per-channel gain stages
                # (L-12 USB 1-12 = strips pre-fader/post-comp,
                #  USB 13-14 = MASTER L/R — intentionally dropped)
                inputs = [
                    null                 # AUX0  CH1 reserve (phantom bank)
                    "gain_contact:In 1"  # AUX1  CH2 Cortado contact mic (phantom ON)
                    null                 # AUX2  CH3 reserve (phantom bank)
                    "gain_samp:In 1"     # AUX3  CH4 Sampler chain (phantom safe)
                    "gain_rode:In 1"     # AUX4  CH5 Rode Wireless Pro (phantom OFF)
                    "gain_evilpet:In 1"  # AUX5  CH6 Evil Pet return (phantom OFF)
                    null                 # AUX6  CH7 reserve
                    null                 # AUX7  CH8 reserve
                    "gain_handy_l:In 1"  # AUX8  CH9  Handytraxx L
                    "gain_handy_r:In 1"  # AUX9  CH10 Handytraxx R
                    null                 # AUX10 CH11 PC L — bypass-removed (A1 drift fix)
                    null                 # AUX11 CH12 PC R — bypass-removed (A1 drift fix)
                    null                 # AUX12 MASTER L (dropped)
                    null                 # AUX13 MASTER R (dropped)
                ]
                # Internal routing: mono sources fan-out to L + R,
                # stereo pairs land on their native side.
                links = [
                    { output = "gain_evilpet:Out"  input = "sum_l:In 1" }
                    { output = "gain_evilpet:Out"  input = "sum_r:In 1" }
                    { output = "gain_contact:Out"  input = "sum_l:In 2" }
                    { output = "gain_contact:Out"  input = "sum_r:In 2" }
                    { output = "gain_rode:Out"     input = "sum_l:In 3" }
                    { output = "gain_rode:Out"     input = "sum_r:In 3" }
                    { output = "gain_samp:Out"     input = "sum_l:In 4" }
                    { output = "gain_samp:Out"     input = "sum_r:In 4" }
                    { output = "gain_handy_l:Out"  input = "sum_l:In 5" }
                    { output = "gain_handy_r:Out"  input = "sum_r:In 5" }
                    # Phase A1 drift fix (2026-04-21): removed
                    # gain_pc_l/r → sum_l/r:In 6 links so raw PC audio
                    # on AUX10/11 no longer shortcuts past Evil Pet.
                ]
                outputs = [ "sum_l:Out" "sum_r:Out" ]
            }
            capture.props = {
                node.name = "hapax-l12-evilpet-capture"
                node.description = "Hapax L-12 → livestream (per-channel pre-fader/post-comp)"
                target.object = "alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input"
                audio.channels = 14
                audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 AUX8 AUX9 AUX10 AUX11 AUX12 AUX13 ]
            }
            playback.props = {
                node.name = "hapax-l12-evilpet-playback"
                target.object = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
