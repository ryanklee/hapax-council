# Hapax OBS broadcast-capture tap — 2026-04-21
#
# Exposes hapax-livestream (the null-sink broadcast sum-point) as a
# clean PipeWire-native VIRTUAL SOURCE that OBS's "Audio Input Capture
# (PipeWire)" plugin enumerates and binds by node.name.
#
# WHY THIS EXISTS
#
#   OBS's obs-pipewire-audio-capture plugin ("Audio Input Capture
#   (PipeWire)" source type) lists hardware input sources + loopback-
#   exposed virtual source nodes. It does NOT enumerate sink monitors
#   directly (hapax-livestream.monitor is invisible to it). PulseAudio
#   source type DOES see sink monitors via the compat layer, but binds
#   by a numeric index that gets invalidated on every PipeWire restart,
#   so the operator has to manually re-add the source after every WP
#   restart.
#
#   This loopback takes the sink-monitor signal and re-presents it as
#   a source-class node, which the PipeWire picker DOES enumerate.
#   Binding is by node.name ("hapax-obs-broadcast-source"), which
#   survives PipeWire restarts. No more manual re-add.
#
# CHAIN
#
#   producers → hapax-livestream (existing null-sink)
#                    │
#                    ▼ (this conf: module-loopback, stream.capture.sink=true)
#               hapax-obs-broadcast-capture (capture side, passive)
#                    │
#                    ▼ (loopback copies samples)
#               hapax-obs-broadcast-source (playback side, Audio/Source class)
#                    │
#                    ▼ (OBS Audio Input Capture PipeWire picker lists this node)
#               OBS captures it
#
# DESIGN NOTES
#
# - capture.props.stream.capture.sink = true — tells the loopback to
#   attach to the capture side of the target sink, i.e. to read its
#   monitor samples.
# - capture.props.node.passive = true — the capture side does not
#   keep the target sink active on its own; if nothing else writes to
#   hapax-livestream, this loopback stays quiet.
# - playback.props.media.class = Audio/Source — exposes the playback
#   output as a virtual source node. Without this it would appear as
#   a stream/output, not a source, and OBS wouldn't list it.
# - No filter chain — this is a pure capture tap. Normalisation /
#   master-bus limiting is a separate concern (hapax-broadcast-master.conf,
#   to be re-deployed with a correct loopback after this stable capture
#   path is verified).
#
# INSTALL
#
#   cp config/pipewire/hapax-obs-broadcast-tap.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pw-cli ls Node | grep hapax-obs-broadcast-source
#   pactl list short sources | grep hapax-obs-broadcast
#     # Should show "hapax-obs-broadcast-source" as a source node.
#
#   Then in OBS:
#     Add Source → "Audio Input Capture (PipeWire)" →
#       Device dropdown → "Hapax Livestream Broadcast"
#     Remove the old PulseAudio source.
#
# REFERENCES
#
# - Sink: config/pipewire/hapax-stream-split.conf (hapax-livestream null-sink)
# - Memory: reference_obs_scene_pipewire_type.md (pulse-index invalidation)
# - OBS plugin: AUR obs-pipewire-audio-capture

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax OBS broadcast-capture tap (hapax-livestream → PipeWire-native source for OBS)"
            capture.props = {
                node.name = "hapax-obs-broadcast-capture"
                node.description = "Hapax Livestream Broadcast Tap (capture side)"
                target.object = "hapax-livestream"
                stream.capture.sink = true
                node.passive = true
                audio.position = [ FL FR ]
            }
            playback.props = {
                media.class = Audio/Source
                node.name = "hapax-obs-broadcast-source"
                node.description = "Hapax Livestream Broadcast"
                audio.position = [ FL FR ]
            }
        }
    }
]
