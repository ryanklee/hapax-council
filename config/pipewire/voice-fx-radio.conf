# Hapax voice effects chain — "radio" preset
#
# Alternative filter graph that processes TTS through a narrow telephone /
# AM-radio band (bandpass 400–3400 Hz) with a hard peak at 1.8 kHz, a gentle
# soft-knee compressor, and a brick-wall limiter. Useful as an in-world
# treatment when the operator wants the voice to read as "transmitted."
#
# Uses the same sink name as config/pipewire/voice-fx-chain.conf
# ("hapax-voice-fx-capture") so HAPAX_TTS_TARGET does not need to change
# when you swap presets. Only one preset may be installed at a time.
#
# INSTALL: copy to ~/.config/pipewire/pipewire.conf.d/ and restart PipeWire:
#   cp config/pipewire/voice-fx-radio.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# Verify with: pactl list short sinks | grep hapax-voice-fx
#
# ROUTE TTS THROUGH THE CHAIN: export HAPAX_TTS_TARGET=hapax-voice-fx-capture

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX (radio preset)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── High-pass at 400 Hz: cuts everything below the
                    #    telephone band. Two poles for a steeper skirt. ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 400.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 400.0 "Q" = 0.707 } }

                    # ── Low-pass at 3400 Hz: matches the upper edge of
                    #    the G.711 telephone passband. ──
                    { type = builtin name = lp_l label = bq_lowpass
                      control = { "Freq" = 3400.0 "Q" = 0.707 } }
                    { type = builtin name = lp_r label = bq_lowpass
                      control = { "Freq" = 3400.0 "Q" = 0.707 } }

                    # ── Mid peak at 1.8 kHz: the classic radio "honk"
                    #    that makes speech cut through the band. ──
                    { type = builtin name = peak_l label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 1.8 "Gain" = 6.0 } }
                    { type = builtin name = peak_r label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 1.8 "Gain" = 6.0 } }
                ]
                links = [
                    { output = "hp_l:Out" input = "lp_l:In" }
                    { output = "lp_l:Out" input = "peak_l:In" }
                    { output = "hp_r:Out" input = "lp_r:In" }
                    { output = "lp_r:Out" input = "peak_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "peak_l:Out" "peak_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output)"
                node.passive = true
                target.object = "alsa_output.usb-PreSonus_Studio_24c_SC1E24390244-00.analog-stereo"
            }
        }
    }
]
