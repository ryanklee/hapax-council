# Hapax broadcast master-bus normaliser — 2026-04-21
#
# Sits between the sum of all producers (hapax-livestream-tap) and OBS.
# Catches inter-source peak-stacking that slips through per-source
# normalisers (voice-fx-loudnorm, yt-loudnorm) when two hot sources
# coincide — voice + YT + vinyl + Evil Pet loop can easily sum to
# +3 dBTP even when each source is individually well-behaved at -1 dB.
#
# Master-bus philosophy: GENTLE. This layer is a safety net, not a
# dynamics sculptor. Per-source confs do the shaping; master bus only
# catches spikes the summation produces.
#
# CHAIN
#
#   Producers (voice, yt, vinyl, evilpet-loop, notifications-skipped)
#       → hapax-livestream-tap (null-sink, existing)
#       → loopback (existing)
#       → hapax-livestream (null-sink, existing broadcast destination)
#
#   This conf adds a parallel path for OBS capture:
#       hapax-livestream-tap.monitor
#           → hapax-broadcast-master (filter-chain, THIS conf)
#             ├─ gentle SC4m compressor (threshold -18, ratio 2:1)
#             └─ hard_limiter (-1.0 dBTP ceiling)
#           → monitor port, exposed as "Hapax Broadcast Master"
#       → OBS captures hapax-broadcast-master.monitor
#
# TARGETS
#
#   -14 LUFS integrated (YouTube Live spec, matching per-source confs)
#   -1.0 dBTP true-peak ceiling (matches hard_limiter in yt-loudnorm +
#       voice-fx-loudnorm; single consistent peak budget across stack)
#
# INSTALL
#
#   cp config/pipewire/hapax-broadcast-master.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# POST-INSTALL OBS STEP (one-time, operator must perform in UI)
#
#   OBS → Scene → Audio Output Capture source (existing) → Properties →
#       Device: change from "Hapax Livestream" / "hapax-livestream-tap.monitor"
#       TO: "Hapax Broadcast Master" / "hapax-broadcast-master.monitor"
#   Apply. OBS's capture is now post-normalisation.
#
# VERIFY
#
#   pactl list sinks short | grep hapax-broadcast-master
#       # Expect a single entry, RUNNING after install.
#   pw-link -l | grep hapax-broadcast-master
#       # Expect a monitor link from hapax-livestream-tap into the
#       # filter-chain's capture port.
#
# TUNE
#
# - Threshold (-18 dB) — gentle. Most content never hits this because
#   per-source normalisers have already capped at -14 LUFS. Only
#   inter-source peak-stacking bumps the sum above -18 dB.
# - Ratio (2:1) — deliberately gentle. Master bus is a safety net,
#   not a mix-bus sculptor. Raise to 3:1 if operator reports the
#   compression still feels transparent but spikes still land.
# - dB limit (-1.0) — hard ceiling matching YouTube ingest budget.
#   NEVER raise to 0 — inter-sample clipping at the encoder.
# - Attack (10 ms) — slower than per-source confs' 5ms. Master bus
#   should not colour transient content; it catches sustained spikes.
# - Release (200 ms) — medium. Prevents pumping on fast source changes.
#
# PROBLEM THIS SOLVES
#
#   Operator directive 2026-04-21: "The volume spikes across the
#   sources are impossible to deal with manually."
#   Cause: per-source normalisers correctly normalise EACH source at
#   -14 LUFS / -1.0 dBTP, but when 2-3 sources coincide (voice over
#   vinyl during a Hapax interjection, or YT bed + Evil Pet loop +
#   vinyl), the SUMMATION can exceed the single-source ceiling. This
#   master-bus layer catches the sum.
#
# REFERENCES
#
# - Audit finding 2026-04-21: missing master-bus limiter (EvilPet-S4
#   Phase A §5.3; never shipped)
# - Sister normalisers: yt-loudnorm.conf, voice-fx-loudnorm.conf
# - Compositor sum-point: hapax-livestream-tap (hapax-livestream-tap.conf)
# - OBS capture: docs/issues/obs-scene-source-pipewire-type.md

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-broadcast-master"
            node.description = "Hapax Broadcast Master (post-sum normaliser — route OBS capture here)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Gentle master-bus compressor (mono sc4m ×2).
                    # Threshold -18 dB, ratio 2:1, slow attack,
                    # medium release, unity makeup. Catches the sum,
                    # doesn't sculpt individual sources.
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "master_comp_l"
                      control = {
                          "RMS/peak" = 0.3
                          "Attack time (ms)" = 10.0
                          "Release time (ms)" = 200
                          "Threshold level (dB)" = -18
                          "Ratio (1:n)" = 2
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 0
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "master_comp_r"
                      control = {
                          "RMS/peak" = 0.3
                          "Attack time (ms)" = 10.0
                          "Release time (ms)" = 200
                          "Threshold level (dB)" = -18
                          "Ratio (1:n)" = 2
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 0
                      }
                    }

                    # ── Final ceiling. -1.0 dBTP matches the per-source
                    # budget so the stack presents one consistent peak
                    # ceiling to YouTube's ingest, not two competing ones.
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "master_limit_l"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "master_limit_r"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                ]
                inputs  = [ "master_comp_l:Input"  "master_comp_r:Input"  ]
                outputs = [ "master_limit_l:Output" "master_limit_r:Output" ]
                links = [
                    { output = "master_comp_l:Output" input = "master_limit_l:Input" }
                    { output = "master_comp_r:Output" input = "master_limit_r:Input" }
                ]
            }

            capture.props = {
                node.name = "hapax-broadcast-master"
                node.description = "Hapax Broadcast Master (input — route producers here; OBS captures monitor)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-broadcast-master-monitor"
                node.description = "Hapax Broadcast Master (monitor — route OBS here)"
                # Passive: OBS reads the filter output via the monitor
                # port. No active downstream routing.
                node.passive = true
            }
        }
    }
    # Auto-pull from hapax-livestream-tap.monitor into the master-bus
    # filter-chain so the normaliser sees the SUM of everything the
    # compositor routes through the tap. Without this loopback the
    # filter-chain stays IDLE (nothing connected to its input).
    #
    # LOOPBACK PATTERN (fixed 2026-04-21 post-feedback-cycle)
    #
    # Prior revision set `media.class = Audio/Source` on playback.props,
    # which registered the loopback output AS a new source node.
    # WirePlumber's default-policy then auto-linked that "source" back
    # to hapax-bm-capture (the nearest compatible capture), producing
    # the cycle observed with `pw-link -l`:
    #
    #   hapax-bm-capture:input ← hapax-broadcast-master-monitor:output
    #
    # Verified-good pattern (this file + hapax-livestream-tap.conf):
    #   - capture.props reads the target sink's monitor via
    #     stream.capture.sink = true
    #   - playback.props writes to the target sink as a plain stream;
    #     NO media.class declaration (default Stream/Output/Audio is
    #     not a routable source node)
    #   - audio.channels + audio.position declared explicitly on both
    #     sides so format negotiation stays unambiguous
    #
    # Verify after install with:
    #   pw-link -l | grep broadcast-master
    #   # Expect hapax-livestream-tap:monitor_* → hapax-bm-capture:input_*
    #   # DO NOT expect hapax-broadcast-master-monitor:output_* as a
    #   # source of hapax-bm-capture:input_*.
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Loopback: livestream-tap.monitor → broadcast-master"
            capture.props = {
                node.name = "hapax-bm-capture"
                target.object = "hapax-livestream-tap"
                stream.capture.sink = true
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "hapax-bm-playback"
                target.object = "hapax-broadcast-master"
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive = true
            }
        }
    }
]
