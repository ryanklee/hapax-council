# Hapax TTS loudness normalisation — SC4 compressor + fast-lookahead limiter.
#
# Ships the audio-normalization plan's Phase A (compressor) + inline
# Phase B-equivalent peak limiting. Drop in after the biquad voice-fx
# chain (voice-fx-chain.conf) for a two-stage TTS processing path:
#
#   Kokoro TTS → hapax-voice-fx (biquad EQ + compression) →
#     hapax-loudnorm (SC4 broadcast compression + fast-lookahead limiter)
#     → downstream sink
#
# LADSPA syntax + plugin labels per docs/research/2026-04-20-ladspa-
# pipewire-syntax.md §4. The `label` field is the in-.so plugin label
# from `analyseplugin`, NOT the filename — sc4_1882.so exposes label
# "sc4".
#
# Per-channel plugin instances are mandatory because both SC4 and
# fast_lookahead_limiter are mono. Matching control values across
# _l/_r keeps the stereo image consistent.
#
# Tune:
# - Threshold (-18 dB) controls how aggressively the compressor acts.
# - Makeup gain (-1 dB) — re-tuned 2026-04-21 from 0 dB. Output target
#   is −18 LUFS integrated (pro audio digital line-level; 0 VU =
#   −18 dBFS convention). Matches pc-loudnorm re-tune in same session
#   so voice + PC audio arrive at L-12 CH 11/12 at the same reference.
#   See docs/research/2026-04-21-pc-l12-level-matching-design.md.
# - Limit ceiling (-1 dB) prevents inter-sample peaks at the encoder.
#   Never set to 0 dB — risks sample clipping.
#
# References:
# - docs/research/2026-04-20-audio-normalization-ducking-strategy.md
# - docs/research/2026-04-21-pc-l12-level-matching-design.md

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-loudnorm"
            node.description = "Hapax TTS loudness normalisation (SC4 + limiter)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Mono SC4 compressor (sc4m_1916, label "sc4m"),
                    # instantiated twice for L/R. The mono variant has
                    # "Input" / "Output" audio ports — the stereo
                    # sc4_1882 has "Left input" / "Right input" /
                    # "Left output" / "Right output" which collide with
                    # the per-channel filter-graph link topology.
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "comp_l"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 1.5
                          "Release time (ms)" = 150
                          "Threshold level (dB)" = -18
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 3.5
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "comp_r"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 1.5
                          "Release time (ms)" = 150
                          "Threshold level (dB)" = -18
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 3.5
                          "Makeup gain (dB)" = -1
                      }
                    }

                    # ── Mono hard limiter (hard_limiter_1413, label
                    # "hardLimiter"), instantiated twice for L/R.
                    # -1 dB ceiling prevents encoder-side sample
                    # clipping. Same swap reason as sc4 → sc4m above.
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "limit_l"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                    { type = ladspa
                      plugin = "hard_limiter_1413"
                      label = "hardLimiter"
                      name = "limit_r"
                      control = {
                          "dB limit" = -1.0
                          "Wet level" = 1
                          "Residue level" = 0
                      }
                    }
                ]
                inputs  = [ "comp_l:Input"  "comp_r:Input"  ]
                outputs = [ "limit_l:Output" "limit_r:Output" ]
                links = [
                    { output = "comp_l:Output"  input = "limit_l:Input" }
                    { output = "comp_r:Output"  input = "limit_r:Input" }
                ]
            }

            capture.props = {
                node.name = "hapax-loudnorm-capture"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-loudnorm-playback"
                # 2026-04-21: downstream chosen as Ryzen analog-stereo to
                # match the voice-fx-chain pre-retarget path (L-12 ch 4
                # AUX-1 → Evil Pet → L-12 ch 3 → Main Mix). Replaces the
                # prior unresolved <downstream-sink> placeholder. Per
                # the per-source normalisation audit: voice-fx-chain now
                # feeds this filter-chain (target.object =
                # "hapax-loudnorm-capture" in voice-fx-chain.conf), and
                # this target completes the TTS → FX → loudnorm →
                # hardware chain.
                target.object = "alsa_output.pci-0000_73_00.6.analog-stereo"
            }
        }
    }
]
