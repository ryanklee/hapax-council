# Hapax TTS loudness chain — Phase 1.7 hot-fix 2026-04-23
#
# Replaces sc4m + hard_limiter_1413 chain with single
# fast_lookahead_limiter_1913 to match the music chain shape
# (Phase 1.5 fix). hard_limiter_1413 is a SAMPLE CLIPPER — the
# same defect we ripped out of hapax-music-loudnorm.
#
# Output ceiling -18 dBFS (matches MUSIC_TO_L12_PEAK_DBFS) so TTS
# lands at the L-12 USB return at the SAME level as music. With
# both at -18 dBFS into L-12 CH 11/12 LINE+unity, the broadcast
# bus sees them at parity post-Evil-Pet, and the master makeup
# gain (+9 dB) brings the sum to -14 LUFS-I egress.
#
# Phase 3 will replace this with proper LUFS-targeting per-source
# pre-normalization. This is the level-parity bridge.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-loudnorm"
            node.description = "Hapax TTS Loudnorm (true-peak limiter, -18 dBFS, level-parity with music)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "tts_limiter"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                inputs  = [ "tts_limiter:Input 1"  "tts_limiter:Input 2"  ]
                outputs = [ "tts_limiter:Output 1" "tts_limiter:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-loudnorm-capture"
                node.description = "Hapax TTS Loudnorm (input — voice-fx-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-loudnorm-playback"
                node.description = "Hapax TTS Loudnorm → TTS Duck"
                # Phase 4: route through hapax-tts-duck (mixer-based
                # ducker) instead of straight to L-12.
                target.object = "hapax-tts-duck"
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
