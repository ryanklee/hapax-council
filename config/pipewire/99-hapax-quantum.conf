# Hapax quantum defaults — 128 → 512 → 1024 samples @48kHz (~21.3 ms).
#
# Graph has many concurrent clients (TTS, YT, studio compositor, voice-fx
# filter-chain, multiple role-based loopbacks). At quantum=512 the
# cascades of "out of buffers on port 0" dropped but YT-correlated static
# returned under studio_compositor + pytest + nvidia-smi CPU load.
# Root-caused: pipewire RT data-loop runs SCHED_FIFO 88 correctly, but
# the audioconvert / resampler nodes in the YT chain can't refill buffers
# fast enough at 10.7 ms quantum under simultaneous 180% CPU loads.
# Bumping quantum to 1024 (~21.3 ms) gives the graph enough slack.
#
# Livestream broadcast has no latency-sensitive input monitoring through
# this chain (operator monitors pre-Evil-Pet via hardware), so 21 ms is
# imperceptible. Revert only if low-latency PC-side live FX work starts.
#
# Set 2026-04-20 — first at 512, then 1024 after YT crackling persisted.

context.properties = {
    default.clock.quantum       = 1024
    default.clock.min-quantum   = 512
    default.clock.max-quantum   = 2048
}
