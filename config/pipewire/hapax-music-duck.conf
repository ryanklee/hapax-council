# Hapax Music Duck — Phase 4 sidechain ducking (2026-04-23)
#
# Inserted between hapax-music-loudnorm and the L-12 USB return.
# Two mono mixers (one per channel) with controllable Gain 1. Default
# Gain 1 = 1.0 (transparent passthrough). hapax-audio-ducker.service
# writes duck gain values when Rode VAD or TTS envelope detects activity.
#
# DUCK DEPTHS (set by daemon, source: shared/audio_loudness.py)
#   Operator voice (Rode) active : Gain 1 = 0.251  (≈ -12 dB)
#   TTS active                   : Gain 1 = 0.398  (≈ -8 dB)
#   Both active                  : daemon takes minimum (deepest duck)
#   Neither active               : Gain 1 = 1.0   (passthrough)
#
# WIRING — stereo passthrough with per-channel gain
#
# Each `mixer` builtin node is mono with up to 8 input ports
# (`In 1`..`In 8`). For our 1-input-per-channel ducker we use the
# `In 1` input only and wire it through `Out`. Two mixer nodes
# (left + right) keep stereo independent. Daemon writes the same
# gain to both via two pw-cli calls (atomic-ish; small jitter is
# inaudible at our timescales).
#
# Spec: docs/superpowers/specs/2026-04-23-livestream-audio-unified-architecture-design.md

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-duck"
            node.description = "Hapax Music Duck (operator-VAD + TTS sidechain)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = duck_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = duck_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "duck_l:In 1" "duck_r:In 1" ]
                outputs = [ "duck_l:Out"  "duck_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-music-duck"
                node.description = "Hapax Music Duck (input — music-loudnorm-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-duck-playback"
                node.description = "Hapax Music Duck → L-12 USB"
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
]
