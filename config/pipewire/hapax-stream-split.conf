# Hapax stream/private split — 2026-04-19
# 
# Creates two virtual sinks that both target the Studio 24c analog output,
# but map their stereo input to ONLY ONE physical channel of the 24c:
#
#   hapax-livestream  → 24c LEFT  only (right silenced)
#   hapax-private     → 24c RIGHT only (left silenced)
#
# The operator's downstream mixer can pan these two channels to separate
# buses: livestream-bound audio (music, public Hapax TTS, operator voice
# intended for stream) goes out one side; private Hapax TTS (sidechat
# replies, coaching, debug narration) + system notifications + anything
# else not intended for broadcast goes out the other.
#
# Clients route to these sinks by:
#   pw-cat --playback --target hapax-livestream ...
#   pactl move-sink-input <id> hapax-livestream
#
# Or via a WirePlumber rule that matches on application.name / media.role.
#
# INSTALL
#   cp config/pipewire/hapax-stream-split.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Livestream (24c LEFT only)"
            media.name       = "hapax-livestream"
            filter.graph = {
                nodes = [
                    # Input stereo → sum to mono via gain node, then output
                    # as stereo with L = mono, R = 0 (silence).
                    { type = builtin label = mixer name = sum
                      control = { "Gain 1" = 0.5  "Gain 2" = 0.5 } }
                ]
                inputs  = [ "sum:In 1" "sum:In 2" ]
                outputs = [ "sum:Out"  null ]
            }
            capture.props = {
                node.name    = "hapax-livestream"
                node.description = "Hapax Livestream (24c LEFT)"
                media.class  = "Audio/Sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name    = "hapax-livestream-playback"
                # node.passive removed 2026-04-19 — was inhibiting the monitor
                # port of the hapax-livestream virtual sink, producing silence
                # for anything consuming ``hapax-livestream.monitor`` (OBS).
                # Side effect: the filter-chain now always runs; trivial CPU.
                # stream.dont-remix removed: forced exact channel alignment
                # was another suspected contributor to monitor starvation.
                # 2026-04-20: retargeted from retired 24c → L6 USB playback.
                # Keeps the stereo L/R split semantics: hapax-livestream lands
                # on L6 USB-return LEFT; hapax-private on L6 USB-return RIGHT.
                # Operator controls via L6 USB return channel pan + fader.
                target.object = "alsa_output.usb-ZOOM_Corporation_L6-00.analog-stereo"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Private (24c RIGHT only)"
            media.name       = "hapax-private"
            filter.graph = {
                nodes = [
                    # Input stereo → sum to mono, output as stereo with
                    # L = 0 (silence), R = mono.
                    { type = builtin label = mixer name = sum
                      control = { "Gain 1" = 0.5  "Gain 2" = 0.5 } }
                ]
                inputs  = [ "sum:In 1" "sum:In 2" ]
                outputs = [ null "sum:Out" ]
            }
            capture.props = {
                node.name    = "hapax-private"
                node.description = "Hapax Private (24c RIGHT)"
                media.class  = "Audio/Sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name    = "hapax-private-playback"
                # node.passive + stream.dont-remix removed 2026-04-19 for
                # the same monitor-port-starvation reason as the livestream
                # half of this filter-chain.
                # 2026-04-20: retargeted from retired 24c → L6 USB playback.
                # Keeps the stereo L/R split semantics: hapax-livestream lands
                # on L6 USB-return LEFT; hapax-private on L6 USB-return RIGHT.
                # Operator controls via L6 USB return channel pan + fader.
                target.object = "alsa_output.usb-ZOOM_Corporation_L6-00.analog-stereo"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
