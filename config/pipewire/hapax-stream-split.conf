# Hapax stream/private virtual sinks — 2026-04-20 post-24c rewrite
#
# History: this file previously used a filter-chain with mono-sum +
# L-only/R-only output routing to split the 24c's Out 1/Out 2 into two
# application destinations. After the 24c was retired (ground loop),
# all PC audio funnels through Ryzen line-out → L6 ch 5 → Evil Pet →
# L6 ch 3 → Main Mix. The L/R split has no downstream hardware consumer
# anymore, and the `null` output channel in the filter graph was
# eating the entire signal when targeted at a stereo sink.
#
# New design: two straight loopback sinks to the Ryzen analog-stereo
# output. ``hapax-livestream`` and ``hapax-private`` both land on the
# same hardware wire; PipeWire mixes in software at the Ryzen sink.
# Operator routes via L6 hardware (ch 5 fader + AUX 1) — the mixer is
# the correct place for broadcast-vs-private gating now that the 24c's
# physical-channel-level split is gone.
#
# Applications that need to keep their previous API surface (media.role
# targeting, pw-cat --target hapax-livestream, etc.) see the same sink
# names — only the downstream hardware target has changed.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Livestream (→ Ryzen → L6 ch 5)"
            capture.props = {
                node.name      = "hapax-livestream"
                node.description = "Hapax Livestream"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = "hapax-livestream-playback"
                # 2026-04-20 reverted from L6 USB playback — that target
                # doesn't route to Main on this L6 (no USB-return fader
                # on OG L6; operator-verified: 'livestream audio dead').
                # Back to Ryzen path. Evil-Pet-selectivity compromise:
                # all PC audio shares the Ryzen→ch5 wire, so general
                # livestream audio is subject to ch 5 AUX 1 routing the
                # operator has set. Selective FX path requires the S-4
                # USB-direct split documented in
                # docs/research/2026-04-20-dual-fx-routing-design.md §3.
                target.object  = "alsa_output.pci-0000_73_00.6.analog-stereo"
                audio.position = [ FL FR ]
            }
        }
    }
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Private (→ Ryzen → L6 ch 5)"
            capture.props = {
                node.name      = "hapax-private"
                node.description = "Hapax Private"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = "hapax-private-playback"
                target.object  = "alsa_output.pci-0000_73_00.6.analog-stereo"
                audio.position = [ FL FR ]
            }
        }
    }
]
