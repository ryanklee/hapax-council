# Hapax M8 instrument loudness sink — Phase 3 of cc-task re-splay-homage-ward-m8.
#
# The M8's USB Audio Class output (alsa_input.usb-Dirtywave_M8_*) is
# routed via the loopback module below into this filter-chain sink, where
# a fast_lookahead_limiter holds output at -1.5 dBTP. The sink playback
# port targets hapax-livestream-tap directly, so M8 audio reaches
# broadcast WITHOUT touching L-12 hardware (vacuously satisfies
# feedback_l12_equals_livestream_invariant in spirit, not just letter).
#
# LUFS-I integrated -18 (matches voice + PC reference); -1.5 dBTP is
# 0.5 dB more headroom than voice's -1.0 to absorb drum-heavy M8
# transients without limiter pumping. Operator can lower M8 master
# fader on the device if the limiter audibly breathes.
#
# M8 = operator-played-instrument, distinct from voice/PC/SC bed-music.
# Per second-pass synthesis decision (see cc-task vault note).

context.modules = [
    # Filter chain: M8 audio in → -1.5 dBTP limiter → livestream-tap
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-m8-loudnorm"
            node.description = "Hapax M8 Instrument Loudnorm (true-peak limiter, -1.5 dBTP)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "m8_limiter"
                      control = {
                          "Input gain (dB)" = 0.0
                          # -1.5 dBTP — slightly more headroom than voice's
                          # -1.0 to absorb drum-heavy M8 transients.
                          "Limit (dB)"      = -1.5
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                inputs  = [ "m8_limiter:Input 1"  "m8_limiter:Input 2"  ]
                outputs = [ "m8_limiter:Output 1" "m8_limiter:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-m8-loudnorm"
                node.description = "Hapax M8 Loudnorm (input — M8 UAC capture target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-m8-loudnorm-playback"
                node.description = "Hapax M8 Loudnorm → livestream-tap"
                target.object = "hapax-livestream-tap"
                # Active per the 2026-04-26 livestream-tap passive-node fix
                # (#1608) — playback must actively claim its capture source
                # so the chain stays alive across wireplumber restarts.
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }

    # Loopback: M8 UAC source → hapax-m8-loudnorm input. The wireplumber
    # rule at config/wireplumber/54-hapax-m8-instrument.conf binds the
    # M8 USB device to this loopback's capture target.
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax M8 → loudnorm capture"
            capture.props = {
                node.name = "hapax-m8-instrument-capture"
                # Vendor-keyed match: pipewire's wireplumber binding rule
                # (54-hapax-m8-instrument.conf) sets target.object to the
                # operator's specific M8 ALSA source. Default points at
                # the operator's current M8 (serial 16558390); wireplumber
                # rule overrides if a different M8 ever appears.
                target.object = "alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo"
                node.passive = false
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "hapax-m8-instrument-playback"
                target.object = "hapax-m8-loudnorm"
                node.passive = false
                audio.position = [ FL FR ]
            }
        }
    }
]
