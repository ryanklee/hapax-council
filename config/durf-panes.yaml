# DURF (Display Under Reflective Frame) — pane sources for the 2x2 grid
#
# Operator-directed arrangement 2026-04-24T23:50Z:
#
#   ┌─────────────┬─────────────┐
#   │   delta     │    beta     │
#   ├─────────────┼─────────────┤
#   │   alpha     │   epsilon   │
#   └─────────────┴─────────────┘
#
# Source kinds:
#   - "tmux session:window.pane"  — live tmux capture-pane
#   - "file:<path>"                — tail of file (40 lines)
#
# Currently: each role reads from its session relay yaml in
# ~/.cache/hapax/relay/{role}.yaml. These reflect the most-recent
# coordination state for the corresponding Claude-Code session.
#
# Glyphs are 4-char geometric-identity markers (NOT name labels per
# HARDM anti-anthropomorphization).
#
# Operator may swap to live tmux/pty sources when a unified tmux
# arrangement is configured.

panes:
  - role: delta
    tmux_target: "file:~/.cache/hapax/relay/delta.yaml"
    glyph: "D-|\\"
  - role: beta
    tmux_target: "file:~/.cache/hapax/relay/beta.yaml"
    glyph: "B-|/"
  - role: alpha
    tmux_target: "file:~/.cache/hapax/relay/alpha.yaml"
    glyph: "A-//"
  - role: epsilon
    tmux_target: "file:~/.cache/hapax/relay/epsilon.yaml"
    glyph: "E-\\\\"

redactions_documented:
  - "sk-* API key prefix"
  - "AKIA* AWS key"
  - "ghp_* GitHub token"
  - "Bearer token"
  - "home/* ssh paths"
  - "home/* envrc paths"
  - "ANTHROPIC_API_KEY=..."
  - "AWS_SECRET_ACCESS_KEY=..."
