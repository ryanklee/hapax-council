# DURF (Display Under Reflective Frame) — tmux pane targets
#
# Text-only capture via `tmux capture-pane -p -t <target>`. Wayland pixel
# capture is forbidden (L-12 broadcast-bleed risk).
#
# Four roles: alpha / beta / delta / epsilon. Each maps to a tmux target
# in session:window.pane form. Glyphs are 4-char geometric-identity
# markers (NOT name labels per HARDM anti-anthropomorphization).
#
# Operator adjusts targets if tmux layout changes. Missing target →
# empty pane rendered (substrate bleeds through).

panes:
  - role: alpha
    tmux_target: "council:0.0"
    glyph: "A-//"
  - role: beta
    tmux_target: "council:0.1"
    glyph: "B-|/"
  - role: delta
    tmux_target: "council:0.2"
    glyph: "D-|\\"
  - role: epsilon
    tmux_target: "council:0.3"
    glyph: "E-\\\\"

# Redaction patterns applied per captured line (see agents/studio_compositor/durf_source.py
# _REDACTION_PATTERNS). Additions here would require code changes; this
# block documents current list for operator review.
redactions_documented:
  - "sk-..." API key prefix
  - "AKIA..." AWS key
  - "ghp_..." GitHub token
  - "Bearer <token>"
  - "/home/<user>/.ssh/<path>"
  - "/home/<user>/.envrc"
  - "ANTHROPIC_API_KEY=..."
  - "AWS_SECRET_ACCESS_KEY=..."
