      type-effect distortion that defeats accessibility.
    recognizability_tests:
      - ocr_accuracy
      - baseline_stability
      - format_preservation
    use_case_acceptance_test: >-
      Viewer reads caption text without squinting under any approved
      enhancement; accessibility never degraded.
    acceptance_test_harness: tests/studio_compositor/test_captions_acceptance.py
