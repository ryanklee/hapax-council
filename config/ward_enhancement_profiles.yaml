  chat_ambient:
    # Aggregate room-temperature gauge: participation, research-keyword
    # cadence, citation rate, engagement pulse. Spec at
    # docs/superpowers/specs/2026-04-18-chat-ambient-ward-design.md.
    # B5 gap: layout still points at legacy ChatKeywordLegendCairoSource;
    # cutover lands in same PR as this profile.
    recognizability_invariant: >-
      Ambient gauge only; no author names, no message bodies; participation
      magnitude and pulse legible as room-temperature, not as conversation.
    recognizability_tests:
      - per_author_attribution_absent
      - message_body_absent
      - magnitude_legibility
    use_case_acceptance_test: >-
      Operator senses room engagement level at glance without reading
      individual messages.
    acceptance_test_harness: tests/studio_compositor/test_chat_ambient_acceptance.py
