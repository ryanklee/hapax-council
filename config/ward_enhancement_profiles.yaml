  # ── Wards #15 & #16 (operator-directed, designs landed pre-registry) ──

  gem:
    # Graffiti Emphasis Mural — Hapax-authored expression surface that
    # replaces the captions strip in the lower-band geometry. Operator
    # directive 2026-04-19 (b6ec4a723); design at
    # docs/research/2026-04-19-gem-ward-design.md. Captions retires when
    # GEM activates.
    recognizability_invariant: >-
      CP437 raster only (no anti-aliasing, no proportional fonts);
      composition reads as glyph mural, never as a figure or face;
      revision/erasure marks legible as authoring trace, not noise.
    recognizability_tests:
      - cp437_glyph_purity
      - pearson_face_correlation
      - mural_density_band
    use_case_acceptance_test: >-
      Observer reads emphasized text fragments + abstract glyph
      compositions without the surface ever resolving into a humanoid
      figure or speech transcription line.
    acceptance_test_harness: tests/studio_compositor/test_gem_acceptance.py
    accepted_enhancement_categories:
      - halftone
      - chromatic_aberration
      - scanlines
      - film_grain
    rejected_enhancement_categories:
      - kuwahara
      - posterize
      - lens_distortion
      - perspective
      - depth_of_field
    spatial_dynamism_approved: true
    oq_02_bound_applicable: true
    hardm_binding: true
    cvs_bindings:
      - "CVS #8 non-manipulation"
      - "CVS #16 anti-personification"

  chat_keywords:
    # Keyword texture from chat (what the room is talking ABOUT) vs.
    # chat_ambient's rate/tier (how loud). Operator-authorized 2026-04-20;
    # design at docs/research/2026-04-20-chat-keywords-ward-design.md.
    # Constitutional axiom: interpersonal_transparency T0 — aggregate-only,
    # never per-author content, never message bodies.
    recognizability_invariant: >-
      Aggregate keyword texture only; no author names, no message bodies,
      no per-utterance attribution; BitchX-grammar typography preserved.
    recognizability_tests:
      - per_author_attribution_absent
      - message_body_absent
      - bitchx_grammar_compliance
    use_case_acceptance_test: >-
      Operator reads "what the room is discussing" as keyword cloud
      without identifying any individual chatter.
    acceptance_test_harness: tests/studio_compositor/test_chat_keywords_acceptance.py
    accepted_enhancement_categories:
      - halftone
      - chromatic_aberration
      - film_grain
    rejected_enhancement_categories:
      - kuwahara
      - posterize
      - lens_distortion
      - perspective
    spatial_dynamism_approved: true
    oq_02_bound_applicable: true
    hardm_binding: false
    cvs_bindings:
      - "CVS #16 anti-personification"
      - "interpersonal_transparency (T0)"

  # ── Already-shipped wards getting their first profile ──

  captions:
