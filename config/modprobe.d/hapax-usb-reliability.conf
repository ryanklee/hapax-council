# Hapax USB reliability hardening — prevents the xHCI bandwidth retry
# storm that has been wedging ZOOM LiveTrak mixers and other UAC2
# devices. Installed 2026-04-20 after extensive diagnosis.

# uvcvideo FIX_BANDWIDTH: forces webcams to the minimum altsetting.
# Without this, BRIO/C920 continuously retry altset 10/11 at ~30s
# cadence when xHCI can't satisfy their requested bandwidth, charging
# the periodic scheduler with partial reservations that never release.
# Result (observed today): new UAC2 devices enumerate to state=RUNNING
# but hw_ptr never advances → binary-zero audio payload.
options uvcvideo quirks=0x100

# snd-usb-audio: improve LiveTrak / similar UAC2 class mixer negotiation.
# implicit_fb=1 handles devices using implicit feedback (most ZOOM).
options snd-usb-audio implicit_fb=1

# L-12 specific: force lowest altset (16-bit) which the firmware may
# be the only one actually serving with audio data. quirk_flags 0x4000
# = QUIRK_FLAG_FORCE_IFACE_RESET; also enable implicit FB.
# Format: vendor:product:flags_hex
options snd-usb-audio quirk_flags=0x1686:0x03d5:0x40,0x1686:0x089e:0x40,0x1686:0x089f:0x40
